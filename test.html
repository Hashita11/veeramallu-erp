<style>

:root{
--primary:#1a237e;
--success:#28a745;
--danger:#e65100;
--warning:#fbc02d;
--info:#0288d1;
--light:#f0f2f5;
--card:#ffffff;
--shadow:0 10px 30px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:var(--light);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
transition:.3s;
}

.card{
width:100%;
max-width:450px;
background:var(--card);
padding:25px;
border-radius:18px;
box-shadow:var(--shadow);
text-align:center;
}

.logo{
width:90px;
display:block;
margin:auto auto 15px;
}

h2{
color:var(--primary);
margin-bottom:15px;
}

.form-group{
margin-bottom:15px;
text-align:left;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.02);
}

.btn-login{
background:var(--primary);
color:white;
}

.btn-secondary{
background:white;
border:2px solid var(--primary);
color:var(--primary);
}

.btn-purple{
background:#6a1b9a;
color:white;
}

.btn-in{
background:var(--success);
color:white;
flex:1;
}

.btn-out{
background:var(--danger);
color:white;
flex:1;
}

.btn-row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.teacher-info{
background:#e3f2fd;
padding:15px;
border-radius:10px;
border:1px solid var(--primary);
margin-bottom:15px;
}

.profile-wrapper{
position:relative;
display:inline-block;
}

.profile-pic{
width:100px;
height:100px;
border-radius:50%;
border:4px solid var(--primary);
object-fit:cover;
}

.camera-btn{
position:absolute;
bottom:0;
right:0;
background:var(--primary);
color:white;
width:32px;
height:32px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
border:2px solid white;
}

.small{
font-size:12px;
margin-top:5px;
}

.status-box{
padding:14px;
border-radius:8px;
background:#fffde7;
border:1px solid var(--warning);
font-weight:bold;
margin:15px 0;
}

.hidden{
display:none;
}

#attendanceSection{
display:none;
}

#logList{
list-style:none;
padding:0;
margin-top:15px;
}

#statsGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.stat-card{
background:#f8f9fa;
padding:12px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

.faceBox{
display:none;
margin-top:15px;
padding:10px;
border:2px dashed #999;
border-radius:10px;
}

.facePreview{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid var(--primary);
margin:10px auto;
display:block;
}

.leaveCard{
display:none;
margin-top:15px;
padding:15px;
background:#eef7ff;
border-radius:10px;
}

.salaryCard{
display:none;
margin-top:15px;
padding:15px;
background:#fff8e1;
border-radius:10px;
}

.calendarCard{
display:none;
margin-top:15px;
padding:15px;
background:white;
border-radius:10px;
border:1px solid #ddd;
}

.darkMode{
background:#111!important;
}

.darkMode .card{
background:#1e1e1e;
color:white;
}

.darkMode input,
.darkMode select{
background:#333;
color:white;
border:1px solid #555;
}

.darkMode .teacher-info{
background:#222;
}

.darkMode .btn-secondary{
background:#222;
color:white;
border:1px solid white;
}

.darkMode .status-box{
background:#222;
color:white;
}

.darkMode .stat-card{
background:#333;
}

.darkMode .calendarCard,
.darkMode .leaveCard,
.darkMode .salaryCard{
background:#2b2b2b;
color:white;
}

</style>

const SCHOOL_START_TIME = "09:00:00";

/* Face Photo Verification */

async function verifyTeacherPhoto(){

    const user = auth.currentUser;

    if(!user) return false;

    const doc = await db.collection("teachers")
    .doc(user.uid)
    .get();

    if(!doc.exists){
        alert("Teacher profile not found.");
        return false;
    }

    const data = doc.data();

    if(!data.photo){

        alert("Please upload your profile photo before marking attendance.");

        return false;
    }

    return true;
}

/* Leave Request */

async function applyLeave(){

    const reason = prompt("Enter Leave Reason");

    if(!reason) return;

    const date = prompt("Leave Date (YYYY-MM-DD)");

    if(!date) return;

    const user = auth.currentUser;

    await db.collection("leaveRequests").add({

        teacherId:user.uid,

        teacherEmail:user.email.toLowerCase(),

        reason:reason,

        leaveDate:date,

        status:"Pending",

        appliedOn:new Date()

    });

    alert("✅ Leave Request Submitted");
}

/* Check Leave */

async function isApprovedLeave(date){

    const user = auth.currentUser;

    const snap =
    await db.collection("leaveRequests")
    .where("teacherEmail","==",user.email.toLowerCase())
    .where("leaveDate","==",date)
    .where("status","==","Approved")
    .get();

    return !snap.empty;
}

/* Auto Absent */

async function autoAbsentCheck(){

    const user = auth.currentUser;

    if(!user) return;

    const now = new Date();

    const time =
    now.toLocaleTimeString("en-GB",{hour12:false});

    if(time < SCHOOL_START_TIME) return;

    const today =
    now.toISOString().split("T")[0];

    const approved =
    await isApprovedLeave(today);

    if(approved) return;

    const attendance =
    await db.collection("attendance")
    .where("teacherEmail","==",user.email.toLowerCase())
    .where("dateOnly","==",today)
    .get();

    if(!attendance.empty) return;

    await db.collection("attendance").add({

        teacherId:user.uid,

        teacherEmail:user.email.toLowerCase(),

        teacherName:user.email.split("@")[0],

        campus:sessionStorage.getItem("activeCampus"),

        type:"Absent",

        late:false,

        dateOnly:today,

        time:firebase.firestore.Timestamp.fromDate(now),

        method:"System Auto"

    });

    console.log("Absent Automatically Marked");
}

/* Start Automatic Absent Checker */

setInterval(autoAbsentCheck,60000);
