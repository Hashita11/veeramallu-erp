    reader.onload = async(e)=>{

        const compressedImage =
        e.target.result;

        const user =
        auth.currentUser;

        await db.collection("teachers")
        .doc(user.uid)
        .set({

        compressedImage;

        alert("✅ Photo Uploaded");
    };

    reader.readAsDataURL(file);
}

    function calculateDistance(lat1,lon1,lat2,lon2){

    const R = 6371e3;

    const dLat =
    (lat2-lat1)*Math.PI/180;

    const dLon =
    (lon2-lon1)*Math.PI/180;

    const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*
    Math.sin(dLon/2);

    return R*2*Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );
}

function startGPSCheck(){

    if(!navigator.geolocation){

        document.getElementById("gpsStatus").innerHTML =
        "GPS Not Supported";

        return;
    }

    navigator.geolocation.watchPosition(

    (pos)=>{

        const userLat =
        pos.coords.latitude;

        const userLng =
        pos.coords.longitude;

        let nearestCampus = "";

        let nearestDistance = Infinity;

        for(const [name,coords]
        of Object.entries(campusCoords)){

            const distance =
            calculateDistance(
                userLat,
                userLng,
                coords.lat,
                coords.lng
            );

            if(distance < nearestDistance){

                nearestDistance = distance;

                nearestCampus = name;
            }
        }

        sessionStorage.setItem(
            "activeCampus",
            nearestCampus
        );

        document.getElementById("campusDisplay").innerText =
        "Campus: " + nearestCampus;

        const gpsStatus =
        document.getElementById("gpsStatus");

        if(nearestDistance <= 50){

            gpsStatus.innerHTML =
            "✔ Inside " +
            nearestCampus +
            " (" +
            Math.round(nearestDistance) +
            "m)";

            gpsStatus.style.color = "green";

            document.getElementById("btnIn").disabled = false;
            document.getElementById("btnOut").disabled = false;

        }else{

            gpsStatus.innerHTML =
            "✖ Outside Campus (" +
            Math.round(nearestDistance) +
            "m)";

            gpsStatus.style.color = "red";

            document.getElementById("btnIn").disabled = true;
            document.getElementById("btnOut").disabled = true;
        }

    },

    ()=>{

        document.getElementById("gpsStatus").innerHTML =
        "GPS Error";
    },

    {
        enableHighAccuracy:true
    });
}

async function calculateMonthlySalary(){

    const user = auth.currentUser;

    if(!user) return;

    const month =
    document.getElementById("selectedMonth").value;

    const teacher =
    await db.collection("teachers")
    .doc(user.uid)
    .get();

    if(!teacher.exists){

        alert("Teacher Record Not Found");

        return;
    }

    const teacherData = teacher.data();

    const monthlySalary =
    Number(teacherData.salary || 0);

    const startDate = month + "-01";

    const endDate = month + "-31";

    const snap =
    await db.collection("attendance")
    .where("teacherEmail","==",user.email.toLowerCase())
    .where("dateOnly",">=",startDate)
    .where("dateOnly","<=",endDate)
    .get();

    let present=0;
    let absent=0;
    let late=0;
    let leave=0;

    snap.forEach(doc=>{

        const data = doc.data();

        if(data.type=="IN"){

            present++;

            if(data.late)
                late++;

        }

        if(data.type=="Absent")
            absent++;

        if(data.type=="Leave")
            leave++;

    });

    /* 3 Late = 1 Casual Leave */

    const lateDeduction =
    Math.floor(late/3);

    absent += lateDeduction;

    const dailySalary =
    monthlySalary/30;

    const deduction =
    absent*dailySalary;

    const payable =
    monthlySalary-deduction;

    return{

        salary:monthlySalary,

        payable:Math.round(payable),

        deduction:Math.round(deduction),

        present,

        absent,

        leave,

        late,

        casualLeaveDeduction:lateDeduction

    };

}

function getStatusColor(status){

    if(status==="Late")
    return "background:#fff3e0;color:#e65100;";

    if(status==="Absent")
    return "background:#ffebee;color:#c62828;";

    return "background:#e3f2fd;color:#1565c0;";
}
    
async function getMonthlyAttendance(){

    const user = firebase.auth().currentUser;
    if(!user) return [];

    const monthInput = document.getElementById("selectedMonth").value;

    const startDate = monthInput + "-01";
    const endDate = monthInput + "-31";

    try{

        const querySnapshot = await db.collection("attendance")
        .where("teacherEmail","==",user.email.toLowerCase())
        .where("dateOnly",">=",startDate)
        .where("dateOnly","<=",endDate)
        .get();

        const logs = [];

        querySnapshot.forEach((doc)=>{

            const data = doc.data();

            logs.push({
                date: data.dateOnly,
                checkIn: data.time
                    ? data.time.toDate().toLocaleTimeString("en-IN")
                    : "N/A",
                status: data.type==="IN"
                    ? (data.late ? "Late" : "Present")
                    : data.type
            });

        });

        return logs.sort((a,b)=>b.date.localeCompare(a.date));

    }catch(error){
        console.error(error);
        return [];
    }
}

async function calculateMonthlySalary(){

    const user = auth.currentUser;

    if(!user){
        return;
    }

    const teacherDoc = await db.collection("teachers")
    .doc(user.uid)
    .get();

    const teacher = teacherDoc.data() || {};

    const monthlySalary = teacher.salary || 0;

    const month = document.getElementById("selectedMonth").value;

    const logs = await getMonthlyAttendance();

    let present = 0;
    let late = 0;
    let absent = 0;
    let leave = 0;

    logs.forEach(log=>{

        if(log.status==="Present") present++;

        if(log.status==="Late"){
            present++;
            late++;
        }

        if(log.status==="Absent") absent++;

        if(log.status==="Leave") leave++;

    });

    const lateDeduction = Math.floor(late/3);

    const totalAbsent = absent + lateDeduction;

    const workingDays = 30;

    const perDaySalary = monthlySalary / workingDays;

    const deduction = perDaySalary * totalAbsent;

    const payable = monthlySalary - deduction;

    document.getElementById("statsGrid").innerHTML += `

    <div style="
        margin-top:15px;
        background:#e8f5e9;
        padding:15px;
        border-radius:10px;
        text-align:left;">

        <h3>Salary Summary</h3>

        <p><b>Month :</b> ${month}</p>

        <p><b>Salary :</b> ₹${monthlySalary}</p>

        <p><b>Present :</b> ${present}</p>

        <p><b>Late :</b> ${late}</p>

        <p><b>Absent :</b> ${absent}</p>

        <p><b>Late Deduction :</b> ${lateDeduction} Day</p>

        <hr>

        <h3>Payable Salary : ₹${payable.toFixed(0)}</h3>

    </div>

    `;

}

    async function loadLeaderboard(){

    const box=document.getElementById("leaderboardBox");

    box.style.display="block";
    box.innerHTML="Loading Leaderboard...";

    try{

        const snap=await db.collection("attendance").get();

        const teachers={};

        snap.forEach(doc=>{

            const d=doc.data();

            const email=d.teacherEmail;

            if(!teachers[email]){

                teachers[email]={
                    name:d.teacherName || email,
                    present:0,
                    late:0
                };

            }

            if(d.type==="IN"){

                if(d.late){

                    teachers[email].late++;

                }else{

                    teachers[email].present++;

                }

            }

        });

        let ranking=Object.values(teachers);

        ranking.sort((a,b)=>{

            const scoreA=(a.present*2)-a.late;
            const scoreB=(b.present*2)-b.late;

            return scoreB-scoreA;

        });

        let html="<h3 style='color:#1a237e;'>🏆 Teacher Ranking</h3><hr>";

        ranking.forEach((t,index)=>{

            let medal="";

            if(index===0) medal="🥇";
            else if(index===1) medal="🥈";
            else if(index===2) medal="🥉";
            else medal="⭐";

            const score=(t.present*2)-t.late;

            html+=`

            <div style="
            padding:10px;
            border-bottom:1px solid #eee;">

            <b>${medal} ${index+1}. ${t.name}</b><br>

            Present : ${t.present}<br>

            Late : ${t.late}<br>

            Score : <b>${score}</b>

            </div>

            `;

        });

        box.innerHTML=html;

    }catch(err){

        console.log(err);

        box.innerHTML="Unable to load leaderboard.";

    }

}
