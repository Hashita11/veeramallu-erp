/* Face Photo Verification */

async function verifyTeacherPhoto(){

    const user = auth.currentUser;

    if(!user) return false;

    const doc = await db.collection("teachers")
    .doc(user.uid)
    .get();

    if(!doc.exists){
        alert("Teacher profile not found.");
        return false;
    }

    const data = doc.data();

    if(!data.photo){

        alert("Please upload your profile photo before marking attendance.");

        return false;
    }

    return true;
}

/* Leave Request */

async function applyLeave(){

    const reason = prompt("Enter Leave Reason");

    if(!reason) return;

    const date = prompt("Leave Date (YYYY-MM-DD)");

    if(!date) return;

    const user = auth.currentUser;

    await db.collection("leaveRequests").add({

        teacherId:user.uid,

        teacherEmail:user.email.toLowerCase(),

        reason:reason,

        leaveDate:date,

        status:"Pending",

        appliedOn:new Date()

    });

    alert("✅ Leave Request Submitted");
}

/* Check Leave */

async function isApprovedLeave(date){

    const user = auth.currentUser;

    const snap =
    await db.collection("leaveRequests")
    .where("teacherEmail","==",user.email.toLowerCase())
    .where("leaveDate","==",date)
    .where("status","==","Approved")
    .get();

    return !snap.empty;
}

/* Auto Absent */

async function autoAbsentCheck(){

    const user = auth.currentUser;

    if(!user) return;

    const now = new Date();

    const time =
    now.toLocaleTimeString("en-GB",{hour12:false});

    if(time < SCHOOL_START_TIME) return;

    const today =
    now.toISOString().split("T")[0];

    const approved =
    await isApprovedLeave(today);

    if(approved) return;

    const attendance =
    await db.collection("attendance")
    .where("teacherEmail","==",user.email.toLowerCase())
    .where("dateOnly","==",today)
    .get();

    if(!attendance.empty) return;

    await db.collection("attendance").add({

        teacherId:user.uid,

        teacherEmail:user.email.toLowerCase(),

        teacherName:user.email.split("@")[0],

        campus:sessionStorage.getItem("activeCampus"),

        type:"Absent",

        late:false,

        dateOnly:today,

        time:firebase.firestore.Timestamp.fromDate(now),

        method:"System Auto"

    });

    console.log("Absent Automatically Marked");
}

async function uploadPhoto(input){

    if(!file) return;

    const reader = new FileReader();

    reader.onload = async(e)=>{

        const compressedImage =
        e.target.result;

        const user =
        auth.currentUser;

        await db.collection("teachers")
        .doc(user.uid)
        .set({
            photo:compressedImage
        },{merge:true});

        document.getElementById("profilePic").src =
        compressedImage;

        alert("✅ Photo Uploaded");
    };

    reader.readAsDataURL(file);
}

    function calculateDistance(lat1,lon1,lat2,lon2){

    const R = 6371e3;

    const dLat =
    (lat2-lat1)*Math.PI/180;

    const dLon =
    (lon2-lon1)*Math.PI/180;

    const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*
    Math.sin(dLon/2);

    return R*2*Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );
}

function startGPSCheck(){

    if(!navigator.geolocation){

        document.getElementById("gpsStatus").innerHTML =
        "GPS Not Supported";

        return;
    }

    navigator.geolocation.watchPosition(

    (pos)=>{

        const userLat =
        pos.coords.latitude;

        const userLng =
        pos.coords.longitude;

        let nearestCampus = "";

        let nearestDistance = Infinity;

        for(const [name,coords]
        of Object.entries(campusCoords)){

            const distance =
            calculateDistance(
                userLat,
                userLng,
                coords.lat,
                coords.lng
            );

            if(distance < nearestDistance){

                nearestDistance = distance;

                nearestCampus = name;
            }
        }

        sessionStorage.setItem(
            "activeCampus",
            nearestCampus
        );

        document.getElementById("campusDisplay").innerText =
        "Campus: " + nearestCampus;

        const gpsStatus =
        document.getElementById("gpsStatus");

        if(nearestDistance <= 50){

            gpsStatus.innerHTML =
            "✔ Inside " +
            nearestCampus +
            " (" +
            Math.round(nearestDistance) +
            "m)";

            gpsStatus.style.color = "green";

            document.getElementById("btnIn").disabled = false;
            document.getElementById("btnOut").disabled = false;

        }else{

            gpsStatus.innerHTML =
            "✖ Outside Campus (" +
            Math.round(nearestDistance) +
            "m)";

            gpsStatus.style.color = "red";

            document.getElementById("btnIn").disabled = true;
            document.getElementById("btnOut").disabled = true;
        }

    },

    ()=>{

        document.getElementById("gpsStatus").innerHTML =
        "GPS Error";
    },

    {
        enableHighAccuracy:true
    });
}
   
    async function markAttendance(type){

    try{

        const photoVerified = await verifyTeacherPhoto();

        if(!photoVerified){
            return;
        }

        const user = auth.currentUser;

        if(!user){
            alert("Please login first");
            return;
        }

        const teacherDoc = await db.collection("teachers")
        .doc(user.uid)
        .get();

        const teacherData = teacherDoc.data() || {};

        const teacherName =
        teacherData.name ||
        user.email.split("@")[0];

        const teacherEmail =
        user.email.toLowerCase();

        const campus =
        sessionStorage.getItem("activeCampus");

        const now = new Date();

        const dateOnly =
        now.toISOString().split("T")[0];

        const timeStr =
        now.toLocaleTimeString("en-GB",{
            hour12:false
        });

        const attendance =
        await db.collection("attendance")
        .where("teacherEmail","==",teacherEmail)
        .where("dateOnly","==",dateOnly)
        .get();

        let alreadyIN=false;
        let alreadyOUT=false;

        attendance.forEach(doc=>{

            const data=doc.data();

            if(data.type==="IN") alreadyIN=true;

            if(data.type==="OUT") alreadyOUT=true;

        });

        if(type==="IN" && alreadyIN){
            alert("Today's Check-IN already completed.");
            return;
        }

        if(type==="OUT" && !alreadyIN){
            alert("Please Check-IN first.");
            return;
        }

        if(type==="OUT" && alreadyOUT){
            alert("Today's Check-OUT already completed.");
            return;
        }

        const isLate =
        type==="IN" &&
        timeStr > LATE_THRESHOLD;

        await db.collection("attendance").add({

            teacherId:user.uid,

            teacherName:teacherName,

            teacherEmail:teacherEmail,

            campus:campus,

            type:type,

            late:isLate,

            status:
            type==="IN"
            ?(isLate?"Late":"Present")
            :"Completed",

            time:
            firebase.firestore.Timestamp.fromDate(now),

            fullTimestamp:
            now.toISOString(),

            dateOnly:dateOnly,

            method:"Teacher App",

            verifiedPhoto:true

        });

        if(isLate){

            alert("⚠ Late Attendance Recorded");

        }else{

            alert("✅ "+type+" Successful");

        }

    }catch(error){

        alert(error.message);

    }

}
    /* =====================================================
   VGA ADVANCED ATTENDANCE SYSTEM
   PART 2C
   Salary + Late Deduction
===================================================== */

async function calculateMonthlySalary(){

    const user = auth.currentUser;

    if(!user) return;

    const month =
    document.getElementById("selectedMonth").value;

    const teacher =
    await db.collection("teachers")
    .doc(user.uid)
    .get();

    if(!teacher.exists){

        alert("Teacher Record Not Found");

        return;
    }

    const teacherData = teacher.data();

    const monthlySalary =
    Number(teacherData.salary || 0);

    const startDate = month + "-01";

    const endDate = month + "-31";

    const snap =
    await db.collection("attendance")
    .where("teacherEmail","==",user.email.toLowerCase())
    .where("dateOnly",">=",startDate)
    .where("dateOnly","<=",endDate)
    .get();

    let present=0;
    let absent=0;
    let late=0;
    let leave=0;

    snap.forEach(doc=>{

        const data = doc.data();

        if(data.type=="IN"){

            present++;

            if(data.late)
                late++;

        }

        if(data.type=="Absent")
            absent++;

        if(data.type=="Leave")
            leave++;

    });

    /* 3 Late = 1 Casual Leave */

    const lateDeduction =
    Math.floor(late/3);

    absent += lateDeduction;

    const dailySalary =
    monthlySalary/30;

    const deduction =
    absent*dailySalary;

    const payable =
    monthlySalary-deduction;

    return{

        salary:monthlySalary,

        payable:Math.round(payable),

        deduction:Math.round(deduction),

        present,

        absent,

        leave,

        late,

        casualLeaveDeduction:lateDeduction

    };

}

}

        border-radius:8px;">

        <span style="
        display:block;
        font-size:10px;
        font-weight:bold;
        color:#e65100;">
        TOTAL LATE
        </span>

        <span style="
        font-size:18px;
        font-weight:bold;">
        ${totalLate}
        </span>

        </div>
        `;

        portal.classList.remove("hidden");

        if(logs.length===0){

            logList.innerHTML =
            "<li style='padding:10px;color:green;'>No records found</li>";

        }else{

            logList.innerHTML =
            logs.map(log=>`

            <li style="
            padding:10px;
            border-bottom:1px solid #eee;
            display:flex;
            justify-content:space-between;
            align-items:center;">

            <div style="text-align:left;">

            <div style="font-weight:bold;">
            ${log.date}
            </div>

            <div style="
            font-size:11px;
            color:#666;">
            ${log.checkIn}
            </div>

            </div>

            <span style="
            padding:4px 8px;

        }

    }catch(err){

        console.error(err);

        alert("Failed to load");

    }finally{

        btn.innerText =
        "Refresh Attendance";
    }
}

function getStatusColor(status){

    if(status==="Late")
    return "background:#fff3e0;color:#e65100;";

    if(status==="Absent")
    return "background:#ffebee;color:#c62828;";

    return "background:#e3f2fd;color:#1565c0;";
}
    
async function getMonthlyAttendance(){

    const user = firebase.auth().currentUser;
    if(!user) return [];

    const monthInput = document.getElementById("selectedMonth").value;

    const startDate = monthInput + "-01";
    const endDate = monthInput + "-31";

    try{

        const querySnapshot = await db.collection("attendance")
        .where("teacherEmail","==",user.email.toLowerCase())
        .where("dateOnly",">=",startDate)
        .where("dateOnly","<=",endDate)
        .get();

        const logs = [];

        querySnapshot.forEach((doc)=>{

            const data = doc.data();

            logs.push({
                date: data.dateOnly,
                checkIn: data.time
                    ? data.time.toDate().toLocaleTimeString("en-IN")
                    : "N/A",
                status: data.type==="IN"
                    ? (data.late ? "Late" : "Present")
                    : data.type
            });

        });

        return logs.sort((a,b)=>b.date.localeCompare(a.date));

    }catch(error){
        console.error(error);
        return [];
    }
}

async function showAttendanceCalendar(){

    const logs = await getMonthlyAttendance();

    if(logs.length==0){

        alert("No attendance found.");

        return;
    }

    let txt="MONTHLY ATTENDANCE\n\n";

    logs.forEach(l=>{

        txt+=
        l.date+
        "   "+
        l.status+
        "   "+
        l.checkIn+
        "\n";

    });

    alert(txt);

}



async function exportAttendancePDF(){

    const logs=await getMonthlyAttendance();

    if(logs.length==0){

        alert("No attendance found.");

        return;

    }

    const {jsPDF}=window.jspdf;

    const pdf=new jsPDF();

    pdf.setFontSize(18);

    pdf.text("Veeramallu Global Academy",20,20);

    pdf.setFontSize(13);

    pdf.text(
        "Teacher Attendance Report",
        20,
        30
    );

    pdf.text(
        "Teacher : "+
        auth.currentUser.email,
        20,
        40
    );

    pdf.text(
        "Month : "+
        document.getElementById("selectedMonth").value,
        20,
        50
    );

    let y=65;

    logs.forEach((row,index)=>{

        pdf.text(

            (index+1)+". "+
            row.date+
            " | "+
            row.status+
            " | "+
            row.checkIn,

            20,

            y

        );

        y+=8;

        if(y>280){

            pdf.addPage();

            y=20;

        }

    });

    pdf.save("Teacher_Attendance_Report.pdf");

}
