<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>VGA Homework Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 100px; margin-bottom: 10px; }
        h2 { color: #1a237e; margin-bottom: 20px; }
        
        label { display: block; text-align: left; margin-top: 15px; font-weight: bold; font-size: 14px; color: #333; }
        input, textarea, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: #1a237e; color: white; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; }

        /* Filter Section */
        .filter-section { margin-top: 30px; padding: 15px; background: #e8eaf6; border-radius: 12px; text-align: left; border: 1px dashed #1a237e; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        /* Table Structure */
        .group-container { background: white; border-radius: 12px; overflow: hidden; margin-top: 20px; border: 1px solid #1a237e; text-align: left; }
        .group-header { background: #1a237e; color: white; padding: 12px; display: flex; justify-content: space-between; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .subject-cell { font-weight: bold; color: #1a237e; width: 35%; border-right: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Upload Homework</h2>

    <select id="class">
        <option>P.KG</option><option>L.KG</option><option>U.KG</option>
        <option>Class 1</option><option>Class 2</option><option>Class 3</option>
        <option>Class 4</option><option>Class 5</option><option>Class 6</option>
        <option>Class 7</option><option>Class 8</option><option>Class 9</option><option>Class 10</option>
    </select>

    <select id="subject">
        <option>Telugu</option><option>Hindi</option><option>English</option>
        <option>Maths</option><option>Science</option><option>Social</option>
        <option>G.K</option><option>Computer</option>
    </select>

    <textarea id="homework" placeholder="Enter work details..."></textarea>
    <button onclick="uploadHomework()">Post Homework</button>

    <div class="filter-section">
        <b style="color:#1a237e">🔍 Filter Homework List</b>
        <div class="filter-grid">
            <select id="filterClass" onchange="loadHomework()">
                <option value="All">All Classes</option>
                <option>P.KG</option><option>L.KG</option><option>U.KG</option>
                <option>Class 1</option><option>Class 2</option><option>Class 3</option>
                <option>Class 4</option><option>Class 5</option><option>Class 6</option>
                <option>Class 7</option><option>Class 8</option><option>Class 9</option><option>Class 10</option>
            </select>
            <input type="date" id="filterDate" onchange="loadHomework()">
        </div>
        <button style="margin-top:10px; padding:8px; background:#555" onclick="resetFilters()">Show All</button>
    </div>

    <div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function uploadHomework() {
        const cls = document.getElementById("class").value;
        const subject = document.getElementById("subject").value;
        const homework = document.getElementById("homework").value;
        const dateObj = new Date();
        // dateStr is YYYY-MM-DD for the date input filter to match
        const dateStr = dateObj.toLocaleDateString('en-CA'); 

        if (!homework) return alert("Please enter work details!");

        try {
            await db.collection("homeworks").add({
                class: cls,
                subject: subject,
                homework: homework,
                date: dateStr,
                displayDate: dateObj.toLocaleDateString('en-GB'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("homework").value = "";
            alert("✅ Successfully Posted");
            loadHomework();
        } catch (e) { alert("Error: " + e.message); }
    }

    async function loadHomework() {
        const fClass = document.getElementById("filterClass").value;
        const fDate = document.getElementById("filterDate").value;
        
        const snap = await db.collection("homeworks").orderBy("timestamp", "desc").get();
        const listDiv = document.getElementById("list");
        listDiv.innerHTML = "";

        const groups = {};

        snap.forEach(doc => {
            const d = doc.data();
            
            // Apply Logic Filters
            if (fClass !== "All" && d.class !== fClass) return;
            if (fDate !== "" && d.date !== fDate) return;

            const key = `${d.date}_${d.class}`;
            if (!groups[key]) groups[key] = { date: d.displayDate, class: d.class, works: [] };
            groups[key].works.push(d);
        });

        if (Object.keys(groups).length === 0) {
            listDiv.innerHTML = "<p style='margin-top:20px; color:gray;'>No homework found for this filter.</p>";
            return;
        }

        for (let k in groups) {
            const g = groups[k];
            let rows = g.works.map(w => `<tr><td class="subject-cell">${w.subject}</td><td>${w.homework}</td></tr>`).join('');
            listDiv.innerHTML += `
                <div class="group-container">
                    <div class="group-header"><span>${g.class}</span><span>${g.date}</span></div>
                    <table>${rows}</table>
                </div>`;
        }
    }

    function resetFilters() {
        document.getElementById("filterClass").value = "All";
        document.getElementById("filterDate").value = "";
        loadHomework();
    }

    loadHomework();
</script>

</body>
</html>
