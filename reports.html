<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VGA Financial Reports</title>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial;
    background:#f4f7f6;
}

/* HEADER */

.header{
    background:#1a237e;
    color:white;
    text-align:center;
    padding:20px;
}

.header img{
    height:70px;
    margin-bottom:10px;
}

.header h2{
    margin-bottom:5px;
}

#reportTitle{
    margin-top:10px;
    font-size:15px;
    color:#e8eaf6;
}

/* CONTAINER */

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* CONTROLS */

.controls{
    background:white;
    padding:15px;
    border-radius:12px;
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input[type="date"],
input[type="text"]{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

/* BUTTONS */

button{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.btn-gen{
    background:#1a237e;
    color:white;
}

.btn-gen:hover{
    background:#0d165f;
}

.btn-pdf{
    background:#d32f2f;
    color:white;
}

.btn-print{
    background:#00897b;
    color:white;
}

/* STATS */

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:14px;
    text-align:center;
    box-shadow:0 4px 6px rgba(0,0,0,0.05);
    border-top:5px solid #1a237e;
}

.stat-card h4{
    font-size:12px;
    color:#666;
    margin-bottom:10px;
    text-transform:uppercase;
}

.stat-card p{
    font-size:24px;
    font-weight:bold;
    color:#1a237e;
}

/* CHART */

.chart-box{
    background:white;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 4px 6px rgba(0,0,0,0.05);
    height:320px;
}

/* TABLE */

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

th{
    background:#1a237e;
    color:white;
    padding:12px;
    font-size:13px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f5f5;
}

/* SEARCH */

.search-box{
    width:100%;
    margin-bottom:15px;
}

/* MOBILE */

@media(max-width:768px){

    .stats-grid{
        grid-template-columns:1fr 1fr;
    }

    .controls{
        flex-direction:column;
    }

    th,td{
        font-size:12px;
        padding:8px;
    }

}

@media print{

    .controls,
    .search-box{
        display:none;
    }

    body{
        background:white;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <img src="logo.png"
    onerror="this.src='https://via.placeholder.com/70x70?text=VGA'">

    <h2>VEERAMALLU GLOBAL ACADEMY</h2>

    <p>Financial Collection Report Dashboard</p>

    <h3 id="reportTitle"></h3>

</div>

<!-- MAIN -->

<div class="container" id="captureArea">

    <!-- CONTROLS -->

    <div class="controls">

        <input type="date" id="reportDate">

        <button class="btn-gen" onclick="loadReport()">
            Generate Report
        </button>

        <button class="btn-pdf" onclick="downloadPDF()">
            Download PDF
        </button>

        <button class="btn-print" onclick="window.print()">
            Print
        </button>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

        <div class="stat-card">
            <h4>Daily Collection</h4>
            <p>₹ <span id="dailyTotal">0</span></p>
        </div>

        <div class="stat-card">
            <h4>Monthly Collection</h4>
            <p>₹ <span id="monthlyTotal">0</span></p>
        </div>

        <div class="stat-card">
            <h4>Yearly Collection</h4>
            <p>₹ <span id="yearlyTotal">0</span></p>
        </div>

        <div class="stat-card">
            <h4>Total Payments</h4>
            <p><span id="studentCount">0</span></p>
        </div>

    </div>

    <!-- BAR CHART -->

    <div class="chart-box">
        <canvas id="collectionChart"></canvas>
    </div>

    <!-- PIE CHART -->

    <div class="chart-box">
        <canvas id="campusChart"></canvas>
    </div>

    <!-- SEARCH -->

    <input
        type="text"
        id="searchBox"
        class="search-box"
        placeholder="Search Student Name / ID / Campus">

    <!-- TABLE -->

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Campus</th>
                    <th>Amount</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// ===================================
// FIREBASE
// ===================================

const firebaseConfig = {

    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",

    authDomain: "veeramalluerp-6cac5.firebaseapp.com",

    projectId: "veeramalluerp-6cac5",

    storageBucket: "veeramalluerp-6cac5.firebasestorage.app",

    messagingSenderId: "379339569496",

    appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



// ===================================
// LOAD REPORT
// ===================================

async function loadReport(){

    const tableBody =
    document.getElementById("tableBody");

    tableBody.innerHTML =
    `
    <tr>
        <td colspan="4">
            Loading...
        </td>
    </tr>
    `;

    try{

        const reportDate =
        document.getElementById("reportDate").value;

        const selectedDate =
        new Date(reportDate);

        const selectedMonth =
        selectedDate.getMonth();

        const selectedYear =
        selectedDate.getFullYear();

        let dailyTotal = 0;

        let monthlyTotal = 0;

        let yearlyTotal = 0;

        let paymentCount = 0;

        tableBody.innerHTML = "";

        const snap =
        await db.collection("fee_payments")
        .orderBy("timestamp","desc")
        .get();

        snap.forEach(doc=>{

            const d = doc.data();

            if(!d.timestamp) return;

            const payDate =
            d.timestamp.toDate();

            const payDateOnly =
            payDate.toISOString().split('T')[0];

            // DAILY REPORT
            if(payDateOnly === reportDate){

                dailyTotal +=
                Number(d.amount || 0);

                paymentCount++;

                tableBody.innerHTML +=
                `
                <tr>

                    <td>
                        ${d.studentId || '-'}
                    </td>

                    <td>
                        ${d.studentName || '-'}
                    </td>

                    <td>
                        ${d.campus || '-'}
                    </td>

                    <td>
                        ₹${Number(d.amount || 0)}
                    </td>

                </tr>
                `;
            }

            // MONTHLY TOTAL
            if(
                payDate.getMonth() === selectedMonth &&
                payDate.getFullYear() === selectedYear
            ){

                monthlyTotal +=
                Number(d.amount || 0);

            }

            // YEARLY TOTAL
            if(
                payDate.getFullYear() === selectedYear
            ){

                yearlyTotal +=
                Number(d.amount || 0);

            }

        });

        // NO DATA
        if(tableBody.innerHTML === ""){

            tableBody.innerHTML =
            `
            <tr>
                <td colspan="4">
                    No data found for this date.
                </td>
            </tr>
            `;
        }

        // UPDATE SUMMARY
        document.getElementById("dailyCollection").innerText =
        "₹ " + dailyTotal;

        document.getElementById("monthlyCollection").innerText =
        "₹ " + monthlyTotal;

        document.getElementById("yearlyCollection").innerText =
        "₹ " + yearlyTotal;

        document.getElementById("totalPayments").innerText =
        paymentCount;

    }

    catch(error){

        console.log(error);

        alert(error.message);

    }

}



// ===================================
// SEARCH FILTER
// ===================================

document
.getElementById("searchInput")
.addEventListener("keyup", function(){

    const value =
    this.value.toLowerCase();

    const rows =
    document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        row.style.display =
        row.innerText.toLowerCase().includes(value)
        ? ""
        : "none";

    });

});



// ===================================
// DOWNLOAD PDF
// ===================================

async function downloadPDF(){

    const area =
    document.getElementById("captureArea");

    const canvas =
    await html2canvas(area,{scale:2});

    const imgData =
    canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    const pdf =
    new jsPDF('p','mm','a4');

    const imgWidth = 190;

    const pageHeight = 295;

    const imgHeight =
    canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;

    let position = 10;

    pdf.addImage(
        imgData,
        'PNG',
        10,
        position,
        imgWidth,
        imgHeight
    );

    heightLeft -= pageHeight;

    while(heightLeft > 0){

        position = heightLeft - imgHeight;

        pdf.addPage();

        pdf.addImage(
            imgData,
            'PNG',
            10,
            position,
            imgWidth,
            imgHeight
        );

        heightLeft -= pageHeight;

    }

    pdf.save(
        `VGA_Report_${document.getElementById("reportDate").value}.pdf`
    );

}



// ===================================
// AUTO LOAD
// ===================================

window.onload = ()=>{

    const today =
    new Date().toISOString().split('T')[0];

    document.getElementById("reportDate").value =
    today;

    loadReport();

};

</script>

</body>

</html>
