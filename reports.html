<!DOCTYPE html>
<html>
<head>
    <title>Financial Reports - Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial; background:#f0f2f5; margin:0; }
        .header { text-align:center; padding:20px; background:#1a237e; color:white; }
        .header img { height:70px; margin-bottom:10px; }
        .container { padding:20px; max-width: 1000px; margin: auto; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #1a237e; }
        .stat-card h4 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 22px; font-weight: bold; color: #1a237e; }

        .controls { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #1a237e; color: white; cursor: pointer; border: none; font-weight: bold; }
        
        .chart-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width:100%; border-collapse:collapse; background:white; border-radius: 10px; overflow: hidden; }
        th, td { padding:12px; border:1px solid #eee; text-align: left; }
        th { background:#1a237e; color: white; }
    </style>
</head>

<body>

<div class="header">
    <img src="logo.png" onerror="this.src='https://via.placeholder.com/70x70?text=VGA'">
    <h2>VEERAMALLU GLOBAL ACADEMY</h2>
    <p>Financial Collection Dashboard</p>
</div>

<div class="container" id="reportArea">

    <div class="controls">
        <input type="date" id="reportDate">
        <button onclick="loadReport()">Generate Report</button>
        <button onclick="downloadReport()" style="background:#d32f2f;">Save as PDF</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h4>Selected Day</h4>
            <p>₹ <span id="dailyTotal">0</span></p>
        </div>
        <div class="stat-card">
            <h4>Selected Month</h4>
            <p>₹ <span id="monthlyTotal">0</span></p>
        </div>
        <div class="stat-card">
            <h4>Yearly Total</h4>
            <p>₹ <span id="yearlyTotal">0</span></p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="collectionChart"></canvas>
    </div>

    <table id="table">
        <thead>
            <tr><th>Student ID</th><th>Name</th><th>Campus</th><th>Amount Paid</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Set default date to today
document.getElementById('reportDate').valueAsDate = new Date();

let myChart;

async function loadReport() {
    const selectedDate = document.getElementById("reportDate").value; // YYYY-MM-DD
    if (!selectedDate) return;

    const [year, month, day] = selectedDate.split("-");
    const monthYear = `${year}-${month}`; // For Monthly filter

    let dayAmt = 0, monthAmt = 0, yearAmt = 0;
    let tableHtml = "";

    // IMPORTANT: We fetch all admissions to calculate totals based on their payment dates
    // For a real app, you'd query a 'payments' collection
    const snapshot = await db.collection("admissions").get();

    snapshot.forEach(doc => {
        const d = doc.data();
        const paid = Number(d.paidAmount || 0);
        const pDate = d.paymentDate || ""; // Assuming your admissions have a paymentDate field

        // Daily Logic
        if (pDate === selectedDate) {
            dayAmt += paid;
            tableHtml += `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.campus}</td><td>₹${paid}</td></tr>`;
        }

        // Monthly Logic
        if (pDate.startsWith(monthYear)) {
            monthAmt += paid;
        }

        // Yearly Logic
        if (pDate.startsWith(year)) {
            yearAmt += paid;
        }
    });

    document.getElementById("dailyTotal").innerText = dayAmt.toLocaleString();
    document.getElementById("monthlyTotal").innerText = monthAmt.toLocaleString();
    document.getElementById("yearlyTotal").innerText = yearAmt.toLocaleString();
    document.getElementById("tableBody").innerHTML = tableHtml || "<tr><td colspan='4' style='text-align:center'>No payments on this date</td></tr>";

    updateChart(dayAmt, monthAmt, yearAmt);
}

function updateChart(d, m, y) {
    const ctx = document.getElementById('collectionChart').getContext('2d');
    
    if (myChart) myChart.destroy();

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Selected Day', 'Selected Month', 'Selected Year'],
            datasets: [{
                label: 'Collection Amount (₹)',
                data: [d, m, y],
                backgroundColor: ['#1a237e', '#3949ab', '#7986cb'],
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });
}

function downloadReport() {
    const element = document.getElementById('reportArea');
    html2canvas(element).then(canvas => {
        const link = document.createElement('a');
        link.download = `VGA_Report_${document.getElementById('reportDate').value}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
}

// Load initial report
window.onload = loadReport;
</script>

</body>
</html>
