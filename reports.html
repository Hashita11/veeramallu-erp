<!DOCTYPE html>
<html>
<head>
<title>Daily Fee Report</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }
.header { text-align:center; padding:10px; background:#1a237e; color:white; }
.header img { height:60px; }
.container { padding:20px; }
table { width:100%; border-collapse:collapse; background:white; }
th,td { padding:10px; border:1px solid #ddd; }
th { background:#eee; }
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<h2>VEERAMALLU GLOBAL ACADEMY</h2>
<p>Daily Fee Collection Report</p>
</div>

<div class="container">

<input type="date" id="date">
<button onclick="loadReport()">Load Report</button>

<table id="table">
<tr><th>ID</th><th>Name</th><th>Campus</th><th>Total Balance</th></tr>
</table>

<h3>Total Collection: ₹ <span id="total">0</span></h3>

</div>

<script>
const firebaseConfig = {
 apiKey: "YOUR_API_KEY",
 authDomain: "veeramalluerp-6cac5.firebaseapp.com",
 projectId: "veeramalluerp-6cac5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadReport() {

 let total = 0;

 const snapshot = await db.collection("admissions").get();

 document.getElementById("table").innerHTML =
 "<tr><th>ID</th><th>Name</th><th>Campus</th><th>Total Balance</th></tr>";

 snapshot.forEach(doc => {
   const d = doc.data();

   document.getElementById("table").innerHTML += `
   <tr>
   <td>${d.id}</td>
   <td>${d.name}</td>
   <td>${d.campus}</td>
   <td>${d.totalBalance}</td>
   </tr>`;

   total += Number(d.totalBalance || 0);
 });

 document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
