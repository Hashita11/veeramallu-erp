<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VGA Financial Reports</title>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial;
    background:#f4f7f6;
}

/* HEADER */

.header{
    background:#1a237e;
    color:white;
    text-align:center;
    padding:20px;
}

.header img{
    height:70px;
    margin-bottom:10px;
}

.header h2{
    margin-bottom:5px;
}

#reportTitle{
    margin-top:10px;
    font-size:15px;
    color:#e8eaf6;
}

/* CONTAINER */

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* CONTROLS */

.controls{
    background:white;
    padding:15px;
    border-radius:12px;
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input[type="date"],
input[type="text"]{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

/* BUTTONS */

button{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.btn-gen{
    background:#1a237e;
    color:white;
}

.btn-gen:hover{
    background:#0d165f;
}

.btn-pdf{
    background:#d32f2f;
    color:white;
}

.btn-print{
    background:#00897b;
    color:white;
}

/* STATS */

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:14px;
    text-align:center;
    box-shadow:0 4px 6px rgba(0,0,0,0.05);
    border-top:5px solid #1a237e;
}

.stat-card h4{
    font-size:12px;
    color:#666;
    margin-bottom:10px;
    text-transform:uppercase;
}

.stat-card p{
    font-size:24px;
    font-weight:bold;
    color:#1a237e;
}

/* CHART */

.chart-box{
    background:white;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 4px 6px rgba(0,0,0,0.05);
    height:320px;
}

/* TABLE */

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

th{
    background:#1a237e;
    color:white;
    padding:12px;
    font-size:13px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f5f5;
}

/* SEARCH */

.search-box{
    width:100%;
    margin-bottom:15px;
}

/* MOBILE */

@media(max-width:768px){

    .stats-grid{
        grid-template-columns:1fr 1fr;
    }

    .controls{
        flex-direction:column;
    }

    th,td{
        font-size:12px;
        padding:8px;
    }

}

@media print{

    .controls,
    .search-box{
        display:none;
    }

    body{
        background:white;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <img src="logo.png"
    onerror="this.src='https://via.placeholder.com/70x70?text=VGA'">

    <h2>VEERAMALLU GLOBAL ACADEMY</h2>

    <p>Financial Collection Report Dashboard</p>

    <h3 id="reportTitle"></h3>

</div>

<!-- MAIN -->

<div class="container" id="captureArea">

    <!-- CONTROLS -->

    <div class="controls">

        <input type="date" id="reportDate">

        <button class="btn-gen" onclick="loadReport()">
            Generate Report
        </button>

        <button class="btn-pdf" onclick="downloadPDF()">
            Download PDF
        </button>

        <button class="btn-print" onclick="window.print()">
            Print
        </button>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

        <div class="stat-card">
            <h4>Daily Collection</h4>
            <p>₹ <span id="dailyTotal">0</span></p>
        </div>

        <div class="stat-card">
            <h4>Monthly Collection</h4>
            <p>₹ <span id="monthlyTotal">0</span></p>
        </div>

        <div class="stat-card">
            <h4>Yearly Collection</h4>
            <p>₹ <span id="yearlyTotal">0</span></p>
        </div>

        <div class="stat-card">
            <h4>Total Payments</h4>
            <p><span id="studentCount">0</span></p>
        </div>

    </div>

    <!-- BAR CHART -->

    <div class="chart-box">
        <canvas id="collectionChart"></canvas>
    </div>

    <!-- PIE CHART -->

    <div class="chart-box">
        <canvas id="campusChart"></canvas>
    </div>

    <!-- SEARCH -->

    <input
        type="text"
        id="searchBox"
        class="search-box"
        placeholder="Search Student Name / ID / Campus">

    <!-- TABLE -->

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Campus</th>
                    <th>Amount</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* VARIABLES */

let collectionChart = null;
let campusChart = null;

/* TODAY DATE */

document.getElementById("reportDate").valueAsDate = new Date();

/* LOAD REPORT */

async function loadReport(){

    const selectedDate =
    document.getElementById("reportDate").value;

    if(!selectedDate) return;

    document.getElementById("reportTitle").innerText =
    "Report Date : " + selectedDate;

    const [year, month] = selectedDate.split("-");

    const monthKey = `${year}-${month}`;

    let dayAmt = 0;
    let monthAmt = 0;
    let yearAmt = 0;
    let count = 0;

    let campusData = {};

    let tableHtml = "";

    document.getElementById("tableBody").innerHTML =
    "<tr><td colspan='4' style='text-align:center;padding:20px'>Loading...</td></tr>";

    try{

        const snapshot =
        await db.collection("admissions").get();

        snapshot.forEach(doc => {

            const d = doc.data();

            const pDate =
            d.date ||
            d.paymentDate ||
            d.admissionDate ||
            "";

            /* FIXED AMOUNT LOGIC */

            const paid =
            parseFloat(
                d.paidAmount ||
                d.totalPaid ||
                0
            );

            /* DAILY */

            if(pDate.startsWith(selectedDate)){

                dayAmt += paid;

                count++;

                campusData[d.campus || "Unknown"] =
                (campusData[d.campus || "Unknown"] || 0)
                + paid;

                tableHtml += `
                <tr>
                    <td>${d.id || d.admNo || 'N/A'}</td>
                    <td>${d.name || 'N/A'}</td>
                    <td>${d.campus || 'N/A'}</td>
                    <td>₹${paid.toLocaleString()}</td>
                </tr>
                `;

            }

            /* MONTH */

            if(pDate.startsWith(monthKey)){
                monthAmt += paid;
            }

            /* YEAR */

            if(pDate.startsWith(year)){
                yearAmt += paid;
            }

        });

        /* UPDATE UI */

        document.getElementById("dailyTotal").innerText =
        dayAmt.toLocaleString();

        document.getElementById("monthlyTotal").innerText =
        monthAmt.toLocaleString();

        document.getElementById("yearlyTotal").innerText =
        yearAmt.toLocaleString();

        document.getElementById("studentCount").innerText =
        count;

        document.getElementById("tableBody").innerHTML =
        tableHtml ||
        `<tr>
            <td colspan="4"
            style="text-align:center;padding:20px;color:gray">
            No data found for this date.
            </td>
        </tr>`;

        /* CHARTS */

        initCollectionChart(dayAmt, monthAmt, yearAmt);

        initCampusChart(campusData);

    }

    catch(error){

        console.error(error);

        alert("Firebase Error / Internet Issue");

    }

}

/* BAR CHART */

function initCollectionChart(dayAmt, monthAmt, yearAmt){

    const ctx =
    document.getElementById("collectionChart");

    if(collectionChart){
        collectionChart.destroy();
    }

    collectionChart = new Chart(ctx, {

        type:'bar',

        data:{

            labels:[
                'Daily',
                'Monthly',
                'Yearly'
            ],

            datasets:[{

                label:'Collection',

                data:[
                    dayAmt,
                    monthAmt,
                    yearAmt
                ],

                backgroundColor:[
                    '#1a237e',
                    '#3949ab',
                    '#7986cb'
                ],

                borderRadius:8

            }]

        },

        options:{

            responsive:true,

            maintainAspectRatio:false,

            plugins:{
                legend:{
                    display:false
                }
            },

            scales:{
                y:{
                    beginAtZero:true
                }
            }

        }

    });

}

/* CAMPUS PIE CHART */

function initCampusChart(dataObj){

    const ctx =
    document.getElementById("campusChart");

    if(campusChart){
        campusChart.destroy();
    }

    campusChart = new Chart(ctx, {

        type:'pie',

        data:{

            labels:Object.keys(dataObj),

            datasets:[{

                data:Object.values(dataObj),

                backgroundColor:[
                    '#1a237e',
                    '#3949ab',
                    '#5c6bc0',
                    '#7986cb',
                    '#9fa8da'
                ]

            }]

        },

        options:{

            responsive:true,

            maintainAspectRatio:false

        }

    });

}

/* SEARCH */

document.getElementById("searchBox")
.addEventListener("keyup", function(){

    const value =
    this.value.toLowerCase();

    const rows =
    document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        row.style.display =
        row.innerText.toLowerCase().includes(value)
        ? ""
        : "none";

    });

});

/* DOWNLOAD PDF */

async function downloadPDF(){

    const area =
    document.getElementById("captureArea");

    const canvas =
    await html2canvas(area,{scale:2});

    const imgData =
    canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    const pdf =
    new jsPDF('p','mm','a4');

    const imgWidth = 190;

    const pageHeight = 295;

    const imgHeight =
    canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;

    let position = 10;

    pdf.addImage(
        imgData,
        'PNG',
        10,
        position,
        imgWidth,
        imgHeight
    );

    heightLeft -= pageHeight;

    while(heightLeft > 0){

        position = heightLeft - imgHeight;

        pdf.addPage();

        pdf.addImage(
            imgData,
            'PNG',
            10,
            position,
            imgWidth,
            imgHeight
        );

        heightLeft -= pageHeight;

    }

    pdf.save(
        `VGA_Report_${document.getElementById("reportDate").value}.pdf`
    );

}

/* AUTO LOAD */

window.onload = loadReport;

</script>

</body>
</html>
