<!DOCTYPE html>
<html>
<head>
    <title>VGA Financial Reports</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial; background:#f4f7f6; margin:0; }
        .header { text-align:center; padding:20px; background:#1a237e; color:white; }
        .header img { height:60px; }
        .container { padding:20px; max-width: 1000px; margin: auto; }
        
        .controls { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #1a237e; }
        .stat-card h4 { margin: 0; color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 22px; font-weight: bold; color: #1a237e; }

        .chart-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 300px; }
        
        table { width:100%; border-collapse:collapse; background:white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:12px; border-bottom:1px solid #eee; text-align: left; }
        th { background:#1a237e; color: white; font-size: 13px; font-weight: 500; }
        
        button { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gen { background: #1a237e; color: white; }
        .btn-gen:hover { background: #0d165f; }
        .btn-pdf { background: #d32f2f; color: white; }
        input[type="date"] { padding: 8px; border-radius: 5px; border: 1px solid #ddd; outline: none; }
    </style>
</head>

<body>

<div class="header">
    <img src="logo.png" onerror="this.src='https://via.placeholder.com/60x60?text=VGA'">
    <h2>VEERAMALLU GLOBAL ACADEMY</h2>
    <p>Financial Collection Report Dashboard</p>
</div>

<div class="container" id="captureArea">
    <div class="controls">
        <input type="date" id="reportDate">
        <button class="btn-gen" onclick="loadReport()">Generate Report</button>
        <button class="btn-pdf" onclick="downloadReport()">Save as Image</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h4>Daily Collection</h4>
            <p>₹ <span id="dailyTotal">0</span></p>
        </div>
        <div class="stat-card">
            <h4>Monthly Collection</h4>
            <p>₹ <span id="monthlyTotal">0</span></p>
        </div>
        <div class="stat-card">
            <h4>Yearly Collection</h4>
            <p>₹ <span id="yearlyTotal">0</span></p>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="collectionChart"></canvas>
    </div>

    <table>
        <thead>
            <tr><th>Student ID</th><th>Name</th><th>Campus</th><th>Amount (₹)</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let myChart = null;

// Initialize to Today
document.getElementById('reportDate').valueAsDate = new Date();

async function loadReport() {
    const selectedDate = document.getElementById("reportDate").value; 
    if (!selectedDate) return;

    const [year, month, day] = selectedDate.split("-");
    const monthKey = `${year}-${month}`;

    let dayAmt = 0, monthAmt = 0, yearAmt = 0;
    let tableHtml = "";

    try {
        const snapshot = await db.collection("admissions").get();

        snapshot.forEach(doc => {
            const d = doc.data();
            
            // Checks multiple possible field names for dates and amounts
            const pDate = d.date || d.paymentDate || d.admissionDate || ""; 
            const paid = Number(d.paidAmount || d.totalPaid || d.totalBalance || 0);

            // Daily Logic
            if (pDate.startsWith(selectedDate)) {
                dayAmt += paid;
                tableHtml += `<tr>
                    <td>${d.id || d.admNo || 'N/A'}</td>
                    <td>${d.name || 'N/A'}</td>
                    <td>${d.campus || 'N/A'}</td>
                    <td>₹${paid.toLocaleString()}</td>
                </tr>`;
            }

            // Monthly Logic
            if (pDate.startsWith(monthKey)) {
                monthAmt += paid;
            }

            // Yearly Logic
            if (pDate.startsWith(year)) {
                yearAmt += paid;
            }
        });

        document.getElementById("dailyTotal").innerText = dayAmt.toLocaleString();
        document.getElementById("monthlyTotal").innerText = monthAmt.toLocaleString();
        document.getElementById("yearlyTotal").innerText = yearAmt.toLocaleString();
        document.getElementById("tableBody").innerHTML = tableHtml || "<tr><td colspan='4' style='text-align:center; padding:20px; color:gray;'>No data found for this date.</td></tr>";

        initChart(dayAmt, monthAmt, yearAmt);

    } catch (e) {
        console.error(e);
        alert("Check internet/Firebase permissions.");
    }
}

function initChart(d, m, y) {
    const ctx = document.getElementById('collectionChart').getContext('2d');
    if (myChart) myChart.destroy();

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Day', 'Month', 'Year'],
            datasets: [{
                label: 'Collection (₹)',
                data: [d, m, y],
                backgroundColor: ['#1a237e', '#3949ab', '#7986cb'],
                borderWidth: 0,
                borderRadius: 5
            }]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            scales: {
                y: { beginAtZero: true, grid: { display: false } },
                x: { grid: { display: false } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function downloadReport() {
    const area = document.getElementById('captureArea');
    html2canvas(area, { scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `VGA_Report_${document.getElementById('reportDate').value}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
}

// Run on load
window.onload = loadReport;
</script>

</body>
</html>
