<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA | Parent Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #1a237e; --secondary: #c62828; --success: #2e7d32; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .nav-menu { background: var(--primary); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .logo-img { width: 100px; height: auto; margin-bottom: 8px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 20px; font-weight: 800; }
        .header p { margin: 2px 0; color: #666; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        .hidden { display: none; }
        .section-title { background: #f0f2f5; padding: 10px; border-radius: 4px; font-weight: 800; margin-top: 20px; color: var(--primary); font-size: 12px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .marks-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .marks-table th, .marks-table td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .absent-badge { background: #ffebee; color: #c62828; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin: 2px; display: inline-block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="nav-menu no-print"><a href="parent-view.html">Parent Login</a></div>

<div class="container">
    <div class="card" id="reportArea">
        <div class="header">
            <img src="logo.png" alt="VGA Logo" class="logo-img">
            <h1>VEERAMALLU GLOBAL ACADEMY</h1>
            <p>Parent Portal | Student Tracking</p>
        </div>

        <div id="loginSection">
            <label>Admission Number</label>
            <input type="text" id="loginAdmNo" placeholder="VGA-2026-0001">
            <label>Parent Mobile Number</label>
            <input type="text" id="loginMobile" placeholder="Registered Mobile No.">
            <button class="btn-action" onclick="checkStudent()">VIEW DASHBOARD</button>
        </div>

        <div id="dashboard" class="hidden">
            <h2 id="dispName" style="color: var(--primary); margin: 0; text-align: center;"></h2>
            <p id="dispInfo" style="color: #666; font-size: 13px; text-align: center; margin-top: 5px;"></p>
            
            <div id="noticeBox" style="display: none; background: #fff9c4; border-left: 5px solid #fbc02d; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                <label style="color: #f57f17; font-weight: 900;">📢 SCHOOL ANNOUNCEMENT</label>
                <p id="noticeText" style="margin: 5px 0; font-size: 14px; color: #333;"></p>
                <div id="noticeDate" style="font-size: 10px; color: #777; text-align: right;"></div>
            </div>

            <div class="section-title">📅 ATTENDANCE SUMMARY</div>
            <div class="data-row">
                <span>Today's Status (<b id="currentDate"></b>):</span>
                <span id="attStatus">Loading...</span>
            </div>
            
            <div class="no-print" style="display: flex; gap: 5px; margin-top: 10px;">
                <select id="histMonth">
                    <option value="01">January</option><option value="02">February</option><option value="03">March</option>
                    <option value="04">April</option><option value="05">May</option><option value="06">June</option>
                    <option value="07">July</option><option value="08">August</option><option value="09">September</option>
                    <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                </select>
                <button onclick="fetchAttendanceHistory()" style="background:#5c6bc0; color:white; border:none; border-radius:6px; padding:0 15px; cursor:pointer;">HISTORY</button>
            </div>
            <div id="historyArea"></div>

            <div class="section-title">📊 ACADEMIC PERFORMANCE</div>
            <select id="parentExamView" class="no-print" style="margin-top:10px;" onchange="fetchParentMarks()">
                <option value="">-- Select Exam --</option>
                <option value="FA1">FA1</option><option value="FA2">FA2</option><option value="SA1">SA1</option><option value="SA2">SA2</option>
            </select>
            <div id="marksArea"></div>

            <div class="section-title">💰 FEE SUMMARY</div>
            <div id="feeArea"></div>
            
            <div class="card mt-4" id="homeworkSection">
            <div class="p-3 bg-primary text-white rounded-t-lg">
            <h3 class="font-bold">📚 Today's Homework</h3>
          </div>
            <div id="homeworkDisplay" class="p-4 bg-white border rounded-b-lg shadow">
            <p class="text-gray-500 italic">Fetching homework for your class...</p>
    </div>
</div>

            <button class="btn-action no-print" style="margin-top:20px; background: #4527a0;" onclick="downloadPDF()">📥 DOWNLOAD PDF REPORT</button>
            <button class="btn-action no-print" style="margin-top:10px; background:#555;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currentStudent = null;

async function checkStudent() {
    const admNo = document.getElementById("loginAdmNo").value.trim();
    const mobile = document.getElementById("loginMobile").value.trim();
    try {
        const doc = await db.collection("admissions").doc(admNo).get();
        if(!doc.exists) return alert("Admission Number not found.");
        const data = doc.data();
        if(data.mobile !== mobile) return alert("Mobile number mismatch.");
        currentStudent = data;
        showDashboard();
    } catch (e) { alert(e.message); }
}

function showDashboard() {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("dispName").innerText = currentStudent.name;
    document.getElementById("dispInfo").innerText = `Class: ${currentStudent.class} | ID: ${currentStudent.id}`;
    document.getElementById("currentDate").innerText = new Date().toLocaleDateString('en-IN');
    document.getElementById("feeArea").innerHTML = `<div class="data-row"><span>Total Balance Due:</span><b style="color:red">₹${currentStudent.totalBalance}</b></div>`;
    
    fetchAnnouncement();
    fetchDailyAttendance();
}
async function fetchAnnouncement() {
    // This looks at the "latest" document inside the "notifications" collection
    const doc = await db.collection("notifications").doc("latest").get();
    
    if(doc.exists) {
        const data = doc.data();
        document.getElementById("noticeBox").style.display = "block";
        document.getElementById("noticeText").innerText = data.text;
        
        // This fixes the "undefined" date issue from earlier
        document.getElementById("noticeDate").innerText = data.date || ""; 
    } else {
        // If no notice exists, hide the box
        document.getElementById("noticeBox").style.display = "none";
    }
}


async function fetchDailyAttendance() {
    const now = new Date();
    const todaySearch = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    const statusEl = document.getElementById("attStatus");
    try {
        const query = await db.collection("daily_attendance").where("date", "==", todaySearch).where("className", "==", currentStudent.class).get();
        if (query.empty) { statusEl.innerHTML = "<i>Not Marked</i>"; return; }
        let found = "Not Marked";
        query.forEach(doc => {
            const rec = (doc.data().records || []).find(r => r.id === currentStudent.id);
            if (rec) found = rec.status;
        });
        statusEl.innerHTML = `<b style="color:${found=='Present'?'green':'red'}">${found.toUpperCase()}</b>`;
    } catch (e) { statusEl.innerText = "Error"; }
}

async function fetchAttendanceHistory() {
    const month = document.getElementById("histMonth").value;
    const year = new Date().getFullYear();
    const area = document.getElementById("historyArea");
    area.innerHTML = "<p style='font-size:11px;'>Calculating...</p>";
    try {
        const query = await db.collection("daily_attendance").where("className", "==", currentStudent.class).get();
        let working = 0, present = 0, absents = [];
        query.forEach(doc => {
            const d = doc.data();
            if (d.date.startsWith(`${year}-${month}`)) {
                working++;
                const rec = (d.records || []).find(r => r.id === currentStudent.id);
                if (rec && rec.status === "Present") present++;
                else absents.push(d.date);
            }
        });
        if (working === 0) { area.innerHTML = "<p style='color:orange; font-size:11px;'>No data for this month.</p>"; return; }
        area.innerHTML = `
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-top:10px; border:1px solid #eee;">
                <div class="data-row"><span>Working/Present:</span><b>${working} / ${present}</b></div>
                <div class="data-row"><span>Percentage:</span><b>${((present/working)*100).toFixed(1)}%</b></div>
                ${absents.length > 0 ? `<div style="margin-top:5px;"><label style="color:red; font-size:9px;">Absent Dates:</label><br>${absents.map(date => `<span class="absent-badge">${date}</span>`).join('')}</div>` : ''}
            </div>`;
    } catch (e) { area.innerHTML = "Error"; }
}

async function fetchParentMarks() {
    const exam = document.getElementById("parentExamView").value;
    const area = document.getElementById("marksArea");
    if (!exam) return area.innerHTML = "";
    try {
        const doc = await db.collection("marks").doc(`${currentStudent.id}_${exam}`).get();
        if (!doc.exists) { area.innerHTML = "<p style='text-align:center; padding:10px;'>No marks found.</p>"; return; }
        const subs = doc.data().subjects;
        let html = `<table class="marks-table"><tr><th>Subject</th><th>Marks</th></tr>`;
        let total = 0, count = 0;
        for (let s in subs) { 
            let m = parseFloat(subs[s]) || 0; total += m; count++;
            html += `<tr><td>${s}</td><td>${m}</td></tr>`; 
        }
        const max = count * (exam.startsWith("SA") ? 100 : 50);
        const per = (total / max) * 100;
        let gr = per >= 90 ? "A1" : per >= 80 ? "A2" : per >= 70 ? "B1" : per >= 60 ? "B2" : per >= 50 ? "C1" : per >= 40 ? "C2" : "D";
        area.innerHTML = html + `<tr style="background:#f0f2f5; font-weight:bold;"><td>TOTAL</td><td>${total} / ${max}</td></tr>
            <tr style="background:#e8f5e9; font-weight:bold; color:green;"><td>GRADE</td><td>${per.toFixed(1)}% - ${gr}</td></tr></table>`;
    } catch (e) { area.innerHTML = "Error"; }
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    html2canvas(document.getElementById("reportArea"), { scale: 2 }).then(canvas => {
        const img = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(img, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`${currentStudent.name}_Report.pdf`);
    });
}
    // Function to load homework based on student's class
async function loadParentHomework() {
    const homeworkDisplay = document.getElementById('homeworkDisplay');
    
    try {
        const user = firebase.auth().currentUser;
        if (!user) return;

        // 1. Identify the student's class (e.g., "Class 1") from their profile
        const studentDoc = await db.collection("students").doc(user.uid).get();
        
        if (!studentDoc.exists) {
            homeworkDisplay.innerHTML = "<p>Student profile not found.</p>";
            return;
        }

        const studentClass = studentDoc.data().class; // Matches "Class 1", "Class 2", etc.

        // 2. Format today's date to YYYY-MM-DD to match the teacher's 'date' field
        const today = new Date().toLocaleDateString('en-CA'); 

        // 3. Query the 'homeworks' collection used in your teacher's code
        const snapshot = await db.collection("homeworks")
            .where("class", "==", studentClass)
            .where("date", "==", today)
            .get();

        if (snapshot.empty) {
            homeworkDisplay.innerHTML = `
                <div style="text-align:center; padding:20px; color:gray;">
                    No homework posted for ${studentClass} today.
                </div>`;
            return;
        }

        // 4. Build the UI using the school's official blue-header style
        let html = `
            <div class="group-container" style="border: 1px solid #1a237e; border-radius:12px; overflow:hidden; text-align:left;">
                <div class="group-header" style="background:#1a237e; color:white; padding:12px; display:flex; justify-content:space-between; font-weight:bold;">
                    <span>${studentClass}</span>
                    <span>Today</span>
                </div>
                <table style="width:100%; border-collapse:collapse;">
        `;

        snapshot.forEach(doc => {
            const d = doc.data();
            html += `
                <tr>
                    <td style="padding:12px; border-bottom:1px solid #eee; font-weight:bold; color:#1a237e; width:35%; border-right:1px solid #eee;">
                        ${d.subject}
                    </td>
                    <td style="padding:12px; border-bottom:1px solid #eee; font-size:14px;">
                        ${d.homework}
                    </td>
                </tr>
            `;
        });

        html += `</table></div>`;
        homeworkDisplay.innerHTML = html;

    } catch (error) {
        console.error("Error loading homework:", error);
        homeworkDisplay.innerHTML = "<p style='color:red;'>Connection error. Please refresh.</p>";
    }
}

</script>
</body>
</html>
