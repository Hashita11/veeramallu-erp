<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA | Parent Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary-color: #1a237e; --secondary-color: #c62828; --success-color: #2e7d32; --bg-light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        .nav-menu { background: var(--primary-color); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .logo-img { width: 100px; height: auto; margin-bottom: 8px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 20px; font-weight: 800; }
        .header p { margin: 2px 0; color: #666; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-action { background: var(--primary-color); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        .hidden { display: none; }
        .section-title { background: #f0f2f5; padding: 10px; border-radius: 4px; font-weight: 800; margin-top: 20px; color: var(--primary-color); font-size: 12px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .marks-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .marks-table th, .marks-table td { padding: 8px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div class="nav-menu no-print">
    <a href="parent-view.html">Parent Login</a>
</div>

<div class="container">
    <div class="card" id="reportArea">
        <div class="header">
            <img src="logo.png" alt="VGA Logo" class="logo-img">
            <h1>VEERAMALLU GLOBAL ACADEMY</h1>
            <p>Parent Portal | Student Tracking</p>
        </div>

        <div id="loginSection">
            <label>Admission Number</label>
            <input type="text" id="loginAdmNo" placeholder="VGA-2026-0001">
            <label>Parent Mobile Number</label>
            <input type="text" id="loginMobile" placeholder="Registered Mobile No.">
            <button class="btn-action" onclick="checkStudent()">VIEW DASHBOARD</button>
        </div>

        <div id="dashboard" class="hidden">
            <h2 id="dispName" style="color: var(--primary-color); margin: 0; text-align: center;"></h2>
            <p id="dispInfo" style="color: #666; font-size: 13px; text-align: center; margin-top: 5px;"></p>
            
            <div id="noticeBox" style="display: none; background: #fff9c4; border-left: 5px solid #fbc02d; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                <label style="color: #f57f17; font-weight: 900;">📢 SCHOOL ANNOUNCEMENT</label>
                <p id="noticeText" style="margin: 5px 0; font-size: 14px; color: #333;"></p>
                <div id="noticeDate" style="font-size: 10px; color: #777; text-align: right;"></div>
            </div>

            <div class="section-title">TODAY'S ATTENDANCE</div>
            <div class="data-row">
                <span>Date: <b id="currentDate"></b></span>
                <span id="attStatus">Loading...</span>
            </div>

            <div class="section-title">📊 ACADEMIC PERFORMANCE</div>
            <select id="parentExamView" style="margin-top:10px;" onchange="fetchParentMarks()">
                <option value="">-- Select Exam --</option>
                <option value="FA1">FA1</option><option value="FA2">FA2</option>
                <option value="FA1">FA3</option><option value="FA2">FA4</option>
                <option value="SA1">SA1</option><option value="SA2">SA2</option>
            </select>
            <div id="marksArea"></div>

            <div class="section-title">FEE SETTLEMENT SUMMARY</div>
            <div id="feeArea"></div>

            <button class="btn-action no-print" style="margin-top:20px; background: #4527a0;" onclick="downloadPDF()">📥 DOWNLOAD REPORT (PDF)</button>
            <button class="btn-action no-print" style="margin-top:10px; background:#555;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentStudent = null;

async function checkStudent() {
    const admNo = document.getElementById("loginAdmNo").value.trim();
    const mobile = document.getElementById("loginMobile").value.trim();

    try {
        const doc = await db.collection("admissions").doc(admNo).get();
        if(!doc.exists) return alert("Admission Number not found.");
        
        const data = doc.data();
        if(data.mobile !== mobile) return alert("Mobile number mismatch.");

        currentStudent = data;
        showDashboard();
    } catch (e) { alert(e.message); }
}

function showDashboard() {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    
    document.getElementById("dispName").innerText = currentStudent.name;
    document.getElementById("dispInfo").innerText = `Class: ${currentStudent.class} | ID: ${currentStudent.id}`;
    document.getElementById("currentDate").innerText = new Date().toLocaleDateString('en-IN');
    
    document.getElementById("feeArea").innerHTML = `<div class="data-row"><span>Balance Due:</span><b style="color:red">₹${currentStudent.totalBalance}</b></div>`;

    fetchAnnouncement();
    fetchAttendance();
}

async function fetchAnnouncement() {
    const doc = await db.collection("notifications").doc("latest").get();
    if(doc.exists) {
        document.getElementById("noticeBox").style.display = "block";
        document.getElementById("noticeText").innerText = doc.data().text;
        document.getElementById("noticeDate").innerText = doc.data().date;
    }
}

// ✅ FIXED: CORRECTLY SEARCHES ARRAY OF MAPS IN 'daily_attendance'
async function fetchAttendance() {
    const today = new Date().toISOString().split('T')[0]; // Format: YYYY-MM-DD
    const statusEl = document.getElementById("attStatus");

    try {
        const query = await db.collection("daily_attendance")
            .where("date", "==", today)
            .where("className", "==", currentStudent.class)
            .get();

        if (query.empty) {
            statusEl.innerHTML = `<span style="color:orange">Not Marked</span>`;
            return;
        }

        let foundStatus = "Not Marked";
        query.forEach(doc => {
            const records = doc.data().records || [];
            const myRecord = records.find(r => r.id === currentStudent.id);
            if (myRecord) foundStatus = myRecord.status;
        });

        const color = foundStatus === "Present" ? "green" : "red";
        statusEl.innerHTML = `<b style="color:${color}">${foundStatus.toUpperCase()}</b>`;
    } catch (e) {
        statusEl.innerText = "Error loading";
    }
}

async function fetchParentMarks() {
    const exam = document.getElementById("parentExamView").value;
    const area = document.getElementById("marksArea");
    if (!exam) return area.innerHTML = "";

    area.innerHTML = "<p style='text-align:center;'>Loading Marks...</p>";

    try {
        const doc = await db.collection("marks").doc(`${currentStudent.id}_${exam}`).get();
        if (!doc.exists) {
            area.innerHTML = "<p style='text-align:center; padding:10px;'>No marks found for this exam.</p>";
            return;
        }

        const subjects = doc.data().subjects;
        let tableHtml = `
            <table class="marks-table">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>
                </thead>
                <tbody>`;

        let grandTotal = 0;
        let subjectCount = 0;

        for (let sub in subjects) {
            let mark = parseFloat(subjects[sub]) || 0;
            grandTotal += mark;
            subjectCount++;
            tableHtml += `<tr><td>${sub}</td><td>${mark}</td></tr>`;
        }

        // --- CALCULATION LOGIC ---
        // Assuming FA marks are out of 50 and SA marks out of 100
        const maxPerSubject = exam.startsWith("SA") ? 100 : 50;
        const totalMaxMarks = subjectCount * maxPerSubject;
        const percentage = (grandTotal / totalMaxMarks) * 100;

        // Determine Grade
        let overallGrade = "";
        if (percentage >= 90) overallGrade = "A1";
        else if (percentage >= 80) overallGrade = "A2";
        else if (percentage >= 70) overallGrade = "B1";
        else if (percentage >= 60) overallGrade = "B2";
        else if (percentage >= 50) overallGrade = "C1";
        else if (percentage >= 40) overallGrade = "C2";
        else overallGrade = "D";

        tableHtml += `
                <tr style="background:#f0f2f5; font-weight:bold;">
                    <td>TOTAL MARKS</td>
                    <td>${grandTotal} / ${totalMaxMarks}</td>
                </tr>
                <tr style="background:#e8f5e9; font-weight:bold; color:#2e7d32;">
                    <td>PERCENTAGE / GRADE</td>
                    <td>${percentage.toFixed(1)}% - ${overallGrade}</td>
                </tr>
            </tbody>
        </table>`;

        area.innerHTML = tableHtml;

    } catch (e) {
        console.error(e);
        area.innerHTML = "Error loading marks.";
    }
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    html2canvas(document.getElementById("reportArea"), { scale: 2 }).then(canvas => {
        const img = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(img, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`${currentStudent.name}_Report.pdf`);
    });
}
</script>
</body>
</html>
