<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA | Parent Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary-color: #1a237e; --secondary-color: #c62828; --success-color: #2e7d32; --bg-light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        .nav-menu { background: var(--primary-color); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .logo-img { width: 100px; height: auto; margin-bottom: 8px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 20px; font-weight: 800; }
        .header p { margin: 2px 0; color: #666; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-action { background: var(--primary-color); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 15px; text-transform: uppercase; margin-top: 10px; }
        .hidden { display: none; }
        .section-title { background: #f0f2f5; padding: 10px; border-radius: 4px; font-weight: 800; margin-top: 20px; color: var(--primary-color); font-size: 12px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; color: white; font-size: 12px; font-weight: bold; }
        .bg-present { background: var(--success-color); }
        .bg-absent { background: var(--secondary-color); }
        .marks-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .marks-table th, .marks-table td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .grade-bold { font-weight: 800; color: var(--secondary-color); }
    </style>
</head>
<body>

<div class="nav-menu"><a>VGA Parent Portal</a></div>

<div class="container">
    <div class="card">
        <div class="header">
            <img src="logo.png" alt="Logo" class="logo-img">
            <h1>VEERAMALLU GLOBAL ACADEMY</h1>
            <p>Student Progress Report</p>
        </div>

        <div id="loginSection">
            <label>Admission No</label><input type="text" id="loginAdmNo">
            <label>Mobile No</label><input type="text" id="loginMobile">
            <button class="btn-action" onclick="checkStudent()">Login</button>
        </div>

        <div id="dashboard" class="hidden">
            <div id="noticeBox" style="display: none; background: #fff9c4; border-left: 5px solid #fbc02d; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                <b style="color: #f57f17;">📢 ANNOUNCEMENT:</b>
                <p id="noticeText" style="margin: 5px 0; font-weight: 600;"></p>
                <small id="noticeDate" style="color: #777;"></small>
            </div>

            <h2 id="dispName" style="color: var(--primary-color); text-align: center; margin-bottom: 0;"></h2>
            <p id="dispInfo" style="text-align: center; color: #666; margin-top: 5px;"></p>

            <div class="section-title">TODAY'S ATTENDANCE</div>
            <div class="data-row"><span>Date: <b id="currentDate"></b></span> <span id="attStatus">-</span></div>

            <div class="section-title">📊 ACADEMIC PERFORMANCE</div>
            <select id="parentExamView" onchange="fetchParentMarks()">
                <option value="">-- Choose Exam --</option>
                <option value="FA1">FA1</option><option value="FA2">FA2</option><option value="FA3">FA3</option><option value="FA4">FA4</option>
                <option value="SA1">SA1</option><option value="SA2">SA2</option>
            </select>
            <div id="marksArea"></div>

            <div id="feeSection">
                <div class="section-title">FEE SUMMARY</div>
                <div id="feeArea"></div>
            </div>

            <div id="signatureArea" style="display: none; margin-top: 40px; justify-content: space-between;">
                <div style="text-align: center; border-top: 1px solid #000; width: 120px; padding-top: 5px; font-size: 10px;">PARENT SIGNATURE</div>
                <div style="text-align: center; border-top: 1px solid #000; width: 120px; padding-top: 5px; font-size: 10px;">
                    <span style="color: blue; font-style: italic;">Digitally Verified</span><br><b>PRINCIPAL</b>
                </div>
            </div>

            <button id="dlBtn" class="btn-action" style="display: none; background: #4527a0;" onclick="downloadPDF()">📥 Download PDF Report</button>
            <button class="btn-action" style="background:#555;" onclick="location.reload()">Logout</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx64969815ddd251fe3", 
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339669496",
        appId: "1:379339669496:web:6c2becb98190b4e43a8d2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function checkStudent() {
        const adm = document.getElementById('loginAdmNo').value;
        const mob = document.getElementById('loginMobile').value;
        const doc = await db.collection("admissions").doc(adm).get();
        if (doc.exists && doc.data().parentMobile === mob) { showDashboard(doc.data()); }
        else { alert("Invalid Credentials"); }
    }

    function showDashboard(data) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('dispName').innerText = data.studentName;
        document.getElementById('dispInfo').innerText = `Class: ${data.joinClass} | Campus: ${data.campus}`;
        
        // Live Notifications
        db.collection("notifications").doc("latest").onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('noticeBox').style.display = 'block';
                document.getElementById('noticeText').innerText = doc.data().text;
                document.getElementById('noticeDate').innerText = doc.data().date;
            }
        });

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('currentDate').innerText = today;
        document.getElementById('feeArea').innerHTML = `<div class="data-row"><span>Balance Due:</span> <b style="color:red">₹ ${data.grandBalance || 0}</b></div>`;
    }

    async function fetchParentMarks() {
        const admNo = document.getElementById('loginAdmNo').value;
        const exam = document.getElementById('parentExamView').value;
        if(!exam) return;
        
        const snapshot = await db.collection("marks").get();
        let html = `<table class="marks-table"><thead><tr><th>Subject</th><th>Marks</th><th>Grade</th></tr></thead><tbody>`;
        let found = false, gTotal = 0, mTotal = 0;

        snapshot.forEach(doc => {
            const m = doc.data();
            if(doc.id.startsWith(admNo) && m.examType === exam) {
                const subMax = exam.startsWith("SA") ? 100 : 50;
                const isFail = parseFloat(m.total) < (subMax * 0.4);
                html += `<tr><td>${m.subject}</td><td style="${isFail?'color:red':''}">${m.total}</td><td>${isFail?'F':m.grade}</td></tr>`;
                gTotal += parseFloat(m.total); mTotal += subMax;
                found = true;
            }
        });

        if(found) {
            const per = ((gTotal/mTotal)*100).toFixed(1);
            html += `<tr style="background:#eee"><td><b>TOTAL</b></td><td><b>${gTotal}/${mTotal}</b></td><td><b>${per}%</b></td></tr></tbody></table>`;
            document.getElementById('marksArea').innerHTML = html;
            document.getElementById('dlBtn').style.display = 'block';
            document.getElementById('signatureArea').style.display = 'flex';
        } else {
            document.getElementById('marksArea').innerHTML = "<p>No marks found.</p>";
            document.getElementById('dlBtn').style.display = 'none';
        }
    }

    async function downloadPDF() {
        const element = document.getElementById('dashboard').cloneNode(true);
        // Hide buttons from PDF
        element.querySelectorAll('button, select').forEach(el => el.style.display = 'none');
        
        const opt = {
            margin: 10,
            filename: 'VGA_Report_Card.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, width: 600 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
