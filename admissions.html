<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admin | Admission 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vga-blue: #1e40af; /* Royal Blue */
            --vga-light-blue: #dbeafe;
            --vga-gold: #facc15;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .admission-card {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(30, 64, 175, 0.1);
            overflow: hidden;
            border-top: 10px solid var(--vga-blue);
        }

        .header {
            padding: 25px;
            text-align: center;
            background: white;
            border-bottom: 2px solid var(--vga-light-blue);
        }

        .logo { max-width: 140px; margin-bottom: 10px; }

        .form-body { padding: 35px; }

        .section-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--vga-blue);
            text-transform: uppercase;
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::after {
            content: "";
            flex: 1;
            height: 2px;
            background: var(--vga-light-blue);
        }

        /* Identity Info Grid */
        .identity-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        /* 3-Column Fee Grid Adjustment */
        .fee-grid-3col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }

        label { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #64748b; }

        input, select {
            padding: 12px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--vga-blue); outline: none; box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1); }

        /* Colorful Independent Fee Boxes */
        .fee-box {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--vga-light-blue);
        }
        .bg-blue { background: #f0f7ff; border-top: 4px solid var(--vga-blue); }
        .bg-gold { background: #fffdf0; border-top: 4px solid var(--vga-gold); }

        /* Summary Dashboard - Now Blue */
        .summary-dashboard {
            background: var(--vga-blue);
            color: white;
            padding: 30px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            text-align: center;
            margin-top: 30px;
        }

        .val { font-size: 26px; font-weight: 700; display: block; }
        .lbl { font-size: 11px; text-transform: uppercase; opacity: 0.9; letter-spacing: 1px; }

        .paid-input {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            width: 130px;
            text-align: center;
            font-size: 20px;
            border-radius: 6px;
            margin-top: 5px;
        }

        .btn-submit {
            width: 100%;
            background: var(--vga-blue);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #172554; transform: translateY(-2px); }

        @media (max-width: 850px) {
            .identity-grid { grid-template-columns: repeat(2, 1fr); }
            .fee-grid-3col { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="admission-card">
    <div class="header">
        <img src="logo.png" alt="VGA Logo" class="logo">
        <h1 style="margin:0; font-size:24px; color:var(--vga-blue);">Student Admission 2026-27</h1>
    </div>

    <form class="form-body" id="vgaAdmissionForm">
        <div class="section-header">Academic & Personal Info</div>
        <div class="identity-grid">
            <div class="form-group"><label>Admission No</label><input type="text" placeholder="e.g. 1530"></div>
            <div class="form-group"><label>Campus</label><select><option>Velpur</option><option>Relangi</option><option>Undrajavaram</option></select></div>
            <div class="form-group"><label>Student Name</label><input type="text" required></div>
            <div class="form-group"><label>Parent Name</label><input type="text"></div>
            <div class="form-group"><label>Aadhaar No</label><input type="text" maxlength="12"></div>
            <div class="form-group"><label>Place</label><input type="text"></div>
            <div class="form-group"><label>Class / Sec</label><input type="text"></div>
            <div class="form-group"><label>Parent Mobile</label><input type="tel"></div>
        </div>

        <div class="section-header">Fee Details (3-Column Layout)</div>
        <div class="fee-grid-3col">
            <div class="form-group fee-box bg-blue">
                <label>Admission Fee</label>
                <input type="number" id="f1" value="0" oninput="calc()">
            </div>
            <div class="form-group fee-box bg-blue">
                <label>Tuition Fee</label>
                <input type="number" id="f2" value="0" oninput="calc()">
            </div>
            <div class="form-group fee-box bg-gold">
                <label>Books & Stationery</label>
                <input type="number" id="f3" value="0" oninput="calc()">
            </div>
            <div class="form-group fee-box bg-gold">
                <label>Uniform Fee</label>
                <input type="number" id="f4" value="0" oninput="calc()">
            </div>
            <div class="form-group fee-box bg-blue">
                <label>Exam Fee</label>
                <input type="number" id="f5" value="0" oninput="calc()">
            </div>
            <div class="form-group fee-box bg-blue">
                <label>Transport Fee</label>
                <input type="number" id="f6" value="0" oninput="calc()">
            </div>
        </div>

        <div class="summary-dashboard">
            <div>
                <span class="lbl">Grand Total</span>
                <span class="val" id="total">₹ 0</span>
            </div>
            <div>
                <span class="lbl">Amount Paid</span>
                <input type="number" id="paid" class="paid-input" value="0" oninput="calc()">
            </div>
            <div>
                <span class="lbl" style="color:var(--vga-gold);">Balance Due</span>
                <span class="val" id="balance" style="color:var(--vga-gold);">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="alert('Record Saved Successfully!')">Submit Admission Record</button>
    </form>
</div>

<script>
    function calc() {
        let total = 0;
        for(let i=1; i<=6; i++) {
            total += parseFloat(document.getElementById('f'+i).value) || 0;
        }
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const bal = total - paid;

        document.getElementById('total').innerText = "₹ " + total.toLocaleString('en-IN');
        document.getElementById('balance').innerText = "₹ " + bal.toLocaleString('en-IN');
    }
</script>

</body>
</html>
