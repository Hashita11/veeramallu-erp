<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admission Portal 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vga-blue: #003399;
            --vga-gold: #ffcc00;
            --section-bg: #f0f4f8;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #d1d9e6;
            margin: 0;
            padding: 20px;
        }

        .master-card {
            max-width: 1000px;
            margin: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            border: 2px solid var(--vga-blue);
            overflow: hidden;
        }

        .header {
            background: var(--vga-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header img { max-width: 150px; background: white; padding: 5px; border-radius: 5px; }

        .form-content { padding: 30px; }

        /* HEADING DESIGN */
        .main-heading {
            background: var(--vga-blue);
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 25px 0 15px 0;
            border-radius: 5px;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* Information Grid (4 Columns) */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 10px;
        }

        /* Fee Grid (3 Columns) */
        .fee-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .field-box {
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
            border: 1px solid #ced4da;
            padding: 12px;
            border-radius: 8px;
        }

        .fee-box {
            border-left: 6px solid var(--vga-blue);
            background: var(--section-bg);
        }

        label {
            font-size: 12px;
            font-weight: 700;
            color: var(--vga-blue);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input, select {
            padding: 12px;
            border: 2px solid #adb5bd;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            color: #000;
        }

        input:focus { border-color: var(--vga-gold); outline: none; background: #fff; }

        /* Dashboard Footer */
        .dashboard {
            background: var(--vga-blue);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dash-col { text-align: center; flex: 1; }
        .dash-label { font-size: 14px; opacity: 0.9; text-transform: uppercase; }
        .dash-val { font-size: 32px; font-weight: 700; display: block; margin-top: 5px; }

        .paid-input {
            width: 140px;
            background: white;
            color: black;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border: 3px solid var(--vga-gold);
            border-radius: 5px;
        }

        .btn-submit {
            width: 100%;
            background: #28a745;
            color: white;
            padding: 20px;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .info-grid { grid-template-columns: 1fr 1fr; }
            .fee-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 500px) {
            .info-grid, .fee-grid { grid-template-columns: 1fr; }
            .dashboard { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="master-card">
    <div class="header">
        <img src="logo.png" alt="VGA LOGO">
        <h1 style="margin:10px 0 0 0; font-size: 26px;">VEERAMALLU GLOBAL ACADEMY</h1>
    </div>

    <form class="form-content" id="admissionForm">
        
        <div class="main-heading">Academic Information</div>
        <div class="info-grid">
            <div class="field-box"><label>Admission No</label><input type="text" placeholder="e.g. 1530"></div>
            <div class="field-box">
                <label>Campus</label>
                <select>
                    <option>Velpur Campus</option>
                    <option>Relangi Campus</option>
                    <option>Undrajavaram Campus</option>
                </select>
            </div>
            <div class="field-box"><label>Student Name</label><input type="text" required></div>
            <div class="field-box"><label>Parent Name</label><input type="text"></div>
            <div class="field-box"><label>Aadhaar Number</label><input type="text" maxlength="12"></div>
            <div class="field-box"><label>Place / Village</label><input type="text"></div>
            <div class="field-box"><label>Class & Section</label><input type="text"></div>
            <div class="field-box"><label>Mobile Number</label><input type="tel"></div>
        </div>

        <div class="main-heading">Fee Details</div>
        <div class="fee-grid">
            <div class="field-box fee-box"><label>Admission Fee</label><input type="number" id="f1" value="0" oninput="calc()"></div>
            <div class="field-box fee-box"><label>Tuition Fee</label><input type="number" id="f2" value="0" oninput="calc()"></div>
            <div class="field-box fee-box"><label>Books Fee</label><input type="number" id="f3" value="0" oninput="calc()"></div>
            <div class="field-box fee-box"><label>Uniform Fee</label><input type="number" id="f4" value="0" oninput="calc()"></div>
            <div class="field-box fee-box"><label>Exam Fee</label><input type="number" id="f5" value="0" oninput="calc()"></div>
            <div class="field-box fee-box"><label>Transport Fee</label><input type="number" id="f6" value="0" oninput="calc()"></div>
        </div>

        <div class="dashboard">
            <div class="dash-col">
                <span class="dash-label">Grand Total</span>
                <span class="dash-val" id="total">₹ 0</span>
            </div>
            <div class="dash-col">
                <span class="dash-label">Amount Paid</span><br>
                <input type="number" id="paid" class="paid-input" value="0" oninput="calc()">
            </div>
            <div class="dash-col">
                <span class="dash-label" style="color:var(--vga-gold);">Balance Due</span>
                <span class="dash-val" id="balance" style="color:var(--vga-gold);">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="alert('Admission Data Saved!')">Finalize Admission</button>
    </form>
</div>

<script>
    function calc() {
        let total = 0;
        for(let i=1; i<=6; i++) {
            total += parseFloat(document.getElementById('f'+i).value) || 0;
        }
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const balance = total - paid;

        document.getElementById('total').innerText = "₹ " + total.toLocaleString('en-IN');
        document.getElementById('balance').innerText = "₹ " + balance.toLocaleString('en-IN');
    }
</script>

</body>
</html>
