<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admin Portal 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #1e40af;
            --soft-blue: #eff6ff;
            --gold: #facc15;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }

        .master-card {
            max-width: 950px;
            margin: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 10px solid var(--royal-blue);
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo { max-width: 130px; }

        .form-content { padding: 30px; }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--royal-blue);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
            border-left: 4px solid var(--gold);
            padding-left: 10px;
        }

        /* Top 4-Column Layout */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Fee 3-Column Layout (3 across, 2 down) */
        .fee-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .form-group { display: flex; flex-direction: column; }

        label { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #64748b; }

        input, select {
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus { outline: none; border-color: var(--royal-blue); background: var(--soft-blue); }

        /* Colored Fee Boxes */
        .fee-box {
            padding: 12px;
            border-radius: 10px;
            background: var(--soft-blue);
            border-left: 5px solid var(--royal-blue);
        }

        /* Footer Dashboard */
        .footer-dashboard {
            background: var(--royal-blue);
            color: white;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .stat-item { flex: 1; }
        .stat-label { font-size: 11px; opacity: 0.8; text-transform: uppercase; }
        .stat-val { font-size: 24px; font-weight: 700; display: block; }

        .paid-box {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            width: 120px;
            text-align: center;
            font-size: 20px;
            border-radius: 5px;
            padding: 5px;
        }

        .btn-submit {
            width: 100%;
            background: var(--royal-blue);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 800px) {
            .info-grid { grid-template-columns: 1fr 1fr; }
            .fee-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="master-card">
    <div class="header">
        <img src="logo.png" alt="VGA Logo" class="logo">
        <h1 style="margin:0; font-size:22px; color:var(--royal-blue);">Student Admission 2026-2027</h1>
    </div>

    <form class="form-content" id="admissionForm">
        <span class="section-label">Identity & Location Info</span>
        <div class="info-grid">
            <div class="form-group"><label>Admission No</label><input type="text" placeholder="e.g. 1530"></div>
            <div class="form-group">
                <label>Campus</label>
                <select>
                    <option>Velpur</option><option>Relangi</option><option>Undrajavaram</option>
                </select>
            </div>
            <div class="form-group"><label>Student Name</label><input type="text" required></div>
            <div class="form-group"><label>Parent Name</label><input type="text"></div>
            <div class="form-group"><label>Aadhaar No</label><input type="text" maxlength="12"></div>
            <div class="form-group"><label>Place</label><input type="text"></div>
            <div class="form-group"><label>Class / Section</label><input type="text"></div>
            <div class="form-group"><label>Mobile Number</label><input type="tel"></div>
        </div>

        <span class="section-label">Fee Details (3-Column View)</span>
        <div class="fee-grid">
            <div class="form-group fee-box"><label>Admission Fee</label><input type="number" id="f1" value="0" oninput="calc()"></div>
            <div class="form-group fee-box"><label>Tuition Fee</label><input type="number" id="f2" value="0" oninput="calc()"></div>
            <div class="form-group fee-box"><label>Books Fee</label><input type="number" id="f3" value="0" oninput="calc()"></div>
            <div class="form-group fee-box"><label>Uniform Fee</label><input type="number" id="f4" value="0" oninput="calc()"></div>
            <div class="form-group fee-box"><label>Exam Fee</label><input type="number" id="f5" value="0" oninput="calc()"></div>
            <div class="form-group fee-box"><label>Transport Fee</label><input type="number" id="f6" value="0" oninput="calc()"></div>
        </div>

        <div class="footer-dashboard">
            <div class="stat-item">
                <span class="stat-label">Total Amount</span>
                <span class="stat-val" id="total">₹ 0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Amount Paid Now</span><br>
                <input type="number" id="paid" class="paid-box" value="0" oninput="calc()">
            </div>
            <div class="stat-item">
                <span class="stat-label" style="color:var(--gold);">Balance Due</span>
                <span class="stat-val" id="balance" style="color:var(--gold);">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="alert('Record Saved!')">Confirm & Save Admission</button>
    </form>
</div>

<script>
    function calc() {
        let sum = 0;
        for(let i=1; i<=6; i++) {
            sum += parseFloat(document.getElementById('f'+i).value) || 0;
        }
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const bal = sum - paid;
        document.getElementById('total').innerText = "₹ " + sum.toLocaleString('en-IN');
        document.getElementById('balance').innerText = "₹ " + bal.toLocaleString('en-IN');
    }
</script>

</body>
</html>
