<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admission 2026-27</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 150px; height: auto; }
        h2 { color: #2c3e50; margin-top: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .readonly-field { background-color: #e9ecef; font-weight: bold; }
        .balance-red { color: #d9534f; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Veeramallu Global Academy Logo" class="logo">
        <h2>Admission Form 2026-27</h2>
    </div>

    <form id="admissionForm">
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="studentName" placeholder="Enter Full Name" required>
        </div>
        <div class="form-group">
            <label>Admission No</label>
            <input type="text" id="admissionNo" placeholder="e.g. 1530">
        </div>

        <hr>

        <div class="form-group">
            <label>Tuition Fee</label>
            <input type="number" id="tuitionFee" value="0" oninput="calculateFees()">
        </div>
        <div class="form-group">
            <label>Books Fee</label>
            <input type="number" id="booksFee" value="0" oninput="calculateFees()">
        </div>
        <div class="form-group">
            <label>Uniform Fee</label>
            <input type="number" id="uniformFee" value="0" oninput="calculateFees()">
        </div>
        <div class="form-group">
            <label>Exam Fee</label>
            <input type="number" id="examFee" value="0" oninput="calculateFees()">
        </div>
        <div class="form-group">
            <label>Stationery Fee</label>
            <input type="number" id="stationeryFee" value="0" oninput="calculateFees()">
        </div>
        <div class="form-group">
            <label>Transport Fee</label>
            <input type="number" id="transportFee" value="0" oninput="calculateFees()">
        </div>

        <hr>

        <div class="form-group">
            <label>Total Amount</label>
            <input type="number" id="totalFees" class="readonly-field" readonly>
        </div>
        <div class="form-group">
            <label>Paid Amount</label>
            <input type="number" id="paidAmount" value="0" oninput="calculateFees()">
        </div>
        <div class="form-group">
            <label>Balance Due</label>
            <input type="number" id="balance" class="readonly-field balance-red" readonly>
        </div>

        <button type="button" onclick="saveAdmission()">Submit Admission</button>
    </form>
</div>

<script>
function calculateFees() {
    const fields = ['tuitionFee', 'booksFee', 'uniformFee', 'examFee', 'stationeryFee', 'transportFee'];
    let total = 0;

    fields.forEach(id => {
        total += parseFloat(document.getElementById(id).value) || 0;
    });

    const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
    const balance = total - paid;

    document.getElementById('totalFees').value = total;
    document.getElementById('balance').value = balance;
}

function saveAdmission() {
    const name = document.getElementById('studentName').value;
    if(!name) {
        alert("Please enter a student name");
        return;
    }
    
    // This is where you would call your Firebase or Sheet connection
    alert("Admission for " + name + " recorded with Balance: " + document.getElementById('balance').value);
}

// Initial calculation on load
window.onload = calculateFees;
</script>

</body>
</html>
