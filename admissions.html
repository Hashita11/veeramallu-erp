<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admission Portal 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --vga-gold: #fbbf24;
            --bg-gray: #f8fafc;
            --text-dark: #1e293b;
            --success-green: #22c55e;
            --danger-red: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-top: 10px solid var(--primary-blue);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 15px;
        }

        h2 {
            margin: 0;
            font-size: 26px;
            color: var(--primary-blue);
            letter-spacing: -0.5px;
        }

        .campus-badge {
            display: inline-block;
            background: var(--vga-gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .section-header {
            background: var(--bg-gray);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            color: #64748b;
            margin: 25px 0 15px 0;
            text-transform: uppercase;
            border-left: 5px solid var(--primary-blue);
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .grid-row { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input, select {
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .fee-input {
            text-align: right;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .summary-card {
            background: #1e293b;
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-total {
            border-top: 1px solid #475569;
            padding-top: 15px;
            font-size: 20px;
            font-weight: 700;
        }

        .balance-alert {
            color: var(--vga-gold);
            font-size: 24px;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1e40af;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Veeramallu Global Academy" class="logo">
        <h2>Admission Form 2026-27</h2>
        <div class="campus-badge">Official Admin Portal</div>
    </div>

    <form id="admissionForm">
        <div class="section-header">Location & Student Info</div>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Select Campus</label>
            <select id="campus" required>
                <option value="">-- Choose Campus --</option>
                <option value="Velpur">Velpur Campus</option>
                <option value="Relangi">Relangi Campus</option>
                <option value="Undrajavaram">Undrajavaram Campus</option>
            </select>
        </div>

        <div class="grid-row">
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="studentName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <label>Parent Mobile Number</label>
                <input type="tel" id="parentPhone" placeholder="10 Digit Number" maxlength="10">
            </div>
        </div>

        <div class="grid-row">
            <div class="form-group">
                <label>Class</label>
                <select id="studentClass">
                    <option>Pre-K</option><option>LKG</option><option>UKG</option>
                    <option>Class 1</option><option>Class 2</option><option>Class 3</option>
                    <option>Class 4</option><option>Class 5</option>
                </select>
            </div>
            <div class="form-group">
                <label>Section</label>
                <input type="text" id="section" placeholder="A, B, or C">
            </div>
        </div>

        <div class="section-header">Fee Components (₹)</div>

        <div class="grid-row">
            <div class="form-group">
                <label>Admission Fee</label>
                <input type="number" id="admFee" class="fee-input" value="0" oninput="doMath()">
            </div>
            <div class="form-group">
                <label>Tuition Fee</label>
                <input type="number" id="tuiFee" class="fee-input" value="0" oninput="doMath()">
            </div>
        </div>

        <div class="grid-row">
            <div class="form-group">
                <label>Books & Stationery</label>
                <input type="number" id="bookFee" class="fee-input" value="0" oninput="doMath()">
            </div>
            <div class="form-group">
                <label>Uniform Fee</label>
                <input type="number" id="uniFee" class="fee-input" value="0" oninput="oninput="doMath()">
            </div>
        </div>

        <div class="grid-row">
            <div class="form-group">
                <label>Exam Fee</label>
                <input type="number" id="examFee" class="fee-input" value="0" oninput="doMath()">
            </div>
            <div class="form-group">
                <label>Transport Fee</label>
                <input type="number" id="transFee" class="fee-input" value="0" oninput="doMath()">
            </div>
        </div>

        <div class="summary-card">
            <div class="summary-item">
                <span>Grand Total:</span>
                <span id="displayTotal">₹ 0</span>
            </div>
            <div class="form-group" style="margin: 15px 0;">
                <label style="color: #94a3b8;">Amount Paid Now (₹)</label>
                <input type="number" id="paidNow" class="fee-input" value="0" oninput="doMath()" style="background: #334155; color: white; border: none; font-size: 18px;">
            </div>
            <div class="summary-item summary-total">
                <span>Balance Due:</span>
                <span id="displayBalance" class="balance-alert">₹ 0</span>
            </div>
        </div>

        <button type="button" class="submit-btn" onclick="finalSubmit()">Finalize & Save Admission</button>
    </form>
</div>

<script>
    function doMath() {
        const fees = [
            'admFee', 'tuiFee', 'bookFee', 'uniFee', 'examFee', 'transFee'
        ];
        
        let grandTotal = 0;
        fees.forEach(id => {
            grandTotal += parseFloat(document.getElementById(id).value) || 0;
        });

        const paid = parseFloat(document.getElementById('paidNow').value) || 0;
        const balance = grandTotal - paid;

        document.getElementById('displayTotal').innerText = "₹ " + grandTotal.toLocaleString('en-IN');
        document.getElementById('displayBalance').innerText = "₹ " + balance.toLocaleString('en-IN');
    }

    function finalSubmit() {
        const name = document.getElementById('studentName').value;
        const campus = document.getElementById('campus').value;
        const balance = document.getElementById('displayBalance').innerText;

        if(!name || !campus) {
            alert("⚠️ Please fill in Student Name and Campus!");
            return;
        }

        // Logic to save to database goes here
        alert("✅ Success!\nAdmission for " + name + " has been recorded.\nPending Balance: " + balance);
    }
</script>

</body>
</html>
