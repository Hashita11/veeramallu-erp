<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Premium Admission Portal | 2026-27</title>
    <style>
        :root {
            --vga-navy: #1a237e;
            --vga-gold: #fbc02d;
            --vga-bg: #f4f7f9;
            --success: #2e7d32;
            --border: #d1d9e6;
        }

        body { background: var(--vga-bg); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        
        .master-card { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            overflow: hidden;
            border-top: 10px solid var(--vga-navy);
        }

        .header { background: var(--vga-navy); color: white; padding: 30px; text-align: center; }
        .header img { width: 90px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        
        .form-content { padding: 40px; }
        
        .section-box { margin-bottom: 40px; }
        .main-heading { 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--vga-navy); 
            border-bottom: 3px solid var(--vga-gold);
            padding-bottom: 8px;
            margin-bottom: 25px;
            font-weight: 800;
            display: flex;
            align-items: center;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }
        
        .field-box { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 8px; text-transform: uppercase; }
        
        input, select { 
            padding: 14px; 
            border: 2px solid var(--border); 
            border-radius: 12px; 
            font-size: 15px; 
            transition: all 0.3s ease;
            background: #fff;
        }

        input:focus, select:focus { 
            border-color: var(--vga-navy); 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
        }

        /* Dashboard Styles */
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-top: 40px;
            background: var(--vga-navy);
            padding: 35px;
            border-radius: 20px;
            color: white;
            position: relative;
        }

        .dash-col { text-align: center; }
        .dash-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; display: block; margin-bottom: 10px; }
        .dash-val { font-size: 38px; font-weight: 800; color: var(--vga-gold); }
        
        .paid-input { 
            background: rgba(255,255,255,0.15); 
            border: 2.5px solid var(--vga-gold); 
            color: white; 
            font-size: 28px; 
            width: 100%; 
            max-width: 180px;
            text-align: center;
            border-radius: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 800;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .unpaid { background: #ffcdd2; color: #b71c1c; }
        .partial { background: #fff9c4; color: #f57f17; }
        .paid { background: #c8e6c9; color: #1b5e20; }

        .btn-submit { 
            width: 100%; 
            padding: 25px; 
            background: var(--success); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 22px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 30px; 
            text-transform: uppercase;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-submit:hover { background: #217326; transform: translateY(-2px); }

        @media print {
            body * { visibility: hidden; }
            .master-card, .master-card * { visibility: visible; }
            .master-card { position: absolute; left: 0; top: 0; width: 100%; border: none; box-shadow: none; }
            .btn-submit, input, select { border: none !important; }
            .dashboard { background: #eee !important; color: black !important; }
            .dash-val { color: black !important; }
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .form-content { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="master-card">
    <div class="header">
        <img src="logo.png" alt="VGA LOGO">
        <h1>VEERAMALLU GLOBAL ACADEMY</h1>
        <p style="margin:8px 0 0 0; opacity: 0.9; font-weight: 600;">OFFICIAL ENROLLMENT PORTAL | 2026-2027</p>
    </div>

    <form class="form-content" id="admissionForm">
        
        <div class="section-box">
            <div class="main-heading">1. Primary Academic Info</div>
            <div class="grid">
                <div class="field-box"><label>Admission Number</label><input type="text" id="admNo" placeholder="Ex: 2026-001"></div>
                <div class="field-box">
                    <label>Campus Location</label>
                    <select id="campus">
                        <option>Velpur Campus</option>
                        <option>Relangi Campus</option>
                        <option>Undrajavaram Campus</option>
                    </select>
                </div>
                <div class="field-box"><label>Student Full Name</label><input type="text" id="sName" placeholder="Enter as per Aadhaar"></div>
                <div class="field-box"><label>Date of Birth</label><input type="date" id="dob"></div>
                <div class="field-box">
                    <label>Gender</label>
                    <select id="gender">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="field-box"><label>Aadhaar Number</label><input type="text" maxlength="12" placeholder="12 Digit ID"></div>
            </div>
        </div>

        <div class="section-box">
            <div class="main-heading">2. Guardian & Logistics</div>
            <div class="grid">
                <div class="field-box"><label>Father/Mother Name</label><input type="text" id="parent"></div>
                <div class="field-box"><label>Primary Contact</label><input type="tel" id="mobile"></div>
                <div class="field-box"><label>Village / City</label><input type="text" id="city"></div>
                <div class="field-box">
                    <label>Transport Mode</label>
                    <select id="transport">
                        <option>School Bus (VGA)</option>
                        <option>Private Van/Auto</option>
                        <option>Self Drop/Pick</option>
                    </select>
                </div>
                <div class="field-box"><label>Class & Section</label><input type="text" placeholder="Ex: 5th - A"></div>
                <div class="field-box"><label>Blood Group</label><input type="text" placeholder="Ex: O+"></div>
            </div>
        </div>

        <div class="section-box">
            <div class="main-heading">3. Fee Structural Ledger</div>
            <div class="grid">
                <div class="field-box"><label>Admission Fee</label><input type="number" class="fee" value="0" oninput="calc()"></div>
                <div class="field-box"><label>Tuition Fee</label><input type="number" class="fee" value="0" oninput="calc()"></div>
                <div class="field-box"><label>Books & Uniform</label><input type="number" class="fee" value="0" oninput="calc()"></div>
                <div class="field-box"><label>Exam & Transport</label><input type="number" class="fee" value="0" oninput="calc()"></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="dash-col">
                <span class="dash-label">Total Fee Amount</span>
                <span class="dash-val" id="total">₹ 0</span>
                <div id="status" class="status-badge unpaid">Awaiting Payment</div>
            </div>
            <div class="dash-col">
                <span class="dash-label">Collect Amount</span>
                <input type="number" id="paid" class="paid-input" value="0" oninput="calc()">
            </div>
            <div class="dash-col">
                <span class="dash-label">Balance Outstanding</span>
                <span class="dash-val" id="balance">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="finalize()">Finalize Admission & Print Receipt</button>
    </form>
</div>

<script>
    function calc() {
        let total = 0;
        document.querySelectorAll('.fee').forEach(inp => {
            total += parseFloat(inp.value) || 0;
        });
        
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const balance = total - paid;

        document.getElementById('total').innerText = "₹ " + total.toLocaleString('en-IN');
        document.getElementById('balance').innerText = "₹ " + balance.toLocaleString('en-IN');

        const statusBox = document.getElementById('status');
        if (total === 0) {
            statusBox.innerText = "Awaiting Entry";
            statusBox.className = "status-badge unpaid";
        } else if (balance <= 0) {
            statusBox.innerText = "Paid in Full";
            statusBox.className = "status-badge paid";
        } else if (paid > 0) {
            statusBox.innerText = "Partial Payment";
            statusBox.className = "status-badge partial";
        } else {
            statusBox.innerText = "Unpaid";
            statusBox.className = "status-badge unpaid";
        }
    }

    function finalize() {
        const sName = document.getElementById('sName').value;
        if(!sName) {
            alert("Please enter Student Name before finalizing.");
            return;
        }
        alert("Admission for " + sName + " saved successfully!");
        window.print(); // Triggers the print view for the receipt
    }
</script>

</body>
</html>
