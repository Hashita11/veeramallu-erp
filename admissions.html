<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admission 2026-27 | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vga-blue: #1a365d;
            --vga-gold: #d4af37;
            --accent-blue: #2b6cb0;
            --light-bg: #f7fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #edf2f7;
            margin: 0;
            padding: 20px;
            color: #2d3748;
        }

        .admission-card {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border-top: 8px solid var(--vga-blue);
        }

        .header {
            background: white;
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            max-width: 130px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            color: var(--vga-blue);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-container {
            padding: 30px;
        }

        .section-tag {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
            border-bottom: 2px solid var(--vga-gold);
            width: fit-content;
            padding-bottom: 2px;
        }

        /* The Grid for Side-by-Side Adjustment */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a5568;
        }

        input, select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            background: var(--light-bg);
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--vga-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
        }

        /* Calculation Styling */
        .finance-summary {
            background: var(--vga-blue);
            color: white;
            padding: 25px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .summary-row.total {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
            margin-top: 15px;
        }

        .amount-display {
            font-family: 'Monaco', monospace;
            font-size: 20px;
            font-weight: 700;
        }

        .balance-highlight {
            color: var(--vga-gold);
            font-size: 26px;
        }

        .btn-submit {
            width: 100%;
            background: var(--vga-gold);
            color: var(--vga-blue);
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 25px;
            transition: transform 0.1s;
        }

        .btn-submit:hover {
            background: #c29d2f;
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="admission-card">
    <div class="header">
        <img src="logo.png" alt="Veeramallu Global Academy" class="logo">
        <h1>Student Admission 2026-27</h1>
    </div>

    <form class="form-container" id="admissionForm">
        <span class="section-tag">Academic Information</span>
        <div class="input-grid">
            <div class="form-group">
                <label>Select Campus</label>
                <select id="campus" required>
                    <option value="">Choose Campus...</option>
                    <option>Velpur Campus</option>
                    <option>Relangi Campus</option>
                    <option>Undrajavaram Campus</option>
                </select>
            </div>
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="studentName" placeholder="Enter Full Name" required>
            </div>
            <div class="form-group">
                <label>Class & Section</label>
                <input type="text" id="classSec" placeholder="e.g. UKG - A">
            </div>
            <div class="form-group">
                <label>Parent Mobile Number</label>
                <input type="tel" id="parentMobile" placeholder="10-digit number">
            </div>
        </div>

        <span class="section-tag">Fee Breakdown (Side-by-Side)</span>
        <div class="input-grid">
            <div class="form-group">
                <label>Admission Fee</label>
                <input type="number" id="feeAdm" value="0" oninput="updateFees()">
            </div>
            <div class="form-group">
                <label>Tuition Fee</label>
                <input type="number" id="feeTui" value="0" oninput="updateFees()">
            </div>
            <div class="form-group">
                <label>Books & Stationery</label>
                <input type="number" id="feeBooks" value="0" oninput="updateFees()">
            </div>
            <div class="form-group">
                <label>Uniform Fee</label>
                <input type="number" id="feeUni" value="0" oninput="updateFees()">
            </div>
            <div class="form-group">
                <label>Exam Fee</label>
                <input type="number" id="feeExam" value="0" oninput="updateFees()">
            </div>
            <div class="form-group">
                <label>Transport Fee</label>
                <input type="number" id="feeTrans" value="0" oninput="updateFees()">
            </div>
        </div>

        <div class="finance-summary">
            <div class="summary-row">
                <span>Grand Total</span>
                <span class="amount-display" id="totalText">₹ 0</span>
            </div>
            <div class="summary-row">
                <label style="color: rgba(255,255,255,0.7)">Amount Paid Now</label>
                <input type="number" id="amtPaid" value="0" oninput="updateFees()" 
                       style="width: 150px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">
            </div>
            <div class="summary-row total">
                <span>BALANCE DUE</span>
                <span class="amount-display balance-highlight" id="balanceText">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="saveRecord()">Confirm & Save Admission</button>
    </form>
</div>

<script>
    function updateFees() {
        const fees = ['feeAdm', 'feeTui', 'feeBooks', 'feeUni', 'feeExam', 'feeTrans'];
        let total = 0;
        
        fees.forEach(id => {
            total += parseFloat(document.getElementById(id).value) || 0;
        });

        const paid = parseFloat(document.getElementById('amtPaid').value) || 0;
        const balance = total - paid;

        document.getElementById('totalText').innerText = "₹ " + total.toLocaleString('en-IN');
        document.getElementById('balanceText').innerText = "₹ " + balance.toLocaleString('en-IN');
    }

    function saveRecord() {
        const name = document.getElementById('studentName').value;
        if(!name) { alert("Please enter Student Name"); return; }
        alert("Admission for " + name + " successfully recorded in the database.");
    }
</script>

</body>
</html>
