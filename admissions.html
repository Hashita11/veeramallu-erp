<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admin | Student Admission 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vga-blue: #1e3a8a;
            --vga-gold: #c5a021;
            --light-gray: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 10px;
            color: #1e293b;
        }

        .main-card {
            max-width: 900px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid var(--vga-blue);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { max-width: 140px; margin-bottom: 10px; }

        .form-section { padding: 30px; }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--vga-blue);
            text-transform: uppercase;
            border-left: 4px solid var(--vga-gold);
            padding-left: 10px;
            margin: 25px 0 15px;
        }

        /* Responsive Grid Adjustments */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* 3-Column Fee Layout */
        .fee-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: var(--light-gray);
            padding: 20px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .grid-layout, .fee-grid { grid-template-columns: 1fr; }
        }

        .form-group { display: flex; flex-direction: column; }

        label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475569; }

        input, select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus { outline: none; border-color: var(--vga-blue); box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }

        /* Summary Dashboard */
        .dashboard {
            background: var(--vga-blue);
            color: white;
            padding: 25px;
            margin-top: 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat { text-align: center; flex: 1; }
        .stat-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 700; display: block; margin-top: 5px; }
        .balance-box { border-left: 1px solid rgba(255,255,255,0.2); }

        .btn-save {
            width: 100%;
            background: var(--vga-gold);
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: filter 0.2s;
        }

        .btn-save:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <img src="logo.png" alt="VGA Logo" class="logo">
        <h1 style="margin:0; font-size:24px; color:var(--vga-blue);">Admission Entry 2026-27</h1>
    </div>

    <form class="form-section" id="admissionForm">
        <div class="section-title">Student & Guardian Details</div>
        <div class="grid-layout">
            <div class="form-group">
                <label>Admission Number</label>
                <input type="text" id="admNo" placeholder="e.g. 2026/001" required>
            </div>
            <div class="form-group">
                <label>Campus</label>
                <select id="campus">
                    <option>Velpur Campus</option>
                    <option>Relangi Campus</option>
                    <option>Undrajavaram Campus</option>
                </select>
            </div>
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="stuName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <label>Parent Name</label>
                <input type="text" id="parentName" placeholder="Father/Mother Name">
            </div>
            <div class="form-group">
                <label>Aadhaar Number</label>
                <input type="text" id="aadhaar" placeholder="12-Digit Number" maxlength="12">
            </div>
            <div class="form-group">
                <label>Place / City</label>
                <input type="text" id="place" placeholder="e.g. Tanuku">
            </div>
            <div class="form-group">
                <label>Class & Section</label>
                <input type="text" id="classSec" placeholder="e.g. 5th - A">
            </div>
            <div class="form-group">
                <label>Parent Phone</label>
                <input type="tel" id="phone" placeholder="10-digit mobile">
            </div>
        </div>

        <div class="section-title">Fee Breakdown (3-Column Adjustment)</div>
        <div class="fee-grid">
            <div class="form-group">
                <label>Admission Fee</label>
                <input type="number" id="f1" value="0" oninput="calc()">
            </div>
            <div class="form-group">
                <label>Tuition Fee</label>
                <input type="number" id="f2" value="0" oninput="calc()">
            </div>
            <div class="form-group">
                <label>Books & Stationery</label>
                <input type="number" id="f3" value="0" oninput="calc()">
            </div>
            <div class="form-group">
                <label>Uniform Fee</label>
                <input type="number" id="f4" value="0" oninput="calc()">
            </div>
            <div class="form-group">
                <label>Exam Fee</label>
                <input type="number" id="f5" value="0" oninput="calc()">
            </div>
            <div class="form-group">
                <label>Transport Fee</label>
                <input type="number" id="f6" value="0" oninput="calc()">
            </div>
        </div>

        <div class="dashboard">
            <div class="stat">
                <span class="stat-label">Total Fees</span>
                <span class="stat-value" id="totalDisplay">₹ 0</span>
            </div>
            <div class="stat" style="border-left: 1px solid rgba(255,255,255,0.2);">
                <span class="stat-label">Paid Amount</span>
                <input type="number" id="paid" value="0" oninput="calc()" 
                       style="width: 100px; background: rgba(255,255,255,0.1); border: 1px solid #fff; color: white; text-align: center;">
            </div>
            <div class="stat balance-box">
                <span class="stat-label">Balance Due</span>
                <span class="stat-value" id="balanceDisplay" style="color:var(--vga-gold);">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-save" onclick="submitForm()">Save Admission Record</button>
    </form>
</div>

<script>
    function calc() {
        let total = 0;
        for(let i=1; i<=6; i++) {
            total += parseFloat(document.getElementById('f'+i).value) || 0;
        }
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const balance = total - paid;

        document.getElementById('totalDisplay').innerText = "₹ " + total.toLocaleString('en-IN');
        document.getElementById('balanceDisplay').innerText = "₹ " + balance.toLocaleString('en-IN');
    }

    function submitForm() {
        const name = document.getElementById('stuName').value;
        const balance = document.getElementById('balanceDisplay').innerText;
        if(!name) { alert("Student Name is Required!"); return; }
        
        // Final Redaction Check: We do not display Aadhaar digits in the final success alert
        alert("Success! Admission for " + name + " saved.\nPending Balance: " + balance);
    }
</script>

</body>
</html>
