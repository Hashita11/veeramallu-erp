<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admin | Admission 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vga-blue: #003399;
            --vga-gold: #ffcc00;
            --input-bg: #ffffff;
            --label-color: #002266;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e5eaf0;
            margin: 0;
            padding: 15px;
        }

        .master-container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            border: 2px solid var(--vga-blue);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header-bar {
            background: var(--vga-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-bar img { max-width: 150px; background: white; padding: 5px; border-radius: 5px; }

        .form-body { padding: 25px; }

        /* Identity Section: 4 Columns */
        .grid-identity {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Fee Section: Precise 3-Column Grid */
        .grid-fees {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .field-card {
            background: #f9fbff;
            border: 1.5px solid #d1d9e6;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .fee-card {
            border-left: 6px solid var(--vga-blue);
            background: #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        label {
            font-size: 13px;
            font-weight: 700;
            color: var(--label-color);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select {
            padding: 12px;
            border: 2px solid #bbc4d1;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            color: #000;
        }

        input:focus { border-color: var(--vga-gold); outline: none; background: #fffdf0; }

        /* Dashboard Footer */
        .dashboard {
            background: var(--vga-blue);
            color: #fff;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
        }

        .dash-item { text-align: center; flex: 1; }
        .dash-label { font-size: 14px; font-weight: 400; opacity: 0.9; }
        .dash-val { font-size: 32px; font-weight: 700; display: block; margin-top: 5px; }

        .paid-input-style {
            width: 140px;
            background: white;
            color: #000;
            text-align: center;
            font-size: 24px;
            border: 3px solid var(--vga-gold);
        }

        .btn-submit {
            width: 100%;
            background: #22c55e;
            color: white;
            padding: 20px;
            border: none;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .grid-identity { grid-template-columns: 1fr 1fr; }
            .grid-fees { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 500px) {
            .grid-identity, .grid-fees { grid-template-columns: 1fr; }
            .dashboard { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="master-container">
    <div class="header-bar">
        <img src="logo.png" alt="VGA Logo">
        <h1 style="margin:10px 0 0 0; font-size: 28px;">STUDENT ADMISSION 2026-2027</h1>
    </div>

    <form class="form-body" id="admissionForm">
        <div class="grid-identity">
            <div class="field-card"><label>Admission No</label><input type="text" placeholder="1530"></div>
            <div class="field-card">
                <label>Campus</label>
                <select>
                    <option>Velpur Campus</option>
                    <option>Relangi Campus</option>
                    <option>Undrajavaram Campus</option>
                </select>
            </div>
            <div class="field-card"><label>Student Name</label><input type="text" required></div>
            <div class="field-card"><label>Parent Name</label><input type="text"></div>
            <div class="field-card"><label>Aadhaar Number</label><input type="text" maxlength="12"></div>
            <div class="field-card"><label>Place / City</label><input type="text"></div>
            <div class="field-card"><label>Class & Section</label><input type="text"></div>
            <div class="field-card"><label>Mobile Number</label><input type="tel"></div>
        </div>

        <div class="grid-fees">
            <div class="field-card fee-card"><label>Admission Fee</label><input type="number" id="f1" value="0" oninput="calculate()"></div>
            <div class="field-card fee-card"><label>Tuition Fee</label><input type="number" id="f2" value="0" oninput="calculate()"></div>
            <div class="field-card fee-card"><label>Books Fee</label><input type="number" id="f3" value="0" oninput="calculate()"></div>
            <div class="field-card fee-card"><label>Uniform Fee</label><input type="number" id="f4" value="0" oninput="calculate()"></div>
            <div class="field-card fee-card"><label>Exam Fee</label><input type="number" id="f5" value="0" oninput="calculate()"></div>
            <div class="field-card fee-card"><label>Transport Fee</label><input type="number" id="f6" value="0" oninput="calculate()"></div>
        </div>

        <div class="dashboard">
            <div class="dash-item">
                <span class="dash-label">TOTAL FEES</span>
                <span class="dash-val" id="total">₹ 0</span>
            </div>
            <div class="dash-item">
                <span class="dash-label">AMOUNT PAID NOW</span><br>
                <input type="number" id="paid" class="paid-input-style" value="0" oninput="calculate()">
            </div>
            <div class="dash-item">
                <span class="dash-label" style="color: var(--vga-gold);">BALANCE DUE</span>
                <span class="dash-val" id="balance" style="color: var(--vga-gold);">₹ 0</span>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="alert('Admission Saved Successfully!')">Submit & Save Record</button>
    </form>
</div>

<script>
    function calculate() {
        let total = 0;
        for(let i=1; i<=6; i++) {
            total += parseFloat(document.getElementById('f'+i).value) || 0;
        }
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const balance = total - paid;

        document.getElementById('total').innerText = "₹ " + total.toLocaleString('en-IN');
        document.getElementById('balance').innerText = "₹ " + balance.toLocaleString('en-IN');
    }
</script>

</body>
</html>
