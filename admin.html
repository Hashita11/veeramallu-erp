<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Veeramallu Global Academy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root { --primary:#1a237e; --success:#28a745; --error:#d32f2f; }
body { font-family:'Segoe UI',sans-serif;background:#f0f2f5;margin:0;padding:20px;display:flex;justify-content:center; }
.container { background:white;padding:2rem;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:950px;text-align:center; }
.logo { max-width:100px;margin-bottom:10px; }
.controls { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:15px; }
input,select,textarea { padding:10px;border:1px solid #ddd;border-radius:8px;width:100%; }
.table-container { width:100%;overflow-x:auto;margin-top:15px;border-radius:8px;border:1px solid #eee; }
table { width:100%;border-collapse:collapse; }
th { background:var(--primary);color:white;padding:10px; }
td { padding:10px;border-bottom:1px solid #eee;font-size:0.9rem; }
.btn { padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer;width:100%;margin-top:10px; }
.btn-csv { background:#388e3c;color:white; }
.btn-salary { background:var(--primary);color:white; }
.btn-wa { background:#25d366;color:white; }
.salary-box { background:#e3f2fd;padding:1rem;border-radius:10px;margin-top:15px;text-align:left; }
#output { white-space:pre-wrap;background:white;padding:10px;border-radius:8px;margin-top:10px;font-family:monospace;border:1px dashed var(--primary); }
</style>
</head>

<body>

<div class="container" id="capture">

<img src="logo.png" class="logo">
<h1 style="color:#1a237e;">VEERAMALLU GLOBAL ACADEMY</h1>
<h3>ADMIN DASHBOARD</h3>

<!-- ADD TEACHER -->
<div style="background:#fff3cd;padding:15px;border-radius:10px;">
<h3>Add Teacher</h3>
<div class="controls">
<input id="t_name" placeholder="Name">
<input id="t_email" placeholder="Email">
<input id="t_password" type="password" placeholder="Password">
<input id="t_subject" placeholder="Subject">
<input id="t_salary" placeholder="Salary">
</div>
<button class="btn" style="background:#1a237e;color:white;" onclick="createTeacher()">Create</button>
</div>

<!-- FILTER -->
<div class="controls">
<input id="search" placeholder="Search" onkeyup="load()">
<select id="filterCampus" onchange="load()">
<option>All</option>
<option>Relangi</option>
<option>Velpur</option>
<option>Undrajavaram</option>
</select>
<input type="date" id="start" onchange="load()">
<input type="date" id="end" onchange="load()">
</div>

<!-- MANUAL ENTRY -->
<div class="controls">
<select id="teacher"></select>
<select id="campus">
<option>Relangi</option>
<option>Velpur</option>
<option>Undrajavaram</option>
</select>
</div>

<div style="display:flex;gap:10px;">
<button class="btn" style="background:green;color:white;" onclick="save('IN')">IN</button>
<button class="btn" style="background:red;color:white;" onclick="save('OUT')">OUT</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead><tr><th>Name</th><th>Campus</th><th>Type</th><th>Time</th></tr></thead>
<tbody id="list"></tbody>
</table>
</div>

<button class="btn btn-csv" onclick="exportCSV()">Download CSV</button>

<!-- SALARY -->
<div class="salary-box">
<h3>Salary</h3>
<input type="date" id="joining">
<button class="btn btn-salary" onclick="generateSalary()">Generate Salary</button>
<button class="btn btn-wa" onclick="saveWhatsAppImage()">Save Image</button>
<div id="output"></div>
</div>

<!-- NOTICE -->
<textarea id="noticeMsg" placeholder="Send notice to parents"></textarea>
<button class="btn" onclick="sendNotice()" style="background:#1a237e;color:white;">Send Notification</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const LATE_TIME="08:30:00";
const HOLIDAYS=["2026-01-26","2026-08-15","2026-10-02"];

let teachers=[],unsubscribe;

firebase.initializeApp({
apiKey:"AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
authDomain:"veeramalluerp-6cac5.firebaseapp.com",
projectId:"veeramalluerp-6cac5"
});

const db=firebase.firestore();

window.onload=()=>{loadTeachers();load();};

// LOAD TEACHERS
function loadTeachers(){
teacher.innerHTML="<option value=''>Select</option>";
db.collection("teachers").get().then(s=>{
teachers=[];
s.forEach(doc=>{
let d=doc.data(); d.uid=doc.id;
teachers.push(d);
teacher.innerHTML+=`<option value="${doc.id}">${d.name}</option>`;
});
});
}

// CREATE TEACHER
function createTeacher(){
let n=t_name.value,e=t_email.value,p=t_password.value,s=t_subject.value,sa=t_salary.value;
if(!n||!e||!p) return alert("Fill fields");

firebase.auth().createUserWithEmailAndPassword(e,p)
.then(r=>db.collection("teachers").doc(r.user.uid).set({
uid:r.user.uid,name:n,email:e,subject:s,salary:Number(sa||0)
}))
.then(()=>{alert("Created");loadTeachers();});
}

// HELPERS
function parseDate(t){return t?.toDate?t.toDate():null;}
function checkLate(d,dt){return d.type=="IN"&&dt.toTimeString().slice(0,8)>LATE_TIME;}

function resolveName(d){

    // ✅ 1. If name already exists
    if(d.name) return d.name;

    // ✅ 2. UID based
    let t = teachers.find(x => x.uid == d.teacherId);
    if(t) return t.name;

    // ✅ 3. Email based (new system)
    let e = teachers.find(x => x.email == d.teacherEmail);
    if(e) return e.name;

    // ✅ 4. OLD teacher login support (IMPORTANT FIX)
    let old = teachers.find(x => x.email == d.teacher);
    if(old) return old.name;

    // ✅ 5. fallback
    return d.teacher || "Unknown";
}

// DUPLICATE CHECK
async function already(uid,email,type){
let today=new Date().toLocaleDateString('en-IN');
let q=db.collection("attendance").where("dateOnly","==",today).where("type","==",type);
if(uid) q=q.where("teacherId","==",uid);
else q=q.where("teacherEmail","==",email);
let s=await q.get();
return !s.empty;
}

// SAVE
async function save(type){
let uid=teacher.value;
let c=campus.value;
let obj=teachers.find(t=>t.uid==uid);
if(!obj) return alert("Select");

if(await already(uid,obj.email,type)) return alert("Already marked");

let now=new Date();

db.collection("attendance").add({
teacherId:uid,
teacherEmail:obj.email,
name:obj.name,
campus:c,
type:type,
time:firebase.firestore.Timestamp.fromDate(now),
dateOnly:now.toLocaleDateString('en-IN'),
dateISO:now.toISOString(),
late:(type=="IN"&&now.toTimeString().slice(0,8)>LATE_TIME)
}).then(()=>alert("Saved"));
}

// LOAD TABLE
function load(){
if(unsubscribe) unsubscribe();

unsubscribe = db.collection("attendance")
.orderBy("time","desc")
.onSnapshot(snap => {

let list = document.getElementById("list");
list.innerHTML = "";

snap.forEach(doc => {
let d = doc.data();
let dt = parseDate(d.time);
if(!dt) return;

// ✅ SAFE NAME RESOLUTION (FINAL FIX)
let name = d.name 
    || (teachers.find(t=>t.uid==d.teacherId)?.name)
    || (teachers.find(t=>t.email==d.teacherEmail)?.name)
    || (teachers.find(t=>t.email==d.teacher)?.name)
    || d.teacher
    || "Unknown";

// ❗ DO NOT SKIP — show all data
let late = checkLate(d,dt);

list.innerHTML += `
<tr>
<td><b>${name}</b></td>
<td>${d.campus || '-'}</td>
<td>
${d.type || '-'}
${late ? '<div style="color:#d32f2f;font-weight:bold;">⬇ LATE</div>' : ''}
</td>
<td>${dt.toLocaleString()}</td>
</tr>
`;
});

// ✅ Empty fallback
if(list.innerHTML===""){
list.innerHTML = "<tr><td colspan='4'>No records found</td></tr>";
}

});
}

// SALARY
function generateSalary(){
if(!start.value||!end.value) return alert("Select dates");

let s=new Date(start.value),e=new Date(end.value);
s.setHours(0,0,0,0); e.setHours(23,59,59,999);

db.collection("attendance").get().then(snap=>{
let map={};

snap.forEach(doc=>{
let d=doc.data(),dt=parseDate(d.time);
if(!dt||dt<s||dt>e)return;

let name=resolveName(d);

if(!map[name])map[name]={p:new Set(),l:0};

if(d.type=="IN"){
map[name].p.add(dt.toDateString());
if(checkLate(d,dt))map[name].l++;
}
});

let wd=0;
for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
let iso=d.toISOString().slice(0,10);
if(d.getDay()!=0&&!HOLIDAYS.includes(iso))wd++;
}

let out="VEERAMALLU GLOBAL ACADEMY\n\n";

for(let n in map){
let t=teachers.find(x=>x.name==n);
let sal=t?.salary||0;

let per=sal/wd;
let p=map[n].p.size;
let l=map[n].l;

let abs=wd-p;

let lateDed=l*(per*0.25);
let absDed=abs*per;

let final=sal-(lateDed+absDed);

out+=`${n}\nPresent:${p} Absent:${abs} Late:${l}\nSalary:₹${final.toFixed(0)}\n\n`;
}

output.innerText=out;
});
}

// CSV
function exportCSV(){
let csv="Name,Campus,Type,Time\n";
document.querySelectorAll("#list tr").forEach(tr=>{
let c=tr.children;
csv+=`${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="Attendance.csv";
a.click();
}

// IMAGE
function saveWhatsAppImage(){
html2canvas(capture).then(c=>{
let a=document.createElement("a");
a.href=c.toDataURL();
a.download="Report.png";
a.click();
});
}

// NOTICE
async function sendNotice(){
let msg=noticeMsg.value;
if(!msg) return alert("Type message");

await db.collection("notifications").doc("latest").set({
text:msg,
date:new Date().toLocaleDateString('en-IN'),
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});

alert("Sent");
noticeMsg.value="";
}
</script>

</body>
</html>
