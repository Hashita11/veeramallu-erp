<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Veeramallu Global Academy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root { --primary:#1a237e; --success:#28a745; --error:#d32f2f; }
body { font-family:'Segoe UI',sans-serif;background:#f0f2f5;margin:0;padding:20px;display:flex;justify-content:center; }
.container { background:white;padding:2rem;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:950px;text-align:center; }
.logo { max-width:100px;margin-bottom:10px; }
.section-header { background: #1a237e; color: white; padding: 10px; border-radius: 8px; margin: 20px 0 10px 0; font-size: 1.1rem; font-weight: bold; }
.controls { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:15px; }
input,select,textarea { padding:10px;border:1px solid #ddd;border-radius:8px;width:100%; }
.table-container { width:100%;overflow-x:auto;margin-top:15px;border-radius:8px;border:1px solid #eee; }
table { width:100%;border-collapse:collapse; }
th { background:var(--primary);color:white;padding:10px; }
td { padding:10px;border-bottom:1px solid #eee;font-size:0.9rem; }
.btn { padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer;width:100%;margin-top:10px; }
.btn-csv { background:#388e3c;color:white; }
.btn-salary { background:var(--primary);color:white; }
.btn-wa { background:#25d366;color:white; }
.salary-box { background:#e3f2fd;padding:1rem;border-radius:10px;margin-top:15px;text-align:left; }
#output { white-space:pre-wrap;background:white;padding:10px;border-radius:8px;margin-top:10px;font-family:monospace;border:1px dashed var(--primary); }
</style>
</head>

<body>

<div class="container" id="capture">
    <img src="logo.png" class="logo">
    <h1 style="color:#1a237e; margin:0;">VEERAMALLU GLOBAL ACADEMY</h1>
    <h3 style="margin-top:5px;">ADMIN DASHBOARD</h3>

    <div class="section-header">MANAGE STAFF MEMBERS</div>
    <div style="background:#fff3cd;padding:15px;border-radius:10px; border: 1px solid #ffeeba;">
        <h3 style="margin-top:0;">Add New Teacher</h3>
        <div class="controls">
            <input id="t_name" placeholder="Full Name">
            <input id="t_email" placeholder="Email Address">
            <input id="t_password" type="password" placeholder="Password">
            <input id="t_subject" placeholder="Subject">
            <input id="t_salary" placeholder="Monthly Salary">
        </div>
        <button class="btn" style="background:#1a237e;color:white;" onclick="createTeacher()">Create Teacher Account</button>
    </div>

    <div class="section-header">ATTENDANCE LOGS & SEARCH</div>
    <div class="controls">
        <input id="search" placeholder="Search by Name..." onkeyup="load()">
        <select id="filterCampus" onchange="load()">
            <option value="All">All Campuses</option>
            <option value="Relangi">Relangi</option>
            <option value="Velpur">Velpur</option>
            <option value="Undrajavaram">Undrajavaram</option>
        </select>
        <input type="date" id="start" onchange="load()">
        <input type="date" id="end" onchange="load()">
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Name</th><th>Campus</th><th>Type</th><th>Time</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <button class="btn btn-csv" onclick="exportCSV()">Download Attendance CSV</button>

    <div class="section-header">ADMIN MANUAL ENTRY</div>
    <div style="background:#f8f9fa; padding:15px; border-radius:10px; border:1px solid #ddd;">
        <div class="controls">
            <select id="teacher"></select>
            <select id="campus">
                <option>Relangi</option>
                <option>Velpur</option>
                <option>Undrajavaram</option>
            </select>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn" style="background:green;color:white;" onclick="save('IN')">FORCE IN</button>
            <button class="btn" style="background:red;color:white;" onclick="save('OUT')">FORCE OUT</button>
        </div>
    </div>

    <div class="section-header">SALARY CALCULATION</div>
    <div class="salary-box">
        <p style="margin:0 0 10px 0; font-weight:bold;">Use the Filter dates above to select month range.</p>
        <button class="btn btn-salary" onclick="generateSalary()">Calculate Staff Salary</button>
        <button class="btn btn-wa" onclick="saveWhatsAppImage()">Download Report Image</button>
        <div id="output"></div>
    </div>

    <div class="section-header">ANNOUNCEMENTS</div>
    <textarea id="noticeMsg" style="height:80px;" placeholder="Type notice for teachers & parents..."></textarea>
    <button class="btn" onclick="sendNotice()" style="background:#1a237e;color:white;">Broadcast Notification</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const LATE_TIME="08:30:00";
const HOLIDAYS=["2026-01-26","2026-08-15","2026-10-02"];

firebase.initializeApp({
    apiKey:"AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain:"veeramalluerp-6cac5.firebaseapp.com",
    projectId:"veeramalluerp-6cac5"
});

const db=firebase.firestore();
let teachers=[], unsubscribe;

window.onload=()=>{ loadTeachers(); load(); };

function loadTeachers(){
    let t_select = document.getElementById("teacher");
    t_select.innerHTML="<option value=''>Select Teacher</option>";
    db.collection("teachers").get().then(s=>{
        teachers=[];
        s.forEach(doc=>{
            let d=doc.data(); d.uid=doc.id;
            teachers.push(d);
            t_select.innerHTML+=`<option value="${doc.id}">${d.name}</option>`;
        });
    });
}

function createTeacher(){
    let n=t_name.value, e=t_email.value, p=t_password.value, s=t_subject.value, sa=t_salary.value;
    if(!n||!e||!p) return alert("Fill required fields");
    firebase.auth().createUserWithEmailAndPassword(e,p).then(r=> {
        return db.collection("teachers").doc(r.user.uid).set({
            uid:r.user.uid, name:n, email:e, subject:s, salary:Number(sa||0)
        });
    }).then(()=>{ alert("Teacher Created Successfully"); t_name.value=''; t_email.value=''; t_password.value=''; loadTeachers(); });
}

function parseDate(t){return t?.toDate ? t.toDate() : null;}
function checkLate(type, dt){ return type=="IN" && dt.toTimeString().slice(0,8) > LATE_TIME; }

function load(){
    if(unsubscribe) unsubscribe();

    let searchTerm = document.getElementById("search").value.toLowerCase();
    let selCampus = document.getElementById("filterCampus").value;
    let startDate = document.getElementById("start").value ? new Date(document.getElementById("start").value) : null;
    let endDate = document.getElementById("end").value ? new Date(document.getElementById("end").value) : null;
    
    if(startDate) startDate.setHours(0,0,0,0);
    if(endDate) endDate.setHours(23,59,59,999);

    unsubscribe = db.collection("attendance").orderBy("time","desc").onSnapshot(snap => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        snap.forEach(doc => {
            let d = doc.data();
            let dt = parseDate(d.time);
            if(!dt) return;

            // Resolve Name
            let name = d.name || teachers.find(t=>t.uid==d.teacherId)?.name || d.teacher || "Unknown";

            // Apply Filters
            if(searchTerm && !name.toLowerCase().includes(searchTerm)) return;
            if(selCampus !== "All" && d.campus !== selCampus) return;
            if(startDate && dt < startDate) return;
            if(endDate && dt > endDate) return;

            let late = checkLate(d.type, dt);

            list.innerHTML += `
                <tr>
                    <td><b>${name}</b></td>
                    <td>${d.campus || '-'}</td>
                    <td>${d.type || '-'} ${late ? '<div style="color:red;font-weight:bold;">⬇ LATE</div>' : ''}</td>
                    <td>${dt.toLocaleString()}</td>
                </tr>`;
        });

        if(list.innerHTML === "") list.innerHTML = "<tr><td colspan='4'>No matching records found</td></tr>";
    });
}

async function save(type){
    let uid = document.getElementById("teacher").value;
    let c = document.getElementById("campus").value;
    let obj = teachers.find(t=>t.uid==uid);
    if(!obj) return alert("Please select a teacher first");

    let now = new Date();
    db.collection("attendance").add({
        teacherId:uid, teacherEmail:obj.email, name:obj.name,
        campus:c, type:type, time:firebase.firestore.Timestamp.fromDate(now),
        dateOnly:now.toLocaleDateString('en-IN'),
        late: checkLate(type, now)
    }).then(()=>alert("Manual Entry Saved"));
}

function generateSalary(){
    let s_val = document.getElementById("start").value;
    let e_val = document.getElementById("end").value;
    if(!s_val || !e_val) return alert("Select Date Range in the filters above");

    let s=new Date(s_val), e=new Date(e_val);
    s.setHours(0,0,0,0); e.setHours(23,59,59,999);

    db.collection("attendance").get().then(snap=>{
        let map={};
        snap.forEach(doc=>{
            let d=doc.data(), dt=parseDate(d.time);
            if(!dt || dt < s || dt > e) return;
            let name = d.name || teachers.find(t=>t.uid==d.teacherId)?.name || "Unknown";
            if(!map[name]) map[name]={p:new Set(), l:0};
            if(d.type=="IN"){
                map[name].p.add(dt.toDateString());
                if(checkLate("IN", dt)) map[name].l++;
            }
        });

        let wd=0;
        for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
            let iso=d.toISOString().slice(0,10);
            if(d.getDay()!=0 && !HOLIDAYS.includes(iso)) wd++;
        }

        let out="SALARY REPORT\n" + s.toLocaleDateString() + " to " + e.toLocaleDateString() + "\n\n";
        for(let n in map){
            let t=teachers.find(x=>x.name==n);
            let sal=t?.salary||0;
            let per=sal/wd;
            let p=map[n].p.size;
            let abs=wd-p;
            let final=sal - (map[n].l*(per*0.25)) - (abs*per);
            out+=`${n}\nPresent:${p} | Late:${map[n].l} | Absent:${abs}\nPayable: ₹${final.toFixed(0)}\n\n`;
        }
        document.getElementById("output").innerText=out;
    });
}

function exportCSV(){
    let csv="Name,Campus,Type,Time\n";
    document.querySelectorAll("#list tr").forEach(tr=>{
        if(tr.children.length > 1) csv+=`"${tr.children[0].innerText}","${tr.children[1].innerText}","${tr.children[2].innerText}","${tr.children[3].innerText}"\n`;
    });
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download="Attendance_Report.csv";
    a.click();
}

function saveWhatsAppImage(){
    html2canvas(document.getElementById("capture")).then(c=>{
        let a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="Staff_Report.png";
        a.click();
    });
}

async function sendNotice(){
    let msg=document.getElementById("noticeMsg").value;
    if(!msg) return alert("Type a message");
    await db.collection("notifications").doc("latest").set({
        text:msg, date:new Date().toLocaleDateString('en-IN'),
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Notice Broadcasted");
    document.getElementById("noticeMsg").value="";
}
</script>
</body>
</html>
