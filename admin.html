<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Office Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .main-container { background: #ffffff; width: 100%; max-width: 550px; border-radius: 15px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 10px; box-sizing: border-box; }
        
        .header-section { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .academy-logo { width: 80px; height: auto; }
        .academy-name { font-size: 18px; color: #1a237e; margin: 5px 0; font-weight: 800; text-transform: uppercase; }
        .panel-title { font-size: 14px; color: #d32f2f; margin: 0; font-weight: 600; }

        /* 1. Manual Entry Console Styling */
        .manual-console { background: #fffde7; border: 2px dashed #fbc02d; border-radius: 12px; padding: 12px; margin-bottom: 15px; text-align: left; }
        .console-title { font-size: 12px; font-weight: bold; color: #f57f17; display: block; margin-bottom: 10px; text-transform: uppercase; }
        
        /* 2. Filters Section Styling */
        .filter-section { background: #f8f9fa; border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 3px; }
        select, input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; box-sizing: border-box; }

        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-office-in { background: #28a745; }
        .btn-office-out { background: #1a237e; }
        .btn-report { background: #d32f2f; width: 100%; margin-top: 15px; padding: 12px; }

        /* Table Styling */
        .table-container { border: 1.5px solid #007bff; border-radius: 10px; overflow: hidden; background: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { background-color: #007bff; color: white; padding: 10px 2px; font-size: 11px; }
        td { padding: 10px 2px; border: 1px solid #eee; font-size: 10px; text-align: center; word-wrap: break-word; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .manual-row { background-color: #fffde7 !important; }

        .report-box { background: #fafafa; border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-top: 15px; display: none; text-align: left; }
        #report-content { font-family: monospace; white-space: pre-wrap; font-size: 11px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <img src="logo.png" alt="VGA Logo" class="academy-logo">
        <h1 class="academy-name">Veeramallu Global Academy</h1>
        <h2 class="panel-title">Office Admin Dashboard</h2>
    </div>

    <div class="manual-console">
        <span class="console-title">📍 Manual Entry (Office Log)</span>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div>
                <label>Teacher Email</label>
                <input type="text" id="m-teacher" placeholder="e.g. teacher1@gmail.com">
            </div>
            <div>
                <label>Campus</label>
                <select id="m-campus">
                    <option value="Velpur">Velpur</option>
                    <option value="Relangi">Relangi</option>
                    <option value="Undrajavaram">Undrajavaram</option>
                </select>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-office-in" onclick="saveManual('IN')">OFFICE IN</button>
            <button class="btn btn-office-out" onclick="saveManual('OUT')">OFFICE OUT</button>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>Filter Teacher</label>
            <input type="text" id="f-teacher" placeholder="All Teachers" oninput="refreshUI()">
        </div>
        <div class="filter-group">
            <label>Filter Campus</label>
            <select id="f-campus" onchange="refreshUI()">
                <option value="All">All Campuses</option>
                <option value="Velpur">Velpur</option>
                <option value="Relangi">Relangi</option>
                <option value="Undrajavaram">Undrajavaram</option>
            </select>
        </div>
        <div class="filter-group">
            <label>From Date</label>
            <input type="date" id="f-start" onchange="refreshUI()">
        </div>
        <div class="filter-group">
            <label>To Date</label>
            <input type="date" id="f-end" onchange="refreshUI()">
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">Teacher</th>
                    <th style="width: 25%;">Campus</th>
                    <th style="width: 15%;">Action</th>
                    <th style="width: 25%;">Time</th>
                </tr>
            </thead>
            <tbody id="attendance-list"></tbody>
        </table>
    </div>

    <button class="btn btn-report" onclick="runSalaryReport()">Generate Salary Cut Report</button>
    <div id="report-container" class="report-box">
        <pre id="report-content"></pre>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE", 
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb87e35b7190d6350d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function parseVgaDate(str) {
        if (!str || typeof str !== 'string') return null;
        const [datePart] = str.split(',');
        const [d, m, y] = datePart.trim().split('/');
        return new Date(y, m - 1, d);
    }

    // 1. Save Manual Entry
    function saveManual(type) {
        const teacher = document.getElementById('m-teacher').value;
        const campus = document.getElementById('m-campus').value;
        const timeNow = new Date().toLocaleString('en-IN');
        if(!teacher) return alert("Enter Teacher Email");

        db.collection("attendance").add({
            teacher: teacher,
            campus: campus,
            type: type,
            time: timeNow,
            entryMode: "Manual"
        }).then(() => {
            alert("Entry Saved");
            document.getElementById('m-teacher').value = "";
        });
    }

    // 2. Real-time Filtered Logs
    function refreshUI() {
        const tSearch = document.getElementById('f-teacher').value.toLowerCase();
        const cSearch = document.getElementById('f-campus').value;
        const start = document.getElementById('f-start').value ? new Date(document.getElementById('f-start').value) : null;
        const end = document.getElementById('f-end').value ? new Date(document.getElementById('f-end').value) : null;

        db.collection("attendance").orderBy("time", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById('attendance-list');
            list.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const d = doc.data();
                const logDate = parseVgaDate(d.time);
                if (tSearch && !(d.teacher||"").toLowerCase().includes(tSearch)) return;
                if (cSearch !== "All" && d.campus !== cSearch) return;
                if (start && logDate < start) return;
                if (end && logDate > end) return;

                list.innerHTML += `
                    <tr class="${d.entryMode==='Manual'?'manual-row':''}">
                        <td style="text-align:left; padding-left:5px;">${d.teacher}</td>
                        <td>${d.campus}</td>
                        <td style="color:${d.type==='IN'?'green':'red'}; font-weight:bold;">${d.type}</td>
                        <td style="font-size:9px;">${d.time}</td>
                    </tr>`;
            });
        });
    }

    // 3. Salary Report
    function runSalaryReport() {
        const tSearch = document.getElementById('f-teacher').value.toLowerCase();
        let dataMap = {};
        db.collection("attendance").get().then(snapshot => {
            snapshot.forEach(doc => {
                const d = doc.data();
                if (tSearch && !(d.teacher||"").toLowerCase().includes(tSearch)) return;
                if (!dataMap[d.teacher]) dataMap[d.teacher] = { present: new Set(), late: 0 };
                const dateKey = (d.time||"").split(',')[0];
                dataMap[d.teacher].present.add(dateKey);
            });
            let output = "";
            for (let t in dataMap) {
                output += `Teacher: ${t}\nPresent Days: ${dataMap[t].present.size}\n------------------\n`;
            }
            document.getElementById('report-container').style.display = "block";
            document.getElementById('report-content').innerText = output || "No records.";
        });
    }

    refreshUI();
</script>
</body>
</html>
