<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .main-container { background: #ffffff; width: 100%; max-width: 500px; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 10px; box-sizing: border-box; }
        
        /* Centered Header */
        .header-section { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .academy-logo { width: 100px; height: auto; margin-bottom: 10px; }
        .academy-name { font-size: 22px; color: #1a237e; margin: 0; font-weight: 800; text-transform: uppercase; }
        .panel-title { font-size: 16px; color: #d32f2f; margin-top: 5px; font-weight: 600; }

        /* Table Styling */
        .table-container { border: 1.5px solid #007bff; border-radius: 8px; overflow: hidden; background: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { background-color: #007bff; color: white; padding: 12px 5px; font-size: 13px; border-right: 1px solid #fff; }
        td { padding: 10px 4px; border: 1px solid #eee; font-size: 11px; text-align: center; word-wrap: break-word; vertical-align: middle; }
        
        .status-in { color: #28a745; font-weight: bold; }
        .status-out { color: #dc3545; font-weight: bold; }
        tr:nth-child(even) { background-color: #fcfcfc; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <img src="logo.png" alt="VGA Logo" class="academy-logo">
        <h1 class="academy-name">Veeramallu Global Academy</h1>
        <h2 class="panel-title">Admin Dashboard</h2>
    </div>
    
    <div class="table-container">
        <table>
            <colgroup>
                <col style="width: 38%;">
                <col style="width: 24%;">
                <col style="width: 13%;">
                <col style="width: 25%;">
            </colgroup>
            <thead>
                <tr>
                    <th>Teacher</th>
                    <th>Campus</th>
                    <th>Action</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="attendance-list">
                <tr><td colspan="4">Syncing with Cloud...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6Y-6cac5",
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("attendance").orderBy("time", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById('attendance-list');
        list.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const data = doc.data();
            let displayTime = data.time;
            if (data.time && data.time.toDate) {
                displayTime = data.time.toDate().toLocaleString('en-IN');
            }
            list.innerHTML += `
                <tr>
                    <td style="text-align: left; padding-left: 5px;">${data.teacher || 'N/A'}</td>
                    <td>${data.campus || 'N/A'}</td>
                    <td class="${data.type === 'IN' ? 'status-in' : 'status-out'}">${data.type || 'N/A'}</td>
                    <td style="font-size: 9px; color: #555;">${displayTime || 'N/A'}</td>
                </tr>`;
        });
    });
</script>
</body>
</html>
