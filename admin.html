<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA ADMIN ERP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 10px; }
        .logo img { width: 80px; }
        h2 { text-align: center; color: #1d2d6b; margin-bottom: 20px; border-bottom: 2px solid #1d2d6b; padding-bottom: 10px; }
        
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        
        .btn-admin { background: #2b4c8c; color: white; height: 60px; }
        .btn-logs { background: #eeeeee; color: #999; cursor: not-allowed; }
        .btn-in { background: #28a745; color: white; }
        .btn-out { background: #1d2d6b; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: #007bff; color: white; padding: 10px; text-align: left; }
        td { border: 1px solid #eee; padding: 10px; }
        .late-tag { background: #ff4444; color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
        
        #output-container { margin-top: 20px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 15px; }
        pre { white-space: pre-wrap; font-family: monospace; font-size: 12px; color: #333; }
        
        .report-section { background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #ffcccc; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <div class="logo">
        <img src="https://via.placeholder.com/80?text=VGA" alt="Logo"> </div>
    <h2>VGA ADMIN ERP</h2>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <label>TEACHER</label>
            <select id="teacher"></select>
        </div>
        <div>
            <label>CAMPUS</label>
            <select id="campus">
                <option value="Velpur">Velpur</option>
                <option value="Tadepalligudem">Tadepalligudem</option>
            </select>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn btn-logs">Attendance Logs</button>
        <a href="#" style="text-decoration: none;"><button class="btn btn-admin" style="width: 100%;">Admissions<br>26-27</button></a>
    </div>

    <div class="btn-grid">
        <button class="btn btn-in" onclick="saveRecord('IN')">OFFICE IN</button>
        <button class="btn btn-out" onclick="saveRecord('OUT')">OFFICE OUT</button>
    </div>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <label>SEARCH NAME/EMAIL</label>
            <input type="text" id="search" placeholder="Search..." oninput="loadData()">
        </div>
        <div>
            <label>FILTER CAMPUS</label>
            <select id="filterCampus" onchange="loadData()">
                <option value="All">All</option>
                <option value="Velpur">Velpur</option>
                <option value="Tadepalligudem">Tadepalligudem</option>
            </select>
        </div>
        <div>
            <label>FROM DATE</label>
            <input type="date" id="start" onchange="loadData()">
        </div>
        <div>
            <label>TO DATE</label>
            <input type="date" id="end" onchange="loadData()">
        </div>
    </div>

    <table>
        <thead>
            <tr><th>Teacher</th><th>Campus</th><th>Type</th><th>Time</th></tr>
        </thead>
        <tbody id="list"></tbody>
    </table>

    <button class="btn" style="background:#6c757d; color:white; width:100%; margin-top:10px;" onclick="exportCSV()">📊 Download Attendance CSV</button>

    <div class="report-section">
        <label>📅 JOINING DATE (FOR MID-MONTH JOINERS):</label>
        <input type="date" id="joining">
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button class="btn" style="background:#007bff; color:white; flex:1;" onclick="generateReport()">📑 Report</button>
            <button class="btn" style="background:#25d366; color:white; flex:1;" onclick="saveImage()">📸 WhatsApp</button>
        </div>
    </div>

    <div id="output-container">
        <pre id="output">Report will appear here...</pre>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const LATE_LIMIT = "08:30:00";

const teachers = [
    {name:"Suresh Kumar", email:"suresh@vga.com"},
    {name:"Anitha Rao", email:"anitha@vga.com"},
    {name:"V. Rajesh", email:"rajesh@vga.com"},
    {name:"Veeramallu", email:"veeramallussv@gmail.com"},
    {name:"Teacher 1", email:"teacher1@gmail.com"}
];

const holidays = [
    "2026-04-05", "2026-04-10", "2026-04-14", "2026-05-01"
];

// Initialize Firebase
const firebaseConfig = {
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

window.onload = () => {
    const tSelect = document.getElementById("teacher");
    tSelect.innerHTML = "<option value=''>-- Select --</option>";
    teachers.forEach(t => tSelect.innerHTML += `<option value="${t.email}">${t.name}</option>`);
    loadData();
};

function saveRecord(type) {
    const email = document.getElementById("teacher").value;
    const campus = document.getElementById("campus").value;
    if(!email) return alert("Select teacher!");

    const now = new Date();
    const timeStr = now.toTimeString().split(' ')[0];
    const isLate = (type === "IN" && timeStr > LATE_LIMIT);
    const teacherObj = teachers.find(t => t.email === email);

    db.collection("attendance").add({
        teacher: email,
        name: teacherObj.name,
        campus: campus,
        type: type,
        time: firebase.firestore.Timestamp.fromDate(now),
        late: isLate
    }).then(() => {
        alert("Attendance Saved!");
        loadData();
    }).catch(err => alert("Error: " + err));
}

let unsub;
function loadData() {
    if(unsub) unsub();
    const search = document.getElementById("search").value.toLowerCase();
    const campFilter = document.getElementById("filterCampus").value;
    const sFilter = document.getElementById("start").value;
    const eFilter = document.getElementById("end").value;

    unsub = db.collection("attendance").orderBy("time", "desc").limit(50).onSnapshot(snap => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            let dt = (d.time && d.time.toDate) ? d.time.toDate() : new Date(d.time);
            if(isNaN(dt)) return;

            const dateKey = dt.toISOString().split('T')[0];
            const nameToDisplay = d.name || d.teacher;

            if (search && !nameToDisplay.toLowerCase().includes(search)) return;
            if (campFilter !== "All" && d.campus !== campFilter) return;
            if (sFilter && dateKey < sFilter) return;
            if (eFilter && dateKey > eFilter) return;

            list.innerHTML += `<tr>
                <td>${nameToDisplay}</td>
                <td>${d.campus}</td>
                <td><b style="color:${d.type==='IN'?'green':'red'}">${d.type}</b> ${d.late?'<span class="late-tag">LATE</span>':''}</td>
                <td>${dt.toLocaleString('en-GB')}</td>
            </tr>`;
        });
    });
}

function generateReport() {
    const sStr = document.getElementById("start").value;
    const eStr = document.getElementById("end").value;
    if(!sStr || !eStr) return alert("Select Date Range!");
    
    // Logic for report generation...
    document.getElementById("output").innerText = "Generating report for " + sStr + " to " + eStr + "...";
    // (Existing generateReport logic remains same)
}

function saveImage() {
    html2canvas(document.querySelector("#capture-area")).then(canvas => {
        let link = document.createElement("a");
        link.download = "VGA-Report.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

function exportCSV() {
    let csv = "Teacher,Campus,Type,Time\n";
    document.querySelectorAll("#list tr").forEach(tr => {
        const c = tr.querySelectorAll("td");
        if(c.length >= 4) csv += `${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Attendance.csv';
    a.click();
}
</script>
</body>
</html>
