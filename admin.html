<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Master Office Console</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .main-container { background: #ffffff; width: 100%; max-width: 600px; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 10px; box-sizing: border-box; }
        
        .header-section { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .academy-logo { width: 80px; height: auto; }
        .academy-name { font-size: 18px; color: #1a237e; margin: 5px 0; font-weight: 800; text-transform: uppercase; }
        .panel-title { font-size: 14px; color: #d32f2f; margin: 0; font-weight: 600; }

        /* Manual Console */
        .manual-console { background: #fffde7; border: 2px dashed #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .console-title { font-size: 12px; font-weight: bold; color: #f57f17; display: block; margin-bottom: 10px; text-transform: uppercase; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; box-sizing: border-box; }

        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-in { background: #28a745; }
        .btn-out { background: #1a237e; }
        .btn-report { background: #d32f2f; width: 100%; margin-top: 15px; font-size: 16px; }

        /* Filters & Table */
        .filter-section { background: #f8f9fa; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .table-container { border: 1.5px solid #007bff; border-radius: 10px; overflow: hidden; background: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { background-color: #007bff; color: white; padding: 12px 2px; font-size: 12px; }
        td { padding: 10px 4px; border: 1px solid #eee; font-size: 10px; text-align: center; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .manual-row { background-color: #fffde7 !important; }

        .report-box { background: #fdfdfd; border: 1.5px solid #007bff; border-radius: 12px; padding: 15px; margin-top: 15px; display: none; text-align: left; }
        #report-content { font-family: monospace; white-space: pre-wrap; font-size: 12px; color: #333; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <img src="logo.png" alt="VGA Logo" class="academy-logo">
        <h1 class="academy-name">Veeramallu Global Academy</h1>
        <h2 class="panel-title">Master Office Console</h2>
    </div>

    <div class="manual-console">
        <span class="console-title">📌 Office Log (Basic Phones)</span>
        <div class="grid-2">
            <div>
                <label>Teacher Name</label>
                <select id="m-teacher"></select>
            </div>
            <div>
                <label>Campus</label>
                <select id="m-campus">
                    <option value="Velpur">Velpur</option>
                    <option value="Relangi">Relangi</option>
                    <option value="Undrajavaram">Undrajavaram</option>
                </select>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-in" onclick="saveManual('IN')">OFFICE IN</button>
            <button class="btn btn-out" onclick="saveManual('OUT')">OFFICE OUT</button>
        </div>
    </div>

    <div class="filter-section">
        <div><label>Teacher</label><input type="text" id="f-teacher" oninput="refreshUI()" placeholder="Search..."></div>
        <div><label>Campus</label><select id="f-campus" onchange="refreshUI()"><option value="All">All</option><option value="Velpur">Velpur</option><option value="Relangi">Relangi</option><option value="Undrajavaram">Undrajavaram</option></select></div>
        <div><label>From Date</label><input type="date" id="f-start" onchange="refreshUI()"></div>
        <div><label>To Date</label><input type="date" id="f-end" onchange="refreshUI()"></div>
    </div>
    
    <div class="table-container">
        <table>
            <thead><tr><th style="width:35%">Teacher</th><th style="width:25%">Campus</th><th style="width:15%">Type</th><th style="width:25%">Time</th></tr></thead>
            <tbody id="attendance-list"></tbody>
        </table>
    </div>

    <button class="btn btn-report" onclick="runSalaryReport()">Generate Salary Deduction Report</button>
    <div id="report-container" class="report-box">
        <pre id="report-content"></pre>
    </div>
</div>

<script>
    // --- MASTER CONFIGURATION ---
    const teacherList = [
        { name: "Teacher One", email: "teacher1@gmail.com" },
        { name: "Teacher Two", email: "teacher2@gmail.com" }
    ];

    const holidays = [
        "2026-05-01","2026-08-15","2026-10-02","2026-11-08","2026-12-25",
        "2026-01-04","2026-01-11","2026-01-18","2026-01-25","2026-02-01","2026-02-08","2026-02-15","2026-02-22",
        "2026-03-01","2026-03-08","2026-03-15","2026-03-22","2026-03-29","2026-04-05","2026-04-12","2026-04-19","2026-04-26",
        "2026-05-03","2026-05-10","2026-05-17","2026-05-24","2026-05-31","2026-06-07","2026-06-14","2026-06-21","2026-06-28",
        "2026-07-05","2026-07-12","2026-07-19","2026-07-26","2026-08-02","2026-08-09","2026-08-16","2026-08-23","2026-08-30",
        "2026-09-06","2026-09-13","2026-09-20","2026-09-27","2026-10-04","2026-10-11","2026-10-18","2026-10-25",
        "2026-11-01","2026-11-08","2026-11-15","2026-11-22","2026-11-29","2026-12-06","2026-12-13","2026-12-20","2026-12-27",
        "2027-01-14","2027-01-15","2027-02-05","2027-03-08","2027-03-25","2027-04-16"
    ];

    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE", 
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb87e35b7190d6350d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function parseVgaDate(str) {
        if (!str || typeof str !== 'string') return null;
        const [d, m, y] = str.split(',')[0].trim().split('/');
        return new Date(y, m - 1, d);
    }

    // Initialize Dropdown
    window.onload = () => {
        const sel = document.getElementById('m-teacher');
        sel.innerHTML = '<option value="">-- Select Teacher --</option>';
        teacherList.forEach(t => sel.innerHTML += `<option value="${t.email}">${t.name}</option>`);
        refreshUI();
    };

    function saveManual(type) {
        const teacher = document.getElementById('m-teacher').value;
        if(!teacher) return alert("Select Teacher");
        db.collection("attendance").add({
            teacher: teacher,
            campus: document.getElementById('m-campus').value,
            type: type,
            time: new Date().toLocaleString('en-IN'),
            entry: "Manual"
        }).then(() => alert("Saved"));
    }

    function refreshUI() {
        const tS = document.getElementById('f-teacher').value.toLowerCase();
        const cS = document.getElementById('f-campus').value;
        const start = document.getElementById('f-start').value ? new Date(document.getElementById('f-start').value) : null;
        const end = document.getElementById('f-end').value ? new Date(document.getElementById('f-end').value) : null;

        db.collection("attendance").orderBy("time", "desc").onSnapshot(snap => {
            const list = document.getElementById('attendance-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const logD = parseVgaDate(d.time);
                if (tS && !(d.teacher||"").toLowerCase().includes(tS)) return;
                if (cS !== "All" && d.campus !== cS) return;
                if (start && logD < start) return;
                if (end && logD > end) return;
                list.innerHTML += `<tr class="${d.entry==='Manual'?'manual-row':''}"><td>${d.teacher}</td><td>${d.campus}</td><td style="color:${d.type==='IN'?'green':'red'}">${d.type}</td><td style="font-size:9px">${d.time}</td></tr>`;
            });
        });
    }

    function runSalaryReport() {
        const start = document.getElementById('f-start').value ? new Date(document.getElementById('f-start').value) : null;
        const end = document.getElementById('f-end').value ? new Date(document.getElementById('f-end').value) : null;
        let dataMap = {};
        let datesInRange = new Set();

        db.collection("attendance").get().then(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                const logD = parseVgaDate(d.time);
                if (!logD || (start && logD < start) || (end && logD > end)) return;
                const dateKey = logD.toISOString().split('T')[0];
                datesInRange.add(dateKey);
                if (!dataMap[d.teacher]) dataMap[d.teacher] = { present: new Set(), late: 0 };
                dataMap[d.teacher].present.add(dateKey);
                if (d.late) dataMap[d.teacher].late++;
            });

            let sorted = Array.from(datesInRange).sort();
            let output = "";
            for (let t in dataMap) {
                let p = dataMap[t].present.size, l = dataMap[t].late, abs = 0, sand = 0;
                sorted.forEach((dt, i) => {
                    if (holidays.includes(dt)) {
                        if ((sorted[i-1] && !dataMap[t].present.has(sorted[i-1])) || (sorted[i+1] && !dataMap[t].present.has(sorted[i+1]))) sand++;
                    } else if (!dataMap[t].present.has(dt)) abs++;
                });
                output += `NAME: ${t}\nPRESENT: ${p} | LATE: ${l}\nABSENT CUT (x2): ${abs*2} | SANDWICH: ${sand}\nTOTAL CUT: ${Math.floor(l/3) + abs*2 + sand} DAYS\n\n`;
            }
            document.getElementById('report-container').style.display = "block";
            document.getElementById('report-content').innerText = output || "No Data.";
        });
    }
</script>
</body>
</html>
