<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Veeramallu Global Academy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{
--primary:#1a237e;
--secondary:#0d47a1;
--academic:#6a1b9a;
}

body{
font-family:Segoe UI;
background:#f0f2f5;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
background:#fff;
padding:2rem;
border-radius:15px;
width:100%;
max-width:950px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{max-width:90px;}

.section-header{
background:var(--primary);
color:#fff;
padding:10px;
border-radius:8px;
margin-top:20px;
font-weight:bold;
}

.controls{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin:10px 0;
}

input,select,textarea{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
width:100%;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.btn{background:var(--primary);color:white;}
.btn-green{background:#388e3c;color:white;}
.btn-red{background:#d32f2f;color:white;}
.btn-orange{background:#ff9800;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th{background:var(--primary);color:white;padding:10px;}
td{padding:10px;border-bottom:1px solid #eee;font-size:13px;}
</style>
</head>

<body>

<div class="container" id="capture">

<img src="logo.png" class="logo">
<h2>VEERAMALLU GLOBAL ACADEMY</h2>
<h4>ERP ADMIN v3</h4>

<!-- ADMISSIONS -->
<div class="section-header">ADMISSIONS</div>
<button class="btn" onclick="location.href='admissions.html'">Add / View Admissions</button>

<!-- ACADEMIC -->
<div class="section-header">ACADEMIC</div>
<input id="adminSearchId" placeholder="Student ID">
<select id="adminSearchExam">
<option>FA1</option><option>FA2</option>
<option>SA1</option><option>SA2</option>
</select>
<button class="btn" onclick="fetchAdminMarks()">View Marks</button>

<pre id="adminMarksOutput">Results...</pre>
<button class="btn-red" onclick="deleteMarksRecord()">Delete Marks</button>

<!-- STAFF -->
<div class="section-header">STAFF</div>

<div class="controls">
<input id="t_name" placeholder="Name">
<input id="t_email" placeholder="Email">
<input id="t_subject" placeholder="Subject">
<input id="t_salary" type="number" placeholder="Salary">
</div>

<button class="btn" onclick="createTeacher()">Add Staff</button>

<!-- MANUAL ATTENDANCE -->
<div class="section-header">MANUAL ATTENDANCE</div>

<select id="manualStaffSelect"></select>

<select id="manualCampusSelect">
<option>Relangi</option>
<option>Velpur</option>
<option>Undrajavaram</option>
</select>

<button class="btn-green" onclick="adminForceAttendance('IN')">FORCE IN</button>
<button class="btn-red" onclick="adminForceAttendance('OUT')">FORCE OUT</button>

<!-- ATTENDANCE -->
<div class="section-header">ATTENDANCE LOGS</div>

<table>
<thead>
<tr>
<th>Name</th><th>Campus</th><th>Type</th><th>Time</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<button class="btn" onclick="exportCSV()">Export CSV</button>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
apiKey:"AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
authDomain:"veeramalluerp-6cac5.firebaseapp.com",
projectId:"veeramalluerp-6cac5",
storageBucket:"veeramalluerp-6cac5.firebasestorage.app",
appId:"1:379339569496:web:5c2becb98190b4e43a8d2d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let teachers = [];

// ================= INIT =================
document.addEventListener("DOMContentLoaded", ()=>{
loadAttendance();
loadTeachers();
populateStaffDropdown();
});

// ================= TEACHERS =================
function loadTeachers(){
db.collection("teachers").get().then(snap=>{
teachers=[];
snap.forEach(d=>{
teachers.push({id:d.id,...d.data()});
});
});
}

// dropdown fix
async function populateStaffDropdown(){
let sel=document.getElementById("manualStaffSelect");
sel.innerHTML="<option value=''>Select Staff</option>";

let snap=await db.collection("teachers").get();
snap.forEach(doc=>{
let d=doc.data();
sel.innerHTML+=`<option value="${d.email}">${d.name}</option>`;
});
}

// ================= NAME FIX =================
function resolveName(d){
return d.name ||
teachers.find(t=>t.email===d.teacherEmail)?.name ||
d.teacherEmail ||
"Unknown";
}

// ================= ATTENDANCE =================
function loadAttendance(){
db.collection("attendance")
.orderBy("time","desc")
.onSnapshot(snap=>{
let list=document.getElementById("list");
list.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();
let dt=d.time?.toDate?.() || new Date();

list.innerHTML+=`
<tr>
<td>${resolveName(d)}</td>
<td>${d.campus||"-"}</td>
<td>${d.type||"-"}</td>
<td>${dt.toLocaleString()}</td>
</tr>`;
});
});
}

// ================= STAFF =================
async function createTeacher(){
await db.collection("teachers").add({
name:t_name.value,
email:t_email.value,
subject:t_subject.value,
salary:Number(t_salary.value||0),
createdAt:new Date()
});
alert("Staff Added");
populateStaffDropdown();
}

// ================= MANUAL ATTENDANCE =================
async function adminForceAttendance(type){
let email=document.getElementById("manualStaffSelect").value;
let campus=document.getElementById("manualCampusSelect").value;

if(!email) return alert("Select Staff");

await db.collection("attendance").add({
teacherEmail:email,
campus,
type,
time:firebase.firestore.Timestamp.now()
});

alert("Saved");
}

// ================= MARKS =================
async function fetchAdminMarks(){
let id=adminSearchId.value;
let exam=adminSearchExam.value;

let doc=await db.collection("marks").doc(id+"_"+exam).get();

if(!doc.exists){
adminMarksOutput.innerText="No Data";
return;
}

adminMarksOutput.innerText=JSON.stringify(doc.data(),null,2);
}

async function deleteMarksRecord(){
let id=adminSearchId.value;
let exam=adminSearchExam.value;

await db.collection("marks").doc(id+"_"+exam).delete();
alert("Deleted");
}

// ================= CSV =================
function exportCSV(){
let csv="Name,Campus,Type,Time\n";

document.querySelectorAll("#list tr").forEach(r=>{
csv+=`${r.children[0].innerText},${r.children[1].innerText},${r.children[2].innerText},${r.children[3].innerText}\n`;
});

let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="attendance.csv";
a.click();
}

</script>

</body>
</html>
