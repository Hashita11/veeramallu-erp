<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGA Admin ERP</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f7f9; padding:15px; margin:0; }
    .container { max-width:500px; margin:auto; background:#fff; padding:20px; border-radius:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

    /* Header Section */
    .header { text-align: center; margin-bottom: 25px; }
    .logo { width: 85px; margin-bottom: 10px; }
    h2 { color: #1a237e; margin: 0; font-size: 26px; font-weight: 800; border-bottom: 3px solid #1a237e; display: inline-block; padding-bottom: 5px; text-transform: uppercase; }

    /* Form Grids */
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    label { font-size: 11px; font-weight: 700; color: #444; display: block; margin-bottom: 5px; text-transform: uppercase; }

    /* Inputs */
    select, input { padding: 12px; border: 1px solid #ced4da; border-radius: 8px; width: 100%; box-sizing: border-box; background: #fff; font-size: 14px; color: #333; }
    select:focus, input:focus { outline: none; border-color: #1a237e; background: #fff; }

    /* Buttons */
    .btn { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; text-decoration: none; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
    .btn:active { transform: scale(0.97); }
    
    .btn-logs { background: #eeeeee; color: #888; border: 1px solid #ddd; } /* Matches greyed out style */
    .btn-adm { background: #2b4a91; color: white; }
    .btn-in { background: #28a745; text-transform: uppercase; }
    .btn-out { background: #1a237e; text-transform: uppercase; }
    
    /* Table Styling */
    .table-container { margin-top: 25px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #007bff; color: white; padding: 12px; font-size: 13px; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid #f1f1f1; font-size: 13px; text-align: center; }
    .status-out { color: #dc3545; font-weight: bold; }
    .status-in { color: #28a745; font-weight: bold; }

    hr { border: 0; border-top: 2px solid #f1f1f1; margin: 25px 0; }
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="VGA Logo" class="logo">
        <br>
        <h2>VGA ADMIN ERP</h2>
    </div>

    <div class="grid">
        <div>
            <label>Teacher</label>
            <select id="teacher"></select>
        </div>
        <div>
            <label>Campus</label>
            <select id="campus">
                <option>Velpur</option>
                <option>Relangi</option>
                <option>Undrajavaram</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div class="btn btn-logs">Attendance<br>Logs</div>
        <a href="admissions.html" class="btn btn-adm">Admissions<br>26-27</a>
    </div>

    <div class="grid">
        <button class="btn btn-in" onclick="save('IN')">OFFICE IN</button>
        <button class="btn btn-out" onclick="save('OUT')">OFFICE OUT</button>
    </div>

    <hr>

    <div class="grid">
        <div>
            <label>Search Name/Email</label>
            <input id="search" placeholder="Search..." oninput="load()">
        </div>
        <div>
            <label>Filter Campus</label>
            <select id="filterCampus" onchange="load()">
                <option value="All">All</option>
                <option>Velpur</option>
                <option>Relangi</option>
                <option>Undrajavaram</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div>
            <label>From Date</label>
            <input type="date" id="start" onchange="load()">
        </div>
        <div>
            <label>To Date</label>
            <input type="date" id="end" onchange="load()">
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Teacher</th>
                    <th>Campus</th>
                    <th>Type</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <button class="btn btn-adm" style="width: 100%; margin-top: 20px;" onclick="exportCSV()">Download Monthly Report (CSV)</button>
</div>

<script>
// CONFIGURATION
const LATE_TIME = "08:30:00";
const teachers = [
    {name:"Suresh Kumar", email:"suresh@vga.com"},
    {name:"Anitha Rao", email:"anitha@vga.com"},
    {name:"V. Rajesh", email:"rajesh@vga.com"}
];

// INITIALIZE FIREBASE
firebase.initializeApp({
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5"
});
const db = firebase.firestore();

// INITIALIZE UI
window.onload = () => {
    const tSelect = document.getElementById("teacher");
    tSelect.innerHTML = "<option value=''>-- Select --</option>";
    teachers.forEach(item => {
        tSelect.innerHTML += `<option value="${item.email}">${item.name}</option>`;
    });
    load();
};

// SAVE DATA
function save(type) {
    const email = document.getElementById("teacher").value;
    const campus = document.getElementById("campus").value;

    if (!email) return alert("Select teacher first");

    const now = new Date();
    const timeStr = now.toTimeString().slice(0, 8);

    db.collection("attendance").add({
        teacher: email,
        name: teachers.find(t => t.email === email).name,
        campus: campus,
        type: type,
        time: firebase.firestore.Timestamp.fromDate(now),
        late: (type === "IN" && timeStr > LATE_TIME)
    }).then(() => {
        alert(type + " Status Recorded Successfully");
    }).catch(err => alert("Error: " + err));
}

// LOAD & FILTER DATA
let unsubscribe;
function load() {
    if (unsubscribe) unsubscribe();

    const searchStr = document.getElementById("search").value.toLowerCase();
    const campusStr = document.getElementById("filterCampus").value;
    const fromDate = document.getElementById("start").value ? new Date(document.getElementById("start").value) : null;
    const toDate = document.getElementById("end").value ? new Date(document.getElementById("end").value) : null;
    if(toDate) toDate.setHours(23,59,59);

    unsubscribe = db.collection("attendance").orderBy("time", "desc")
        .onSnapshot(snap => {
            const list = document.getElementById("list");
            list.innerHTML = "";

            snap.forEach(doc => {
                const data = doc.data();
                const timestamp = data.time.toDate();

                // Logical Filters
                if (searchStr && !data.name.toLowerCase().includes(searchStr)) return;
                if (campusStr !== "All" && data.campus !== campusStr) return;
                if (fromDate && timestamp < fromDate) return;
                if (toDate && timestamp > toDate) return;

                list.innerHTML += `
                <tr>
                    <td>${data.name}</td>
                    <td>${data.campus}</td>
                    <td class="${data.type === 'OUT' ? 'status-out' : 'status-in'}">${data.type}</td>
                    <td>${timestamp.toLocaleDateString()}, ${timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})}</td>
                </tr>`;
            });
        });
}

// EXPORT TO CSV
function exportCSV() {
    let csv = "Teacher,Campus,Type,Time\n";
    const rows = document.querySelectorAll("#list tr");
    if(rows.length === 0) return alert("No data to export for current filter.");

    rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        csv += `"${cells[0].innerText}","${cells[1].innerText}","${cells[2].innerText}","${cells[3].innerText}"\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "VGA_Staff_Attendance.csv";
    a.click();
}
</script>

</body>
</html>
