<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGA ERP FINAL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{font-family:Arial;background:#f4f7f9;padding:10px}
.container{max-width:500px;margin:auto;background:#fff;padding:15px;border-radius:12px}
input,select{padding:10px;width:100%;margin-bottom:8px}
button{padding:10px;width:100%;margin-bottom:8px;color:#fff;border:none;border-radius:6px}
.in{background:#28a745} .out{background:#1a237e}
.login{background:#ff9800} .manual{background:#607d8b}
.salary{background:#d32f2f} .csv{background:#444}

table{width:100%;border-collapse:collapse}
th{background:#007bff;color:#fff;padding:6px}
td{padding:6px;border-bottom:1px solid #eee;text-align:center}
</style>
</head>

<body>
<div class="container" id="capture">

<h2 style="text-align:center">VGA ERP FINAL</h2>

<!-- LOGIN -->
<input id="email" placeholder="Teacher Email">
<input id="password" type="password" placeholder="Password">
<button class="login" onclick="login()">Login</button>

<hr>

<!-- MANUAL ENTRY -->
<input id="manualName" placeholder="Manual Name">
<input id="manualPhone" placeholder="Phone Number">
<button class="manual" onclick="manualEntry()">Manual Attendance</button>

<hr>

<select id="campus">
<option>Velpur</option>
<option>Relangi</option>
<option>Undrajavaram</option>
</select>

<button class="in" onclick="mark('IN')">IN</button>
<button class="out" onclick="mark('OUT')">OUT</button>

<hr>

<input id="search" placeholder="Search" oninput="load()">
<input type="date" id="start" onchange="load()">
<input type="date" id="end" onchange="load()">

<table>
<thead>
<tr><th>Name</th><th>Campus</th><th>Type</th><th>Time</th></tr>
</thead>
<tbody id="list"><tr><td colspan="4">Loading...</td></tr></tbody>
</table>

<button class="csv" onclick="exportCSV()">Download CSV</button>

<hr>

<input type="date" id="joining">
<input id="salaryPerDay" placeholder="Salary per day (₹)">
<button class="salary" onclick="generateSalary()">Generate Salary</button>

<pre id="output"></pre>

<button onclick="sendWhatsApp()">Send WhatsApp</button>

</div>

<script>

// CONFIG
const LATE_TIME="08:30:00";

// HOLIDAYS
const holidays=[
"2026-01-26",
"2026-08-15",
"2026-10-02"
];

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
authDomain:"veeramalluerp-6cac5.firebaseapp.com",
projectId:"veeramalluerp-6cac5"
});

const db=firebase.firestore();
const auth=firebase.auth();

let currentUser=null;

// LOGIN
function login(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
).then(res=>{
currentUser=res.user;
alert("Login Success");
}).catch(e=>alert(e.message));
}

// MARK ATTENDANCE
function mark(type){
if(!currentUser) return alert("Login first");

const now=new Date();
const timeStr=now.toTimeString().slice(0,8);

db.collection("attendance").add({
name:currentUser.email,
campus:document.getElementById("campus").value,
type:type,
time:firebase.firestore.Timestamp.fromDate(now),
late:(type==="IN" && timeStr>LATE_TIME),
mode:"online"
});
}

// MANUAL ENTRY
function manualEntry(){
let name=document.getElementById("manualName").value;
let phone=document.getElementById("manualPhone").value;

if(!name||!phone) return alert("Fill details");

db.collection("attendance").add({
name:name,
phone:phone,
campus:"Office",
type:"IN",
time:firebase.firestore.Timestamp.fromDate(new Date()),
late:false,
mode:"manual"
});
}

// LOAD
function load(){
db.collection("attendance").onSnapshot(snap=>{
let list=document.getElementById("list");
list.innerHTML="";

let data=[];
snap.forEach(doc=>data.push(doc.data()));

data.sort((a,b)=>b.time.toDate()-a.time.toDate());

data.forEach(d=>{
let dt=d.time.toDate();
list.innerHTML+=`
<tr>
<td>${d.name}</td>
<td>${d.campus}</td>
<td>${d.type}</td>
<td>${dt.toLocaleDateString()}<br>${dt.toLocaleTimeString()}</td>
</tr>`;
});
});
}

// SALARY
function generateSalary(){

let start=new Date(document.getElementById("start").value);
let end=new Date(document.getElementById("end").value);
end.setHours(23,59,59);

let join=document.getElementById("joining").value ? new Date(document.getElementById("joining").value) : start;
let perDay=parseFloat(document.getElementById("salaryPerDay").value || 0);

db.collection("attendance").get().then(snap=>{

let map={};
let workingDays=[];

// calculate working days
for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
let key=d.toISOString().split('T')[0];
if(d>=join && !holidays.includes(key)){
workingDays.push(key);
}
}

snap.forEach(doc=>{
let d=doc.data();
let dt=d.time.toDate();
let key=dt.toISOString().split('T')[0];

if(dt>=start && dt<=end){
if(!map[d.name]) map[d.name]={present:new Set(),late:0};

if(d.type==="IN") map[d.name].present.add(key);
if(d.late) map[d.name].late++;
}
});

let out="";
for(let name in map){
let present=map[name].present.size;
let late=map[name].late;
let working=workingDays.length;
let absent=working-present;

let latePenalty=Math.floor(late/3);
let payableDays=present-latePenalty;

let salary=payableDays*perDay;

out+=`${name}
Working Days: ${working}
Present: ${present}
Absent: ${absent}
Late: ${late}
Penalty Days: ${latePenalty}
Final Paid Days: ${payableDays}
Salary: ₹${salary}

----------------------
`;
}

document.getElementById("output").innerText=out;

});
}

// WHATSAPP
function sendWhatsApp(){
let text=document.getElementById("output").innerText;
let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url);
}

// CSV
function exportCSV(){
let csv="Name,Campus,Type,Time\n";
document.querySelectorAll("#list tr").forEach(tr=>{
let c=tr.querySelectorAll("td");
if(c.length>=4)
csv+=`${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="attendance.csv";
a.click();
}

</script>
</body>
</html>
