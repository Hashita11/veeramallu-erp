<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Veeramallu Global Academy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root { --primary:#1a237e; --secondary:#0d47a1; --success:#28a745; --error:#d32f2f; --academic:#4a148c; }
body { font-family:'Segoe UI',sans-serif;background:#f0f2f5;margin:0;padding:20px;display:flex;justify-content:center; }
.container { background:white;padding:2rem;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:950px;text-align:center; }
.logo { max-width:100px;margin-bottom:10px; }
.section-header { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; }
.controls { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:15px; }
input,select,textarea { padding:12px;border:1px solid #ddd;border-radius:8px;width:100%; box-sizing: border-box; font-size: 14px; }
.table-container { width:100%;overflow-x:auto;margin-top:15px;border-radius:8px;border:1px solid #eee; }
table { width:100%;border-collapse:collapse; }
th { background:var(--primary);color:white;padding:12px; }
td { padding:12px;border-bottom:1px solid #eee;font-size:0.9rem; }
.btn { padding:15px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;width:100%; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn:active { transform: scale(0.98); }
.btn-adm { background:#e67e22; color:white; border-bottom: 4px solid #d35400; }
.btn-view { background:#2980b9; color:white; border-bottom: 4px solid #1c5980; }
.btn-aca { background:var(--academic); color:white; }
.btn-csv { background:#27ae60; color:white; margin-top: 10px; }
.salary-box, .marks-box { background:#f4f4f9; padding:20px; border-radius:12px; margin-top:15px; text-align:left; border: 1px solid #dcdde1; }
#output, #marksOutput { white-space:pre-wrap; background:#fff; padding:15px; border-radius:8px; margin-top:10px; font-family:monospace; border: 1px solid #ddd; font-size: 14px; min-height: 50px; }
.nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
</style>
</head>

<body>

<div class="container" id="capture">
    <img src="logo.png" class="logo">
    <h1 style="color:#1a237e; margin:0;">VEERAMALLU GLOBAL ACADEMY</h1>
    <h3 style="margin-top:5px; color: #666;">ADMIN DASHBOARD</h3>

    <div class="section-header">Admissions & Registration</div>
    <div style="padding:15px;">
        <div class="nav-grid">
            <button class="btn btn-adm" onclick="location.href='admissions.html'">➕ Add New Admission</button>
            <button class="btn btn-view" onclick="location.href='admissions.html#view'">📋 View Admission List</button>
        </div>
    </div>

    <div class="section-header">Academic & Marks Management</div>
    <div class="marks-box">
        <button class="btn btn-aca" onclick="location.href='marks-entry.html'" style="margin-bottom:15px;">📝 Open Marks Entry Portal</button>
        <div class="controls">
            <input id="searchAdmNo" placeholder="Enter Admission No">
            <select id="searchExam">
                <option value="FA 1 (Formative)">FA 1 (Formative)</option>
                <option value="FA 2 (Formative)">FA 2 (Formative)</option>
                <option value="FA 3 (Formative)">FA 3 (Formative)</option>
                <option value="FA 4 (Formative)">FA 4 (Formative)</option>
                <option value="SA 1 (Summative)">SA 1 (Summative)</option>
                <option value="SA 2 (Summative)">SA 2 (Summative)</option>
            </select>
        </div>
        <button class="btn" style="background:#6a1b9a; color:white;" onclick="viewMarks()">View Marks Report</button>
        <div id="marksOutput">Results will appear here...</div>
    </div>

    <div class="section-header">Staff Recruitment</div>
    <div style="background:#fff3cd; padding:20px; border-radius:12px; border:1px solid #ffeeba;">
        <div class="controls">
            <input id="t_name" placeholder="Full Name">
            <input id="t_email" placeholder="Email">
            <input id="t_password" type="password" placeholder="Password">
            <input id="t_subject" placeholder="Subject">
            <input id="t_salary" type="number" placeholder="Salary">
        </div>
        <button class="btn" style="background:#1a237e; color:white; margin-top:10px;" onclick="createTeacher()">Register Staff</button>
    </div>

    <div class="section-header">Attendance Logs</div>
    <div class="controls">
        <input id="search" placeholder="Search by name..." onkeyup="load()">
        <select id="filterCampus" onchange="load()">
            <option value="All">All Campuses</option>
            <option value="Relangi">Relangi</option>
            <option value="Velpur">Velpur</option>
            <option value="Undrajavaram">Undrajavaram</option>
        </select>
        <input type="date" id="start" onchange="load()">
        <input type="date" id="end" onchange="load()">
    </div>
    <div class="table-container">
        <table>
            <thead><tr><th>Name</th><th>Campus</th><th>Type</th><th>Time</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <button class="btn btn-csv" onclick="exportCSV()">Download CSV</button>

    <div class="section-header">Payroll (3 Lates = 1 Day Loss)</div>
    <div class="salary-box">
        <button class="btn" style="background:#1a237e; color:white;" onclick="generateSalary()">Generate Salary Report</button>
        <button class="btn" style="background:#25d366; color:white; margin-top:10px;" onclick="saveWhatsAppImage()">Save Report Image</button>
        <div id="output">Payroll details...</div>
    </div>

    <div class="section-header">Notice Broadcast</div>
    <textarea id="noticeMsg" style="height:80px; margin-top:10px;" placeholder="Message for Parents/Staff..."></textarea>
    <button class="btn" onclick="sendNotice()" style="background:#1a237e; color:white; margin-top:10px;">Send Notification</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:"AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain:"veeramalluerp-6cac5.firebaseapp.com",
    projectId:"veeramalluerp-6cac5"
});
const db=firebase.firestore();
const LATE_TIME="08:30:00";
const HOLIDAYS=["2026-01-26","2026-08-15","2026-10-02"];
let teachers=[], unsubscribe;

window.onload=()=>{ loadTeachers(); load(); };

function loadTeachers(){
    db.collection("teachers").get().then(s=>{
        teachers=[];
        s.forEach(doc=>{ let d=doc.data(); d.uid=doc.id; teachers.push(d); });
    });
}

function viewMarks(){
    let admNo = document.getElementById("searchAdmNo").value;
    let exam = document.getElementById("searchExam").value;
    let marksDiv = document.getElementById("marksOutput");
    if(!admNo) return alert("Enter Admission Number");

    marksDiv.innerText = "Searching...";

    db.collection("marks")
      .where("admissionNo", "==", admNo)
      .where("examType", "==", exam)
      .get().then(s => {
          if(s.empty) {
              marksDiv.innerText = "No records found for " + exam + ". Ensure Admission No is correct.";
              return;
          }
          let out = "";
          s.forEach(doc => {
              let d = doc.data();
              out += `NAME: ${d.studentName} | CLASS: ${d.class}\nEXAM: ${d.examType}\n--------------------------\n`;
              if(d.subjects){
                  for(let sub in d.subjects) { out += `${sub}: ${d.subjects[sub]}\n`; }
              }
              out += `TOTAL: ${d.total} / ${d.maxMarks || 50}\nGRADE: ${d.grade || 'N/A'}\n`;
          });
          marksDiv.innerText = out;
      }).catch(err => alert("Error: " + err.message));
}

function load(){
    if(unsubscribe) unsubscribe();
    let searchTerm = document.getElementById("search").value.toLowerCase();
    let selCampus = document.getElementById("filterCampus").value;
    let startDate = document.getElementById("start").value ? new Date(document.getElementById("start").value) : null;
    let endDate = document.getElementById("end").value ? new Date(document.getElementById("end").value) : null;
    if(startDate) startDate.setHours(0,0,0,0);
    if(endDate) endDate.setHours(23,59,59,999);

    unsubscribe = db.collection("attendance").orderBy("time","desc").onSnapshot(snap => {
        let list = document.getElementById("list");
        list.innerHTML = "";
        snap.forEach(doc => {
            let d = doc.data();
            let dt = d.time?.toDate();
            if(!dt) return;
            let name = d.name || teachers.find(t=>t.uid==d.teacherId)?.name || "Unknown";
            if(searchTerm && !name.toLowerCase().includes(searchTerm)) return;
            if(selCampus !== "All" && d.campus !== selCampus) return;
            if(startDate && dt < startDate) return;
            if(endDate && dt > endDate) return;
            let late = d.type=="IN" && dt.toTimeString().slice(0,8) > LATE_TIME;
            list.innerHTML += `<tr><td><b>${name}</b></td><td>${d.campus}</td><td>${d.type} ${late?'<span style="color:red">LATE</span>':''}</td><td>${dt.toLocaleString()}</td></tr>`;
        });
    });
}

function createTeacher(){
    let n=t_name.value, e=t_email.value, p=t_password.value, s=t_subject.value, sa=t_salary.value;
    if(!n||!e||!p) return alert("Fill all fields");
    firebase.auth().createUserWithEmailAndPassword(e,p).then(r=> {
        return db.collection("teachers").doc(r.user.uid).set({ uid:r.user.uid, name:n, email:e, subject:s, salary:Number(sa) });
    }).then(()=> { alert("Staff Registered"); location.reload(); });
}

function generateSalary(){
    let s_val = document.getElementById("start").value;
    let e_val = document.getElementById("end").value;
    if(!s_val || !e_val) return alert("Select Date Range in filters first");
    let start=new Date(s_val); start.setHours(0,0,0,0);
    let end=new Date(e_val); end.setHours(23,59,59,999);
    db.collection("attendance").get().then(snap=>{
        let map={};
        snap.forEach(doc=>{
            let d=doc.data(), dt=d.time?.toDate();
            if(!dt || dt < start || dt > end) return;
            let name = d.name || teachers.find(t=>t.uid==d.teacherId)?.name || "Unknown";
            if(!map[name]) map[name]={p:new Set(), l:0};
            if(d.type=="IN"){
                map[name].p.add(dt.toDateString());
                if(dt.toTimeString().slice(0,8) > LATE_TIME) map[name].l++;
            }
        });
        let wd=0;
        for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
            if(d.getDay()!=0 && !HOLIDAYS.includes(d.toISOString().slice(0,10))) wd++;
        }
        let out="PAYROLL REPORT\n";
        for(let n in map){
            let tObj=teachers.find(x=>x.name==n);
            let sal=tObj?.salary||0;
            let present=map[n].p.size;
            let lateLoss = Math.floor(map[n].l/3);
            let final = sal - ((wd - present + lateLoss) * (sal/wd));
            out+=`${n}: ₹${Math.max(0, final).toFixed(0)} (Late: ${map[n].l})\n`;
        }
        document.getElementById("output").innerText=out;
    });
}

function exportCSV(){
    let csv="Name,Campus,Type,Time\n";
    document.querySelectorAll("#list tr").forEach(tr=>{
        csv+=`"${tr.children[0].innerText}","${tr.children[1].innerText}","${tr.children[2].innerText}","${tr.children[3].innerText}"\n`;
    });
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download="Attendance.csv";
    a.click();
}

function saveWhatsAppImage(){
    html2canvas(document.getElementById("capture")).then(c=>{
        let a=document.createElement("a"); a.href=c.toDataURL(); a.download="Report.png"; a.click();
    });
}

async function sendNotice(){
    let msg=document.getElementById("noticeMsg").value;
    if(!msg) return alert("Type a message");
    await db.collection("notifications").doc("latest").set({ text:msg, timestamp:firebase.firestore.FieldValue.serverTimestamp() });
    alert("Sent");
    document.getElementById("noticeMsg").value="";
}
</script>
</body>
</html>
