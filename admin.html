<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Admin - Manual & Real-time Logs</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .main-container { background: #ffffff; width: 100%; max-width: 600px; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 10px; box-sizing: border-box; }
        
        .header-section { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .academy-logo { width: 80px; height: auto; }
        .academy-name { font-size: 18px; color: #1a237e; margin: 5px 0; font-weight: 800; text-transform: uppercase; }
        .panel-title { font-size: 14px; color: #d32f2f; margin: 0; font-weight: 600; }

        /* Manual Entry Console */
        .manual-console { background: #fffde7; border: 2px dashed #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .console-title { font-size: 13px; font-weight: bold; color: #f57f17; margin-bottom: 12px; display: block; text-transform: uppercase; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        
        label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; display: block; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; box-sizing: border-box; }

        .btn-row { display: flex; gap: 10px; }
        .btn-m { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-m-in { background: #28a745; }
        .btn-m-out { background: #1a237e; }

        /* Monitoring Table */
        .table-container { border: 1.5px solid #007bff; border-radius: 10px; overflow: hidden; background: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { background-color: #007bff; color: white; padding: 12px 2px; font-size: 12px; }
        td { padding: 12px 2px; border: 1px solid #eee; font-size: 10.5px; text-align: center; word-wrap: break-word; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .manual-row { background-color: #fffde7 !important; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <img src="logo.png" alt="VGA Logo" class="academy-logo">
        <h1 class="academy-name">Veeramallu Global Academy</h1>
        <h2 class="panel-title">Office Admin Dashboard</h2>
    </div>

    <div class="manual-console">
        <span class="console-title">📌 Manual Entry (Basic Phones / Office Log)</span>
        <div class="grid-3">
            <div>
                <label>Select Teacher</label>
                <select id="m-teacher">
                    <option value="">-- Choose Teacher --</option>
                    <option value="teacher1@gmail.com">Teacher One</option>
                    <option value="teacher2@gmail.com">Teacher Two</option>
                </select>
            </div>
            <div>
                <label>Campus</label>
                <select id="m-campus">
                    <option value="Velpur">Velpur</option>
                    <option value="Relangi">Relangi</option>
                    <option value="Undrajavaram">Undrajavaram</option>
                </select>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn-m btn-m-in" onclick="saveManual('IN')">OFFICE IN</button>
            <button class="btn-m btn-m-out" onclick="saveManual('OUT')">OFFICE OUT</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">Teacher</th>
                    <th style="width: 25%;">Campus</th>
                    <th style="width: 15%;">Action</th>
                    <th style="width: 25%;">Time</th>
                </tr>
            </thead>
            <tbody id="attendance-list">
                <tr><td colspan="4">Syncing with school cloud...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE", 
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb87e35b7190d6350d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. SAVE MANUAL ENTRY
    function saveManual(type) {
        const teacher = document.getElementById('m-teacher').value;
        const campus = document.getElementById('m-campus').value;
        const timeNow = new Date().toLocaleString('en-IN');

        if(!teacher) { alert("Please select a teacher!"); return; }

        if(confirm(`Manually log ${type} for ${teacher}?`)) {
            db.collection("attendance").add({
                teacher: teacher,
                campus: campus,
                type: type,
                time: timeNow,
                method: "Manual"
            }).then(() => {
                alert("Attendance Saved Successfully");
                document.getElementById('m-teacher').value = "";
            });
        }
    }

    // 2. LIVE LOGS LISTENER
    db.collection("attendance").orderBy("time", "desc").limit(50).onSnapshot((snapshot) => {
        const list = document.getElementById('attendance-list');
        list.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const d = doc.data();
            const rowClass = d.method === "Manual" ? "manual-row" : "";
            
            list.innerHTML += `
                <tr class="${rowClass}">
                    <td style="text-align:left; padding-left:5px;">${d.teacher || 'N/A'}</td>
                    <td>${d.campus || 'N/A'}</td>
                    <td style="color:${d.type==='IN'?'#28a745':'#d32f2f'}; font-weight:bold;">${d.type}</td>
                    <td style="font-size:9px; color:#666;">${d.time}</td>
                </tr>`;
        });
    });
</script>
</body>
</html>
