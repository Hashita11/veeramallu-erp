<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Attendance Monitoring</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .dashboard-card { background: #ffffff; width: 100%; max-width: 500px; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { font-size: 24px; margin: 0 0 5px 0; color: #333; font-weight: bold; }
        h2 { font-size: 18px; margin: 0 0 20px 0; color: #000; font-weight: 600; }
        
        .table-container { border: 1.5px solid #007bff; border-radius: 6px; overflow: hidden; background: white; }
        table { width: 100%; border-collapse: collapse; }
        
        thead th { background-color: #007bff; color: white; padding: 12px 5px; font-size: 14px; border-right: 1px solid #ffffff; }
        thead th:last-child { border-right: none; }
        
        td { padding: 12px 8px; border: 1px solid #eeeeee; font-size: 13px; text-align: center; color: #333; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .status-in { color: #28a745; font-weight: bold; }
        .status-out { color: #dc3545; font-weight: bold; }
        .date-small { display: block; font-size: 10px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>Admin Dashboard</h1>
        <h2>Attendance Logs</h2>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Teacher</th>
                        <th>Campus</th>
                        <th>Action</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="attendance-list">
                    <tr>
                        <td colspan="4">Loading attendance data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "hashita11.firebaseapp.com",
            projectId: "hashita11",
            storageBucket: "hashita11.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 2. INITIALIZE FIREBASE
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 3. FETCH DATA (Using 'teacherName' as requested)
        db.collection("attendance")
          .orderBy("timestamp", "desc")
          .limit(30)
          .onSnapshot((snapshot) => {
            const list = document.getElementById('attendance-list');
            list.innerHTML = ""; 

            if (snapshot.empty) {
                list.innerHTML = "<tr><td colspan='4'>No logs found for today.</td></tr>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Format the Timestamp for India Timezone
                let timeStr = "Invalid Date";
                if (data.timestamp) {
                    const date = data.timestamp.toDate();
                    timeStr = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
                    const dateStr = date.toLocaleDateString('en-IN');
                    timeStr += `<span class="date-small">${dateStr}</span>`;
                }

                const row = `
                    <tr>
                        <td style="font-weight:600;">${data.teacherName || 'Not Assigned'}</td>
                        <td>${data.campus || 'Main'}</td>
                        <td class="${data.action === 'IN' ? 'status-in' : 'status-out'}">${data.action}</td>
                        <td>${timeStr}</td>
                    </tr>
                `;
                list.innerHTML += row;
            });
          }, (error) => {
              console.error("Error: ", error);
              document.getElementById('attendance-list').innerHTML = "<tr><td colspan='4'>Connection Error. Check Firebase Keys.</td></tr>";
          });
    </script>
</body>
</html>
