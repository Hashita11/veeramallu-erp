<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGA Admin ERP</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f7f9; padding:10px; margin:0; }
    .container { max-width:500px; margin:auto; background:#fff; padding:15px; border-radius:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    
    .header { text-align: center; margin-bottom: 20px; }
    .logo { width: 80px; margin-bottom: 5px; }
    h2 { color: #1a237e; margin: 0; font-size: 22px; border-bottom: 3px solid #1a237e; display: inline-block; padding-bottom: 5px; text-transform: uppercase; }

    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    label { font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 3px; text-transform: uppercase; }
    
    select, input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; background: #fff; }

    .btn { padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-in { background: #28a745; }
    .btn-out { background: #1a237e; }
    .btn-adm { background: #2b4a91; } /* Admissions Button Color */
    .btn-csv { background: #6c757d; width: 100%; margin-top: 10px; }
    .btn-salary { background: #d32f2f; width: 100%; margin-top: 10px; }
    .btn-wa { background: #e67e22; width: 100%; margin-top: 10px; }

    .table-container { margin-top: 15px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th { background: #007bff; color: white; padding: 10px; font-size: 12px; }
    td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; text-align: center; color: #333; line-height: 1.4; }

    .salary-box { background: #fff5f5; border: 1px solid #ffdada; padding: 15px; border-radius: 10px; margin-top: 20px; }
    #output { background: #fff; padding: 10px; border: 1px solid #ddd; margin-top: 10px; white-space: pre-wrap; font-size: 13px; min-height: 50px; color: #333; }
    hr { border: 0; border-top: 2px solid #eee; margin: 20px 0; }
</style>
</head>

<body>

<div class="container" id="capture">
    <div class="header">
        <img src="logo.png" alt="VGA Logo" class="logo">
        <br>
        <h2>VGA ADMIN ERP</h2>
    </div>

    <div class="grid">
        <div><label>Teacher</label><select id="teacher"></select></div>
        <div><label>Campus</label>
            <select id="campus">
                <option>Velpur</option>
                <option>Relangi</option>
                <option>Undrajavaram</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <a href="admissions.html" class="btn btn-adm" style="grid-column: span 2;">Student Admissions 2026-27</a>
    </div>

    <div class="grid">
        <button class="btn btn-in" onclick="save('IN')">OFFICE IN</button>
        <button class="btn btn-out" onclick="save('OUT')">OFFICE OUT</button>
    </div>

    <hr>

    <div class="grid">
        <div><label>Search Name</label><input id="search" placeholder="Search..." oninput="load()"></div>
        <div><label>Filter Campus</label>
            <select id="filterCampus" onchange="load()">
                <option value="All">All</option>
                <option>Velpur</option>
                <option>Relangi</option>
                <option>Undrajavaram</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div><label>From Date</label><input type="date" id="start" onchange="load()"></div>
        <div><label>To Date</label><input type="date" id="end" onchange="load()"></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Teacher</th>
                    <th>Campus</th>
                    <th>Type</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="list">
                <tr><td colspan="4">Connecting to Firebase...</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn btn-csv" onclick="exportCSV()">Download Attendance CSV</button>

    <div class="salary-box">
        <label>📅 JOINING DATE:</label>
        <input type="date" id="joining">
        <button class="btn btn-salary" onclick="generateSalary()">Generate Salary Report</button>
        <button class="btn btn-wa" onclick="saveWhatsAppImage()">Save WhatsApp Image</button>
        <div id="output">No report generated yet...</div>
    </div>
</div>

<script>
const LATE_TIME = "08:30:00";
const teachers = [
    {name:"Suresh Kumar", email:"suresh@vga.com"},
    {name:"Anitha Rao", email:"anitha@vga.com"},
    {name:"V. Rajesh", email:"rajesh@vga.com"}
];

// Ensure your Firebase Config is 100% correct
firebase.initializeApp({
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5"
});
const db = firebase.firestore();

window.onload = () => {
    const tSelect = document.getElementById("teacher");
    tSelect.innerHTML = "<option value=''>-- Select Teacher --</option>";
    teachers.forEach(t => {
        tSelect.innerHTML += `<option value="${t.email}">${t.name}</option>`;
    });
    load();
};

function save(type) {
    const email = document.getElementById("teacher").value;
    const campus = document.getElementById("campus").value;
    if (!email) return alert("Select Teacher first");

    const now = new Date();
    db.collection("attendance").add({
        teacher: email,
        name: teachers.find(t => t.email === email).name,
        campus: campus,
        type: type,
        time: firebase.firestore.Timestamp.fromDate(now),
        late: (type === "IN" && now.toTimeString().slice(0, 8) > LATE_TIME)
    }).then(() => {
        alert("Attendance Saved!");
        load();
    }).catch(err => alert("Firebase Error: " + err.message));
}

let unsubscribe;
function load() {
    if (unsubscribe) unsubscribe();
    const search = document.getElementById("search").value.toLowerCase();
    const campusFilt = document.getElementById("filterCampus").value;
    const sDate = document.getElementById("start").value ? new Date(document.getElementById("start").value) : null;
    const eDate = document.getElementById("end").value ? new Date(document.getElementById("end").value) : null;
    if(eDate) eDate.setHours(23,59,59);

    const list = document.getElementById("list");

    unsubscribe = db.collection("attendance").onSnapshot(snap => {
        list.innerHTML = "";
        let docs = [];
        snap.forEach(doc => docs.push(doc.data()));
        docs.sort((a, b) => b.time.toDate() - a.time.toDate());

        docs.forEach(d => {
            let dt = d.time.toDate();
            if (search && !d.name.toLowerCase().includes(search)) return;
            if (campusFilt !== "All" && d.campus !== campusFilt) return;
            if (sDate && dt < sDate) return;
            if (eDate && dt > eDate) return;

            list.innerHTML += `<tr>
                <td>${d.name}</td>
                <td>${d.campus}</td>
                <td style="color:${d.type==='OUT'?'red':'green'}; font-weight:bold">${d.type}</td>
                <td>${dt.toLocaleDateString()}<br>${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
            </tr>`;
        });
        if (list.innerHTML === "") list.innerHTML = "<tr><td colspan='4'>No records found</td></tr>";
    }, err => {
        list.innerHTML = `<tr><td colspan='4' style="color:red">Error: ${err.message}</td></tr>`;
    });
}

function generateSalary() {
    const sStr = document.getElementById("start").value;
    const eStr = document.getElementById("end").value;
    if(!sStr || !eStr) return alert("Select From/To Dates first");

    const start = new Date(sStr);
    const end = new Date(eStr);
    end.setHours(23,59,59);
    const joinDate = document.getElementById("joining").value ? new Date(document.getElementById("joining").value) : start;

    db.collection("attendance").get().then(snap => {
        let map = {};
        let daysInRange = new Set();
        snap.forEach(doc => {
            const d = doc.data();
            const dt = d.time.toDate();
            const key = dt.toISOString().split('T')[0];
            if(dt >= start && dt <= end) {
                daysInRange.add(key);
                if(!map[d.name]) map[d.name] = { present: new Set(), late: 0 };
                if(d.type === "IN") map[d.name].present.add(key);
                if(d.late) map[d.name].late++;
            }
        });

        let out = `VGA SALARY SUMMARY\n----------------\n`;
        for(let name in map) {
            let p = map[name].present.size;
            let l = map[name].late;
            let a = 0;
            daysInRange.forEach(d => { if(new Date(d) >= joinDate && !map[name].present.has(d)) a++; });
            out += `${name}: ${p} Days | ${l} Late | ${a} Absent\n`;
        }
        document.getElementById("output").innerText = Object.keys(map).length ? out : "No records found.";
    });
}

function exportCSV() {
    let csv = "Teacher,Campus,Type,Time\n";
    document.querySelectorAll("#list tr").forEach(tr => {
        const c = tr.querySelectorAll("td");
        if(c.length >= 4) csv += `"${c[0].innerText}","${c[1].innerText}","${c[2].innerText}","${c[3].innerText.replace('\n',' ')}"\n`;
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = "Attendance_Report.csv";
    a.click();
}

function saveWhatsAppImage() {
    html2canvas(document.getElementById("capture")).then(canvas => {
        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = "VGA_ERP_Report.png";
        a.click();
    });
}
</script>
</body>
</html>
