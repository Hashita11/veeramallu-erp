<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veeramallu ERP - Attendance</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .dashboard-card { background: #ffffff; width: 100%; max-width: 550px; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #333; }
        h2 { font-size: 18px; margin-bottom: 20px; color: #000; }
        
        .table-container { border: 1.5px solid #007bff; border-radius: 8px; overflow: hidden; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        thead th { background-color: #007bff; color: white; padding: 12px 5px; font-size: 14px; border-right: 1px solid #ffffff; }
        thead th:last-child { border-right: none; }
        
        td { padding: 12px 5px; border: 1px solid #eeeeee; font-size: 12px; text-align: center; word-wrap: break-word; color: #333; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .status-in { color: #28a745; font-weight: bold; }
        .status-out { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>Admin Dashboard</h1>
        <h2>Attendance Logs</h2>
        
        <div class="table-container">
            <table>
                <colgroup>
                   <col style="width: 35%;">
                   <col style="width: 25%;">
                   <col style="width: 15%;">
                   <col style="width: 25%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>Teacher</th>
                        <th>Campus</th>
                        <th>Action</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="attendance-list">
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6Y-6cac5",
            authDomain: "veeramalluerp-6cac5.firebaseapp.com",
            projectId: "veeramalluerp-6cac5",
            storageBucket: "veeramalluerp-6cac5.appspot.com",
            messagingSenderId: "379339569496",
            appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("attendance").onSnapshot((snapshot) => {
            const list = document.getElementById('attendance-list');
            list.innerHTML = ""; 

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Pulling 'teacher', 'campus', 'type', and 'time' directly from your Firebase keys
                const row = `
                    <tr>
                        <td style="font-size: 11px;">${data.teacher || 'N/A'}</td>
                        <td>${data.campus || 'N/A'}</td>
                        <td class="${data.type === 'IN' ? 'status-in' : 'status-out'}">${data.type || 'N/A'}</td>
                        <td style="font-size: 10px;">${data.time || 'N/A'}</td>
                    </tr>
                `;
                list.innerHTML += row;
            });
        });
    </script>
</body>
</html>
