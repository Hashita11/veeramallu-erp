<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA ADMIN ERP - FINAL VERSION</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; padding:10px; margin:0; }
        .container { max-width:650px; margin:auto; background:#fff; padding:20px; border-radius:12px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align:center; color: #1a237e; margin-bottom: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; margin-top: 5px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom: 10px; }
        input, select { padding:10px; border:1px solid #ccc; border-radius:6px; width:100%; box-sizing: border-box; font-size: 14px; }
        .btn { padding:12px; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; width: 100%; }
        .in { background:#28a745; }
        .out { background:#1a237e; }
        .csv { background:#6c757d; margin-top:10px; }
        .report { background:#d32f2f; margin-top:10px; }
        .whatsapp { background:#e67e22; margin-top:10px; }
        table { width:100%; margin-top:15px; border-collapse:collapse; background: white; }
        th { background:#007bff; color:white; padding:10px; font-size: 13px; }
        td { padding:8px; border:1px solid #eee; font-size:12px; text-align:center; }
        .late-tag { color:red; font-weight: bold; font-size:10px; }
        #output { background: #fdfdfd; padding: 15px; border: 1px solid #ddd; margin-top: 15px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 13px; color: #333; line-height: 1.5; }
        label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; display: block; margin-bottom: 4px; }
    </style>
</head>

<body>
<div class="container" id="capture-area">
    
    <div style="text-align: center; margin-bottom: 10px;">
        <img src="logo.png" alt="VGA Logo" style="max-height: 70px; width: auto;">
    </div>
    
    <h2>VGA ADMIN ERP</h2>

    <div class="grid">
        <div><label>Teacher</label><select id="teacher"></select></div>
        <div><label>Campus</label>
            <select id="campus">
                <option>Velpur</option>
                <option>Relangi</option>
                <option>Undrajavaram</option>
            </select>
        </div>
    </div>
    <div class="grid">
        <button class="btn in" onclick="saveRecord('IN')">OFFICE IN</button>
        <button class="btn out" onclick="saveRecord('OUT')">OFFICE OUT</button>
    </div>

    <hr>

    <div class="grid">
        <div><label>Search Name/Email</label><input id="search" placeholder="Search..." oninput="loadData()"></div>
        <div><label>Filter Campus</label>
            <select id="filterCampus" onchange="loadData()">
                <option value="All">All</option>
                <option>Velpur</option>
                <option>Relangi</option>
                <option>Undrajavaram</option>
            </select>
        </div>
    </div>
    <div class="grid">
        <div><label>From Date</label><input type="date" id="start" onchange="loadData()"></div>
        <div><label>To Date</label><input type="date" id="end" onchange="loadData()"></div>
    </div>

    <table>
        <thead>
            <tr><th>Teacher</th><th>Campus</th><th>Type</th><th>Time</th></tr>
        </thead>
        <tbody id="list"></tbody>
    </table>

    <button class="btn csv" onclick="exportCSV()">Download Attendance CSV</button>

    <br><br>
    <div style="background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #ffcccc;">
        <label>📅 CALCULATION START DATE (JOINING DATE):</label>
        <input type="date" id="joining">
        <button class="btn report" onclick="generateReport()">Generate Salary Report</button>
        <button class="btn whatsapp" onclick="saveImage()">Save WhatsApp Image</button>
    </div>

    <div id="output-container">
        <pre id="output">No report generated yet...</pre>
    </div>
</div>

<script>
const LATE_LIMIT = "08:30:00";

const teachers = [
    {name:"Suresh Kumar", email:"suresh@vga.com"},
    {name:"Anitha Rao", email:"anitha@vga.com"},
    {name:"V. Rajesh", email:"rajesh@vga.com"},
    {name:"Veeramallu", email:"veeramallussv@gmail.com"},
    {name:"Teacher 1", email:"teacher1@gmail.com"}
];

const holidays = [
    "2026-04-05", "2026-04-10", "2026-04-14", "2026-05-01", "2026-08-15", 
    "2026-08-25", "2026-09-15", "2026-10-02", "2026-11-08", "2026-12-25",
    "2027-01-01", "2027-01-14", "2027-01-15", "2027-01-26", "2027-02-15",
    "2027-03-07", "2027-03-25", "2027-04-02", "2027-04-14", "2027-05-01"
];

firebase.initializeApp({
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5"
});
const db = firebase.firestore();

window.onload = () => {
    const tSelect = document.getElementById("teacher");
    tSelect.innerHTML = "<option value=''>-- Select --</option>";
    teachers.forEach(t => tSelect.innerHTML += `<option value="${t.email}">${t.name}</option>`);
    loadData();
};

function saveRecord(type) {
    const email = document.getElementById("teacher").value;
    const campus = document.getElementById("campus").value;
    if(!email) return alert("Select teacher!");

    const now = new Date();
    const timeStr = now.toTimeString().split(' ')[0];
    const isLate = (type === "IN" && timeStr > LATE_LIMIT);
    const teacherObj = teachers.find(t => t.email === email);

    db.collection("attendance").add({
        teacher: email,
        name: teacherObj.name,
        campus: campus,
        type: type,
        time: firebase.firestore.Timestamp.fromDate(now),
        late: isLate
    }).then(() => alert("Entry Saved!"));
}

let unsub;
function loadData() {
    if(unsub) unsub();
    const search = document.getElementById("search").value.toLowerCase();
    const campFilter = document.getElementById("filterCampus").value;
    const sFilter = document.getElementById("start").value;
    const eFilter = document.getElementById("end").value;

    unsub = db.collection("attendance").orderBy("time", "desc").onSnapshot(snap => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const dt = d.time.toDate();
            const dateKey = dt.toISOString().split('T')[0];
            const nameToDisplay = d.name || d.teacher;

            if (search && !nameToDisplay.toLowerCase().includes(search)) return;
            if (campFilter !== "All" && d.campus !== campFilter) return;
            if (sFilter && dateKey < sFilter) return;
            if (eFilter && dateKey > eFilter) return;

            list.innerHTML += `<tr>
                <td>${nameToDisplay}</td>
                <td>${d.campus}</td>
                <td><b style="color:${d.type==='IN'?'green':'red'}">${d.type}</b> ${d.late?'<span class="late-tag">LATE</span>':''}</td>
                <td>${dt.toLocaleString('en-GB')}</td>
            </tr>`;
        });
    });
}

function generateReport() {
    const sStr = document.getElementById("start").value;
    const eStr = document.getElementById("end").value;
    const joinStr = document.getElementById("joining").value;

    if(!sStr || !eStr) return alert("Select FROM and TO dates first!");

    const start = new Date(sStr);
    const end = new Date(eStr);
    const joinLimit = joinStr ? new Date(joinStr) : start;

    db.collection("attendance").get().then(snap => {
        let map = {};
        let dayList = [];
        for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
            dayList.push(d.toISOString().split('T')[0]);
        }

        snap.forEach(doc => {
            const d = doc.data();
            const dt = d.time.toDate();
            const day = dt.toISOString().split('T')[0];
            const id = d.name || d.teacher;

            if(dt >= start && dt <= new Date(end.getTime() + 86400000)) {
                if(!map[id]) map[id] = { present: new Set(), late: 0 };
                if(d.type === "IN") map[id].present.add(day);
                if(d.late) map[id].late++;
            }
        });

        let out = "VGA SALARY DEDUCTION REPORT\n==============================\n\n";
        for(let t in map) {
            let absents = 0;
            dayList.forEach(day => {
                const dObj = new Date(day);
                if(dObj < joinLimit) return; 
                if(dObj.getDay() === 0 || holidays.includes(day)) return; 
                if(!map[t].present.has(day)) absents++;
            });

            const lCuts = Math.floor(map[t].late / 3);
            const total = (absents * 2) + lCuts;

            out += `TEACHER: ${t}\n`;
            out += `Present: ${map[t].present.size} | Late: ${map[t].late}\n`;
            out += `Absent Cut (x2): ${absents * 2} Days\n`;
            out += `Late Cuts: ${lCuts} Days\n`;
            out += `TOTAL CUTS: ${total} DAYS\n`;
            out += `------------------------------\n`;
        }
        document.getElementById("output").innerText = out;
    });
}

function saveImage() {
    html2canvas(document.getElementById("capture-area")).then(canvas => {
        const link = document.createElement('a');
        link.download = 'VGA_Admin_Report.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}

function exportCSV() {
    let csv = "Teacher,Campus,Type,Time\n";
    document.querySelectorAll("#list tr").forEach(tr => {
        const c = tr.querySelectorAll("td");
        csv += `${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'VGA_Attendance.csv';
    a.click();
}
</script>
</body>
</html>
