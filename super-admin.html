<!DOCTYPE html>
<html>
<head>
<title>Super Admin | Veeramallu Global Academy</title>

<!-- Firebase -->
<!-- HTML2CANVAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.header { background:#1a237e; color:white; text-align:center; padding:15px; }
.header img { height:60px; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
table { width:100%; border-collapse:collapse; background:white; }
th,td { padding:10px; border:1px solid #ddd; text-align:center; }
button { padding:6px 10px; cursor:pointer; }
input { padding:8px; margin:5px; }

#loginBox { text-align:center; margin-top:100px; }
#app { display:none; }

/* Modal */
#modal {
 display:none;
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.5);
 justify-content:center;
 align-items:center;
}
#modalBox {
 background:white;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Super Admin Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- 🔥 MAIN APP -->
<div id="app">

<div class="header">
<img src="logo.png">
<h2>VEERAMALLU GLOBAL ACADEMY</h2>
<p>Super Admin Panel</p>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- 📊 STATS -->
<div class="card">
<h3>Dashboard</h3>
Total Students: <span id="total">0</span><br>
Daily Income: <span id="incomeDay">0</span><br>
Monthly Income: <span id="incomeMonth">0</span><br>
Yearly Income: <span id="incomeYear">0</span>
</div>

<!-- ➕ ADD -->
<div class="card">
<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="campus" placeholder="Campus">
<input id="fee" placeholder="Fee">
<button onclick="add()">Add</button>
</div>

<!-- 🔍 SEARCH -->
<input id="search" placeholder="Search..." onkeyup="filter()">
<button onclick="exportCSV()">Export CSV</button>

<!-- 📊 CHARTS -->
<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Campus</th><th>Fee</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- 🔔 NOTICE -->
<div class="card">
<h3>Send Notification</h3>
<input id="notice" placeholder="Message">
<button onclick="sendNotice()">Send</button>
</div>

</div>
</div>

<!-- 👁️ MODAL -->
<div id="modal">
<div id="modalBox">
<div id="details"></div>
<br>
<button onclick="closeModal()">Close</button>
</div>
</div>
<script>

// ======================================
// FIREBASE CONFIG
// ======================================

const firebaseConfig = {
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5",
    storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
    messagingSenderId: "379339569496",
    appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();


// ======================================
// LOGIN
// ======================================

async function login(){

    const emailValue =
    document.getElementById("email").value.trim();

    const passwordValue =
    document.getElementById("password").value.trim();

    if(!emailValue || !passwordValue){

        alert("Enter Email & Password");
        return;

    }

    try{

        await auth.signInWithEmailAndPassword(
            emailValue,
            passwordValue
        );

        const adminDoc =
        await db.collection("admins")
        .doc(emailValue)
        .get();

        if(
            !adminDoc.exists ||
            adminDoc.data().role !== "superadmin"
        ){

            alert("Access Denied");

            auth.signOut();

            return;

        }

        document.getElementById("loginBox").style.display =
        "none";

        document.getElementById("app").style.display =
        "block";

    }

    catch(error){

        console.log(error);

        alert(error.message);

    }

}


// ======================================
// AUTO LOGIN
// ======================================

auth.onAuthStateChanged(async(user)=>{

    if(user){

        const doc =
        await db.collection("admins")
        .doc(user.email)
        .get();

        if(
            doc.exists &&
            doc.data().role === "superadmin"
        ){

            document.getElementById("loginBox").style.display =
            "none";

            document.getElementById("app").style.display =
            "block";

        }

    }

});


// ======================================
// LOGOUT
// ======================================

function logout(){

    auth.signOut();

    location.reload();

}


// ======================================
// ADD STUDENT
// ======================================

async function add(){

    const studentName =
    document.getElementById("name").value.trim();

    const studentCampus =
    document.getElementById("campus").value.trim();

    const studentFee =
    Number(document.getElementById("fee").value);

    if(
        !studentName ||
        !studentCampus ||
        !studentFee
    ){

        alert("Fill all fields");
        return;

    }

    try{

        const year =
        new Date().getFullYear();

        const random =
        Math.floor(1000 + Math.random()*9000);

        const studentId =
        `VGA-${year}-${random}`;

        await db.collection("admissions")
        .doc(studentId)
        .set({

            id: studentId,
            name: studentName,
            campus: studentCampus,
            fee: studentFee,

            date:
            firebase.firestore.FieldValue.serverTimestamp()

        });

        alert("Student Added Successfully");

        document.getElementById("name").value = "";
        document.getElementById("campus").value = "";
        document.getElementById("fee").value = "";

    }

    catch(error){

        console.log(error);

        alert(error.message);

    }

}


// ======================================
// LIVE TABLE + DASHBOARD
// ======================================

let chart1;
let chart2;

db.collection("admissions")
.orderBy("date","desc")
.onSnapshot((snapshot)=>{

    const table =
    document.getElementById("table");

    let html = "";

    let totalStudents = 0;

    let dailyIncome = 0;
    let monthlyIncome = 0;
    let yearlyIncome = 0;

    const today =
    new Date();

    const currentMonth =
    today.getMonth();

    const currentYear =
    today.getFullYear();

    snapshot.forEach((doc)=>{

        const d = doc.data();

        totalStudents++;

        let fee =
        Number(d.fee || 0);

        let dt =
        d.date?.toDate();

        if(dt){

            if(
                dt.toDateString() ===
                today.toDateString()
            ){

                dailyIncome += fee;

            }

            if(
                dt.getMonth() === currentMonth &&
                dt.getFullYear() === currentYear
            ){

                monthlyIncome += fee;

            }

            if(
                dt.getFullYear() === currentYear
            ){

                yearlyIncome += fee;

            }

        }

        html += `
        <tr>

            <td>${d.id || '-'}</td>

            <td>${d.name || '-'}</td>

            <td>${d.campus || '-'}</td>

            <td>₹${fee}</td>

            <td>

                <button onclick="viewStudent('${doc.id}')">
                    View
                </button>

                <button onclick="deleteStudent('${doc.id}')">
                    Delete
                </button>

            </td>

        </tr>
        `;

    });

    if(html === ""){

        html = `
        <tr>
            <td colspan="5">
                No Students Found
            </td>
        </tr>
        `;

    }

    table.innerHTML = html;

    document.getElementById("total").innerText =
    totalStudents;

    document.getElementById("incomeDay").innerText =
    "₹" + dailyIncome;

    document.getElementById("incomeMonth").innerText =
    "₹" + monthlyIncome;

    document.getElementById("incomeYear").innerText =
    "₹" + yearlyIncome;

    drawCharts(
        totalStudents,
        dailyIncome,
        monthlyIncome,
        yearlyIncome
    );

});


// ======================================
// CHARTS
// ======================================

function drawCharts(total,day,month,year){

    if(chart1) chart1.destroy();
    if(chart2) chart2.destroy();

    chart1 =
    new Chart(document.getElementById("chart1"),{

        type:"bar",

        data:{
            labels:["Students"],
            datasets:[{
                label:"Total Students",
                data:[total]
            }]
        }

    });

    chart2 =
    new Chart(document.getElementById("chart2"),{

        type:"line",

        data:{
            labels:["Daily","Monthly","Yearly"],
            datasets:[{
                label:"Income",
                data:[day,month,year]
            }]
        }

    });

}


// ======================================
// VIEW STUDENT
// ======================================

async function viewStudent(id){

    const doc =
    await db.collection("admissions")
    .doc(id)
    .get();

    const d =
    doc.data();

    document.getElementById("details").innerHTML =
    `
    <h3>Student Details</h3>

    <br>

    <b>ID:</b> ${d.id}<br><br>

    <b>Name:</b> ${d.name}<br><br>

    <b>Campus:</b> ${d.campus}<br><br>

    <b>Fee:</b> ₹${d.fee}

    `;

    document.getElementById("modal").style.display =
    "flex";

}

function closeModal(){

    document.getElementById("modal").style.display =
    "none";

}


// ======================================
// DELETE STUDENT
// ======================================

async function deleteStudent(id){

    if(confirm("Delete Student?")){

        await db.collection("admissions")
        .doc(id)
        .delete();

    }

}


// ======================================
// SEARCH FILTER
// ======================================

function filter(){

    const value =
    document.getElementById("search")
    .value
    .toLowerCase();

    const rows =
    document.querySelectorAll("#table tr");

    rows.forEach((row)=>{

        row.style.display =
        row.innerText.toLowerCase().includes(value)
        ? ""
        : "none";

    });

}


// ======================================
// EXPORT CSV
// ======================================

function exportCSV(){

    let csv =
    "ID,NAME,CAMPUS,FEE\n";

    const rows =
    document.querySelectorAll("#table tr");

    rows.forEach((row)=>{

        const cols =
        row.querySelectorAll("td");

        if(cols.length >= 4){

            csv +=
            `${cols[0].innerText},
${cols[1].innerText},
${cols[2].innerText},
${cols[3].innerText}\n`;

        }

    });

    const blob =
    new Blob([csv],{
        type:"text/csv"
    });

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "VGA_Students.csv";

    a.click();

}


// ======================================
// SEND NOTICE
// ======================================

async function sendNotice(){

    const msg =
    document.getElementById("notice").value.trim();

    if(!msg){

        alert("Type message");
        return;

    }

    await db.collection("notifications")
    .doc("latest")
    .set({

        text: msg,

        time:
        firebase.firestore.FieldValue.serverTimestamp()

    });

    alert("Notification Sent");

    document.getElementById("notice").value = "";

}

</script>

</body>
</html>
