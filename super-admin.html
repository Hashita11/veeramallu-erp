<!DOCTYPE html>
<html>
<head>
<title>Super Admin | Veeramallu Global Academy</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.header { background:#1a237e; color:white; text-align:center; padding:15px; }
.header img { height:60px; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
table { width:100%; border-collapse:collapse; background:white; }
th,td { padding:10px; border:1px solid #ddd; text-align:center; }
button { padding:6px 10px; cursor:pointer; }
input { padding:8px; margin:5px; }

#loginBox { text-align:center; margin-top:100px; }
#app { display:none; }

/* Modal */
#modal {
 display:none;
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.5);
 justify-content:center;
 align-items:center;
}
#modalBox {
 background:white;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Super Admin Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- 🔥 MAIN APP -->
<div id="app">

<div class="header">
<img src="logo.png">
<h2>VEERAMALLU GLOBAL ACADEMY</h2>
<p>Super Admin Panel</p>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- 📊 STATS -->
<div class="card">
<h3>Dashboard</h3>
Total Students: <span id="total">0</span><br>
Daily Income: <span id="incomeDay">0</span><br>
Monthly Income: <span id="incomeMonth">0</span><br>
Yearly Income: <span id="incomeYear">0</span>
</div>

<!-- ➕ ADD -->
<div class="card">
<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="campus" placeholder="Campus">
<input id="fee" placeholder="Fee">
<button onclick="add()">Add</button>
</div>

<!-- 🔍 SEARCH -->
<input id="search" placeholder="Search..." onkeyup="filter()">
<button onclick="exportCSV()">Export CSV</button>

<!-- 📊 CHARTS -->
<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Campus</th><th>Fee</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- 🔔 NOTICE -->
<div class="card">
<h3>Send Notification</h3>
<input id="notice" placeholder="Message">
<button onclick="sendNotice()">Send</button>
</div>

</div>
</div>

<!-- 👁️ MODAL -->
<div id="modal">
<div id="modalBox">
<div id="details"></div>
<br>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 LOGIN
async function login(){
 let email=email.value;
 let pass=password.value;

 try{
  let user=await auth.signInWithEmailAndPassword(email,pass);

  let doc=await db.collection("admins").doc(email).get();

  if(!doc.exists || doc.data().role!="superadmin"){
    alert("Access Denied");
    auth.signOut();
    return;
  }

  loginBox.style.display="none";
  app.style.display="block";

 }catch(e){ alert(e.message); }
}

// AUTO LOGIN
auth.onAuthStateChanged(async user=>{
 if(user){
  let doc=await db.collection("admins").doc(user.email).get();
  if(doc.exists && doc.data().role=="superadmin"){
    loginBox.style.display="none";
    app.style.display="block";
  }
 }
});

// LOGOUT
function logout(){
 auth.signOut();
 location.reload();
}

// 🧾 AUTO ID + ADD
function add(){
 let id="VGA"+Date.now();
 db.collection("admissions").doc(id).set({
  id:id,
  name:name.value,
  campus:campus.value,
  fee:Number(fee.value),
  date:new Date()
 });
 alert("Added");
}

// 🔄 LIVE DATA + INCOME
db.collection("admissions").onSnapshot(snap=>{
 let html="";
 let total=0,day=0,month=0,year=0;

 let today=new Date().toDateString();
 let m=new Date().getMonth();
 let y=new Date().getFullYear();

 snap.forEach(doc=>{
  let d=doc.data();
  total++;

  let dt=d.date?.toDate();
  if(!dt) return;

  if(dt.toDateString()==today) day+=d.fee||0;
  if(dt.getMonth()==m) month+=d.fee||0;
  if(dt.getFullYear()==y) year+=d.fee||0;

  html+=`
  <tr>
  <td>${d.id}</td>
  <td>${d.name}</td>
  <td>${d.campus}</td>
  <td>${d.fee}</td>
  <td>
  <button onclick="view('${doc.id}')">View</button>
  <button onclick="del('${doc.id}')">Delete</button>
  </td>
  </tr>`;
 });

 table.innerHTML=html;

 total.innerText=total;
 incomeDay.innerText="₹"+day;
 incomeMonth.innerText="₹"+month;
 incomeYear.innerText="₹"+year;

 drawCharts(total,day,month,year);
});

// 📊 CHARTS
let c1,c2;
function drawCharts(t,d,m,y){
 if(c1) c1.destroy();
 if(c2) c2.destroy();

 c1=new Chart(chart1,{type:"bar",data:{labels:["Students"],datasets:[{data:[t]}]}});
 c2=new Chart(chart2,{type:"line",data:{labels:["Day","Month","Year"],datasets:[{data:[d,m,y]}]}});
}

// 👁️ VIEW
async function view(id){
 let doc=await db.collection("admissions").doc(id).get();
 let d=doc.data();
 details.innerHTML=`ID:${d.id}<br>Name:${d.name}<br>Campus:${d.campus}<br>Fee:${d.fee}`;
 modal.style.display="flex";
}
function closeModal(){ modal.style.display="none"; }

// ❌ DELETE
async function del(id){
 if(confirm("Delete?")){
  await db.collection("admissions").doc(id).delete();
 }
}

// 🔍 FILTER
function filter(){
 let v=search.value.toLowerCase();
 document.querySelectorAll("#table tr").forEach(r=>{
  r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
 });
}

// 📁 CSV
function exportCSV(){
 let csv="ID,Name,Campus,Fee\n";
 document.querySelectorAll("#table tr").forEach(r=>{
  csv+=`${r.children[0].innerText},${r.children[1].innerText},${r.children[2].innerText},${r.children[3].innerText}\n`;
 });
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv]));
 a.download="students.csv";
 a.click();
}

// 🔔 NOTICE
async function sendNotice(){
 let msg=notice.value;
 await db.collection("notifications").doc("latest").set({
  text:msg,
  time:new Date()
 });
 alert("Notification Sent");
}
</script>

</body>
</html>
