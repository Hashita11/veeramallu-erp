// UPLOAD PHOTO

async function uploadPhoto(input){

    const file = input.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = async(e)=>{

        const img = new Image();

        img.onload = async()=>{

            const canvas =
            document.createElement("canvas");

            const ctx =
            canvas.getContext("2d");

            let width = img.width;
            let height = img.height;

            const MAX = 250;

            if(width > height){

                if(width > MAX){

                    height *= MAX/width;

                    width = MAX;
                }

            }else{

                if(height > MAX){

                    width *= MAX/height;

                    height = MAX;
                }
            }

            canvas.width = width;
            canvas.height = height;

            ctx.drawImage(img,0,0,width,height);

            const compressedImage =
            canvas.toDataURL("image/jpeg",0.7);

            const user =
            auth.currentUser;

            await db.collection("teachers")
            .doc(user.uid)
            .set({
                photo: compressedImage
            }, { merge:true });

            document.getElementById("profilePic").src =
            compressedImage;

            alert("✅ Photo Uploaded");
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}



// DISTANCE CALCULATOR

function calculateDistance(lat1,lon1,lat2,lon2){

    const R = 6371e3;

    const dLat =
    (lat2-lat1)*Math.PI/180;

    const dLon =
    (lon2-lon1)*Math.PI/180;

    const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*
    Math.sin(dLon/2);

    return R*2*Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );
}



// GPS CHECK

function startGPSCheck(){

    if(!navigator.geolocation){

        document.getElementById("gpsStatus").innerHTML =
        "<span style='color:red;'>GPS Not Supported</span>";

        return;
    }

    navigator.geolocation.watchPosition(

    (pos)=>{

        const userLat =
        pos.coords.latitude;

        const userLng =
        pos.coords.longitude;

        let nearestCampus = "";

        let nearestDistance = Infinity;

        for(const [name,coords]
        of Object.entries(campusCoords)){

            const distance =
            calculateDistance(
                userLat,
                userLng,
                coords.lat,
                coords.lng
            );

            if(distance < nearestDistance){

                nearestDistance = distance;

                nearestCampus = name;
            }
        }

        sessionStorage.setItem(
            "activeCampus",
            nearestCampus
        );

        document.getElementById("campusDisplay").innerText =
        "Campus: " + nearestCampus;

        const gpsStatus =
        document.getElementById("gpsStatus");

        const btnIn =
        document.getElementById("btnIn");

        const btnOut =
        document.getElementById("btnOut");

        if(nearestDistance <= 50){

            gpsStatus.innerHTML =
            `✔ Inside ${nearestCampus}
            (${Math.round(nearestDistance)}m)`;

            gpsStatus.style.color = "green";

            btnIn.disabled = false;

            btnOut.disabled = false;

        }else{

            gpsStatus.innerHTML =
            `✖ Outside Campus
            (${Math.round(nearestDistance)}m)`;

            gpsStatus.style.color = "red";

            btnIn.disabled = true;

            btnOut.disabled = true;
        }

    },

    (err)=>{

        document.getElementById("gpsStatus").innerHTML =
        "GPS Error";
    },

    {
        enableHighAccuracy:true
    });
}

// MARK ATTENDANCE
async function markAttendance(type) {

    const btnIn = document.getElementById("btnIn");
    const btnOut = document.getElementById("btnOut");

    btnIn.disabled = true;
    btnOut.disabled = true;

    if(type === "IN"){
        btnIn.innerText = "Processing...";
    } else {
        btnOut.innerText = "Processing...";
    }

    try {

        const user = auth.currentUser;

        if(!user){
            alert("Please login first");
            return;
        }

        // ✅ LOAD TEACHER PROFILE
        const teacherDoc = await db
            .collection("teachers")
            .doc(user.uid)
            .get();

        const teacherData = teacherDoc.data() || {};

        // ✅ REAL NAME
        const teacherName =
            teacherData.name ||
            user.email.split("@")[0];

        // ✅ EMAIL
        const teacherEmail =
            user.email.toLowerCase();

        // ✅ UID
        const teacherId =
            user.uid;

        // ✅ CAMPUS
        const campus =
            sessionStorage.getItem("activeCampus");

        const now = new Date();

        // ✅ FIXED DATE FORMAT
        const dateOnly =
            now.toISOString().split("T")[0];

        const timeStr =
            now.toLocaleTimeString("en-GB", {
                hour12:false
            });

        // CHECK TODAY RECORDS
        const snapshot = await db.collection("attendance")
            .where("teacherEmail","==",teacherEmail)
            .where("dateOnly","==",dateOnly)
            .get();

        let alreadyIN = false;
        let alreadyOUT = false;

        snapshot.forEach(doc => {

            const data = doc.data();

            if(data.type === "IN"){
                alreadyIN = true;
            }

            if(data.type === "OUT"){
                alreadyOUT = true;
            }
        });

        // DUPLICATE IN
        if(type === "IN" && alreadyIN){
            alert("✅ IN already marked today");
            return;
        }

        // OUT BEFORE IN
        if(type === "OUT" && !alreadyIN){
            alert("❌ First mark IN attendance");
            return;
        }

        // DUPLICATE OUT
        if(type === "OUT" && alreadyOUT){
            alert("✅ OUT already marked today");
            return;
        }

        // ✅ SAVE COMPLETE RECORD
        await db.collection("attendance").add({

            teacherId: teacherId,

            teacherName: teacherName,

            teacherEmail: teacherEmail,

            teacher: teacherEmail,

            name: teacherName,

            campus: campus,

            type: type,

            late:
                type === "IN" &&
                timeStr > LATE_THRESHOLD,

            autoLate:
                type === "IN" &&
                timeStr > LATE_THRESHOLD,

            time:
                firebase.firestore.Timestamp.fromDate(now),

            fullTimestamp:
                now.toISOString(),

            dateOnly:
                dateOnly,

            method:
                "Teacher App"

        });

        alert("✅ " + type + " Marked Successfully");

    } catch(error){

        alert("❌ " + error.message);

    } finally {

        btnIn.disabled = false;
        btnOut.disabled = false;

        btnIn.innerText = "Check IN";
        btnOut.innerText = "Check OUT";
    }
}

async function viewTodayAttendance(){

    .where(
        "teacherEmail",
        "==",
        auth.currentUser.email
    )

    .where(
        "dateOnly",
        "==",
        today
    )

    .get();

    let msg =
    "Today's Attendance\n\n";

    snap.forEach(doc=>{

        msg +=
        doc.data().type +
        " - " +
        new Date(
            doc.data().time.seconds*1000
        ).toLocaleTimeString() +
        "\n";
    });

    alert(msg);
}

function getStatusColor(status) {
    if (status === 'Late') return 'background:#fff3e0; color:#e65100;';
    if (status === 'Absent') return 'background:#ffebee; color:#c62828;';
    return 'background:#e3f2fd; color:#1565c0;';
}

async function getMonthlyAttendance() {
    const user = firebase.auth().currentUser;
    if (!user) return [];

    const monthInput = document.getElementById('selectedMonth').value;
    if (!monthInput) {
        alert("Please select a month");
        return [];
    }

    // monthInput is "2026-05"
    const [year, month] = monthInput.split("-");
    const monthInt = parseInt(month); // Turns "05" into 5

    // Patterns to match "12/5/2026" or "12/05/2026"
    const match1 = `/${monthInt}/${year}`; 
    const match2 = `/${month}/${year}`;

    try {
        const querySnapshot = await db.collection("attendance")
            .where("teacherEmail", "==", user.email)
            .get();

        const logs = [];
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const dateStr = data.dateOnly || "";

            // Check if date belongs to the selected month/year
            if (dateStr.includes(match1) || dateStr.includes(match2)) {
                
                // Identify Late marks or Absence/Leave exceptions
                const isLate = (data.type === "IN" && data.late === true);
                const isException = (data.status === "Absent" || data.status === "Leave");

                if (isLate || isException) {
                    let checkInTime = "N/A";
                    if (data.time) {
                        // Handle both Firestore Timestamp and JS Date
                        const d = data.time.toDate ? data.time.toDate() : new Date(data.time.seconds * 1000);
                        checkInTime = d.toLocaleTimeString('en-IN');
                    }

                    logs.push({
                        date: dateStr,
                        checkIn: checkInTime,
                        status: isLate ? "Late" : data.status
                    });
                }
            }
        });

        // Simple sort by date string
        return logs.sort((a, b) => b.date.localeCompare(a.date));

    } catch (error) {
        console.error("Error fetching logs:", error);
        return [];
    }
}
