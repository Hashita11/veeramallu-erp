<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Portal | Veeramallu Global Academy</title>

<style>

:root{
    --primary:#1a237e;
    --success:#28a745;
    --danger:#e65100;
    --warning:#fbc02d;
    --light:#f0f2f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,sans-serif;
    background:var(--light);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    transition:.3s;
}

.card{
    width:100%;
    max-width:430px;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    text-align:center;
}

.logo{
    width:90px;
    margin:auto;
    display:block;
    margin-bottom:15px;
}

h2{
    color:var(--primary);
    margin-bottom:15px;
}

.form-group{
    margin-bottom:15px;
    text-align:left;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.btn-login{
    background:var(--primary);
    color:white;
}

.btn-in{
    background:var(--success);
    color:white;
    flex:1;
}

.btn-out{
    background:var(--danger);
    color:white;
    flex:1;
}

.btn-secondary{
    background:white;
    border:2px solid var(--primary);
    color:var(--primary);
}

.btn-purple{
    background:#6a1b9a;
    color:white;
}

.btn-row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

#attendanceSection{
    display:none;
}

.teacher-info{
    background:#e3f2fd;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid var(--primary);
}

.status-box{
    padding:14px;
    border-radius:8px;
    margin:15px 0;
    background:#fffde7;
    border:1px solid var(--warning);
    font-weight:bold;
}

.profile-wrapper{
    position:relative;
    display:inline-block;
}

.profile-pic{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid var(--primary);
}

.camera-btn{
    position:absolute;
    bottom:0;
    right:0;
    background:var(--primary);
    color:white;
    width:32px;
    height:32px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border:2px solid white;
    font-size:14px;
}

.small{
    font-size:12px;
    margin-top:5px;
}

.darkMode{
    background:#111 !important;
}

.darkMode .card{
    background:#1e1e1e;
    color:white;
}

.darkMode input,
.darkMode select{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode .teacher-info{
    background:#222;
}

.darkMode .btn-secondary{
    background:#222;
    color:white;
    border:1px solid white;
}

.hidden{
    display:none;
}

#logList{
    list-style:none;
    padding:0;
    margin-top:10px;
}

</style>
</head>

<!-- DASHBOARD -->

<p id="onlineStatus"

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",

    authDomain: "veeramalluerp-6cac5.firebaseapp.com",

    projectId: "veeramalluerp-6cac5",

    storageBucket: "veeramalluerp-6cac5.appspot.com",

    messagingSenderId: "379339569496",

    appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const LATE_THRESHOLD = "08:30:00";

const campusCoords = {

    "Relangi":{
        lat:16.702710,
        lng:81.644140
    },

    "Velpur":{
        lat:16.719772,
        lng:81.662377
    },

    "Undrajavaram":{
        lat:16.791772,
        lng:81.701022
    }
};

auth.onAuthStateChanged(async(user)=>{

    if(!user){

        document.getElementById("loginSection").style.display="block";

        document.getElementById("attendanceSection").style.display="none";

        return;
    }

    document.getElementById("loginSection").style.display="none";

    document.getElementById("attendanceSection").style.display="block";

    const campus =
    sessionStorage.getItem("activeCampus") || "";

    document.getElementById("welcomeMsg").innerText =
    "Welcome, " +
    user.email.split("@")[0].toUpperCase();

    document.getElementById("teacherEmailDisplay").innerText =
    user.email;

    document.getElementById("campusDisplay").innerText =
    "Campus: " + campus;

    loadTeacherPhoto();

    startGPSCheck();
});

async function handleLogin(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    const campus =
    document.getElementById("campus").value;

    const errorBox =
    document.getElementById("loginError");

    errorBox.style.display="none";

    if(!email || !password){

        errorBox.style.display="block";

        errorBox.innerText =
        "Enter Email and Password";

        return;
    }

    try{

        const userCredential =
        await auth.signInWithEmailAndPassword(
            email,
            password
        );

        sessionStorage.setItem(
            "activeCampus",
            campus
        );

        const user =
        userCredential.user;

        document.getElementById("welcomeMsg").innerText =
        "Welcome, " +
        user.email.split("@")[0].toUpperCase();

        document.getElementById("teacherEmailDisplay").innerText =
        user.email;

        document.getElementById("campusDisplay").innerText =
        "Campus: " + campus;

        loadTeacherPhoto();

        startGPSCheck();

        alert("✅ Login Successful");

    }catch(error){

        errorBox.style.display="block";

        errorBox.innerText =
        error.message;
    }
}

async function registerTeacher(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    if(!email || !password){

        alert("Enter email & password");

        return;
    }

    try{

        const userCred =
        await auth.createUserWithEmailAndPassword(
            email,
            password
        );

        await db.collection("teachers")
        .doc(userCred.user.uid)
        .set({

            uid:userCred.user.uid,

            name:email.split("@")[0].toUpperCase(),

            email:email.toLowerCase(),

            salary:0,

            createdAt:new Date()

        },{merge:true});

        alert("✅ Account Created");

    }catch(err){

        alert(err.message);
    }
}

async function loadTeacherPhoto(){

    const user = auth.currentUser;

    if(!user) return;

    const doc =
    await db.collection("teachers")
    .doc(user.uid)
    .get();

    if(doc.exists && doc.data().photo){

        document.getElementById("profilePic").src =
        doc.data().photo;
    }
}

async function uploadPhoto(input){

    const file = input.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = async(e)=>{

        const compressedImage =
        e.target.result;

        const user =
        auth.currentUser;

        await db.collection("teachers")
        .doc(user.uid)
        .set({
            photo:compressedImage
        },{merge:true});

        document.getElementById("profilePic").src =
        compressedImage;

        alert("✅ Photo Uploaded");
    };

    reader.readAsDataURL(file);
}

function calculateDistance(lat1,lon1,lat2,lon2){

    const R = 6371e3;

    const dLat =
    (lat2-lat1)*Math.PI/180;

    const dLon =
    (lon2-lon1)*Math.PI/180;

    const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*
    Math.sin(dLon/2);

    return R*2*Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );
}

function startGPSCheck(){

    if(!navigator.geolocation){

        document.getElementById("gpsStatus").innerHTML =
        "GPS Not Supported";

        return;
    }

    navigator.geolocation.watchPosition(

    (pos)=>{

        const userLat =
        pos.coords.latitude;

        const userLng =
        pos.coords.longitude;

        let nearestCampus = "";

        let nearestDistance = Infinity;

        for(const [name,coords]
        of Object.entries(campusCoords)){

            const distance =
            calculateDistance(
                userLat,
                userLng,
                coords.lat,
                coords.lng
            );

            if(distance < nearestDistance){

                nearestDistance = distance;

                nearestCampus = name;
            }
        }

        sessionStorage.setItem(
            "activeCampus",
            nearestCampus
        );

        document.getElementById("campusDisplay").innerText =
        "Campus: " + nearestCampus;

        const gpsStatus =
        document.getElementById("gpsStatus");

        if(nearestDistance <= 50){

            gpsStatus.innerHTML =
            "✔ Inside " +
            nearestCampus +
            " (" +
            Math.round(nearestDistance) +
            "m)";

            gpsStatus.style.color = "green";

            document.getElementById("btnIn").disabled = false;
            document.getElementById("btnOut").disabled = false;

        }else{

            gpsStatus.innerHTML =
            "✖ Outside Campus (" +
            Math.round(nearestDistance) +
            "m)";

            gpsStatus.style.color = "red";

            document.getElementById("btnIn").disabled = true;
            document.getElementById("btnOut").disabled = true;
        }

    },

    ()=>{

        document.getElementById("gpsStatus").innerHTML =
        "GPS Error";
    },

    {
        enableHighAccuracy:true
    });
}

async function markAttendance(type){

    try{

        const user =
        auth.currentUser;

        if(!user){

            alert("Please login first");

            return;
        }

        const teacherDoc =
        await db.collection("teachers")
        .doc(user.uid)
        .get();

        const teacherData =
        teacherDoc.data() || {};

        const teacherName =
        teacherData.name ||
        user.email.split("@")[0];

        const teacherEmail =
        user.email.toLowerCase();

        const campus =
        sessionStorage.getItem("activeCampus");

        const now = new Date();

        const dateOnly =
        now.toISOString().split("T")[0];

        const timeStr =
        now.toLocaleTimeString("en-GB",{
            hour12:false
        });

        const snapshot =
        await db.collection("attendance")
        .where("teacherEmail","==",teacherEmail)
        .where("dateOnly","==",dateOnly)
        .get();

        let alreadyIN = false;
        let alreadyOUT = false;

        snapshot.forEach(doc=>{

            const data = doc.data();

            if(data.type==="IN"){
                alreadyIN = true;
            }

            if(data.type==="OUT"){
                alreadyOUT = true;
            }
        });

        if(type==="IN" && alreadyIN){

            alert("Already IN marked");

            return;
        }

        if(type==="OUT" && !alreadyIN){

            alert("First mark IN");

            return;
        }

        if(type==="OUT" && alreadyOUT){

            alert("Already OUT marked");

            return;
        }

        await db.collection("attendance").add({

            teacherId:user.uid,

            teacherName:teacherName,

            teacherEmail:teacherEmail,

            campus:campus,

            type:type,

            late:
            type==="IN" &&
            timeStr > LATE_THRESHOLD,

            time:
            firebase.firestore.Timestamp.fromDate(now),

            fullTimestamp:
            now.toISOString(),

            dateOnly:dateOnly,

            method:"Teacher App"
        });

        alert("✅ " + type + " Marked");

    }catch(error){

        alert(error.message);
    }
}

async function viewTodayAttendance(){

    const today =
    new Date().toISOString().split("T")[0];

    const snap =
    await db.collection("attendance")
    .where(
        "teacherEmail",
        "==",
        auth.currentUser.email.toLowerCase()
    )
    .where(
        "dateOnly",
        "==",
        today
    )
    .get();

    let msg =
    "Today's Attendance\n\n";

    if(snap.empty){

        msg += "No attendance today";
    }

    snap.forEach(doc=>{

        const data = doc.data();

        msg +=
        data.type +
        " - " +
        data.time.toDate().toLocaleTimeString() +
        "\n";
    });

    alert(msg);
}

async function loadAttendance(){

    const btn =
    document.getElementById("viewBtn");

    const portal =
    document.getElementById("portalContent");

    const logList =
    document.getElementById("logList");

    btn.innerText = "Loading...";

    try{

        const logs =
        await getMonthlyAttendance();

        const totalLate =
        logs.filter(l=>l.status==="Late").length;

        document.getElementById("statsGrid").innerHTML = `

        <div style="
        text-align:center;
        background:#fff3e0;
        padding:10px;
        border-radius:8px;">

        <span style="
        display:block;
        font-size:10px;
        font-weight:bold;
        color:#e65100;">
        TOTAL LATE
        </span>

        <span style="
        font-size:18px;
        font-weight:bold;">
        ${totalLate}
        </span>

        </div>
        `;

        portal.classList.remove("hidden");

        if(logs.length===0){

            logList.innerHTML =
            "<li style='padding:10px;color:green;'>No records found</li>";

        }else{

            logList.innerHTML =
            logs.map(log=>`

            <li style="
            padding:10px;
            border-bottom:1px solid #eee;
            display:flex;
            justify-content:space-between;
            align-items:center;">

            <div style="text-align:left;">

            <div style="font-weight:bold;">
            ${log.date}
            </div>

            <div style="
            font-size:11px;
            color:#666;">
            ${log.checkIn}
            </div>

            </div>

            <span style="
            padding:4px 8px;
            border-radius:5px;
            font-size:12px;
            font-weight:bold;
            ${getStatusColor(log.status)}">

            ${log.status}

            </span>

            </li>

            `).join("");
        }

    }catch(err){

        console.error(err);

        alert("Failed to load");

    }finally{

        btn.innerText =
        "Refresh Attendance";
    }
}

function getStatusColor(status){

    if(status==="Late")
    return "background:#fff3e0;color:#e65100;";

    if(status==="Absent")
    return "background:#ffebee;color:#c62828;";

    return "background:#e3f2fd;color:#1565c0;";
}

async function getMonthlyAttendance(){

    const user =
    firebase.auth().currentUser;

    if(!user) return [];

    const monthInput =
    document.getElementById("selectedMonth").value;

    try{

        const monthInput = document.getElementById("selectedMonth").value;

const startDate = monthInput + "-01";
const endDate = monthInput + "-31";

const querySnapshot = await db.collection("attendance")
.where("teacherEmail","==",user.email.toLowerCase())
.where("dateOnly", ">=", startDate)
.where("dateOnly", "<=", endDate)
.get();
        const logs = [];

        querySnapshot.forEach((doc)=>{

            const data =
            doc.data();

            const dateStr =
            data.dateOnly || "";

    

                const isLate =
                data.type==="IN" &&
                data.late===true;

                const isException =
                data.status==="Absent" ||
                data.status==="Leave";

                if(isLate || isException){

                    let checkInTime =
                    "N/A";

                    if(data.time){

                        checkInTime =
                        data.time.toDate()
                        .toLocaleTimeString("en-IN");
                    }

                    logs.push({

                        date:dateStr,

                        checkIn:checkInTime,

                        status:
                        isLate
                        ? "Late"
                        : data.status
                    });
                }
            
        });

        return logs.sort((a,b)=>
        b.date.localeCompare(a.date));

    }catch(error){

        console.error(error);

        return [];
    }
}

function toggleDarkMode(){

    document.body.classList.toggle("darkMode");
}

function updateClock(){

    document.getElementById("currentTime").innerText =
    new Date().toLocaleString();
}

setInterval(updateClock,1000);

function logoutUser(){

    auth.signOut().then(()=>{

        sessionStorage.clear();

        location.reload();

}
