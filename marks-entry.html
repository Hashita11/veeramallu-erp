<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA | Teacher Marks Entry</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary-color: #1a237e; --secondary-color: #c62828; --success-color: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        
        .nav-menu { background: var(--primary-color); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }

        .card { background: white; max-width: 700px; margin: 20px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 14px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; font-size: 12px; color: #555; }
        
        .total-row { background: #f9f9f9; font-weight: bold; }
        .grade-display { font-size: 28px; font-weight: 800; color: var(--secondary-color); margin-top: 10px; }
        
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }
        .btn-save:hover { background: #0d144d; }
    </style>
</head>
<body>

<div class="nav-menu">
    <a href="admissions.html">+ Admission</a>
    <a href="attendance.html">✓ Attendance</a>
    <a href="marks-entry.html">📝 Marks Entry</a>
    <a href="parent-view.html">👤 Parent Portal</a>
</div>

<div class="card">
    <h2 style="text-align:center; color:var(--primary-color); margin-top: 0;">EXAM MARKS ENTRY</h2>
    
    <div class="grid">
        <div><label>Admission No</label><input type="text" id="mAdmNo" placeholder="Enter ID" onchange="fetchStudent()"></div>
        <div><label>Student Name</label><input type="text" id="mStuName" readonly style="background: #f0f0f0;"></div>
        
        <div>
            <label>Exam Assessment</label>
            <select id="examType" onchange="updateScale()">
                <option value="FA1">FA 1 (Formative)</option>
                <option value="FA2">FA 2 (Formative)</option>
                <option value="FA3">FA 3 (Formative)</option>
                <option value="FA4">FA 4 (Formative)</option>
                <option value="SA1">SA 1 (Summative)</option>
                <option value="SA2">SA 2 (Summative)</option>
            </select>
        </div>
        
        <div>
            <label>Subject</label>
            <select id="subject" onchange="updateScale()">
                <option>Telugu</option>
                <option>Hindi</option>
                <option>English</option>
                <option>Mathematics</option>
                <option>Science</option>
                <option>Social</option>
                <option value="GK">GK</option>
                <option value="Computer">Computer</option>
                <option value="Drawing">Drawing</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Section</th>
                <th>Marks Obtained</th>
                <th>Max Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr id="internalRow">
                <td><b>Internal</b></td>
                <td><input type="number" id="intM" placeholder="0" oninput="calculate()"></td>
                <td id="maxI">15</td>
            </tr>
            <tr>
                <td><b>External</b></td>
                <td><input type="number" id="extM" placeholder="0" oninput="calculate()"></td>
                <td id="maxE">35</td>
            </tr>
            <tr class="total-row">
                <td>TOTAL</td>
                <td id="totM">0</td>
                <td id="maxT">50</td>
            </tr>
        </tbody>
    </table>

    <div style="text-align:center; margin-top:20px; border: 1px solid #eee; padding: 15px; border-radius: 8px;">
        <label>CALCULATED GRADE</label>
        <div id="gradeRes" class="grade-display">-</div>
    </div>

    <button class="btn-save" onclick="saveToFirebase()">SAVE TO VGA CLOUD</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx64969815ddd251fe3", 
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339669496",
        appId: "1:379339669496:web:6c2becb98190b4e43a8d2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function updateScale() {
        const sub = document.getElementById('subject').value;
        const exam = document.getElementById('examType').value;
        const intRow = document.getElementById('internalRow');
        
        const isSpecialSub = ["GK", "Computer", "Drawing"].includes(sub);
        const isSA = exam.startsWith("SA");

        if (isSpecialSub) {
            // Special subjects: No Internal, Total is 50 for FA and 100 for SA
            intRow.style.display = 'none';
            document.getElementById('intM').value = 0;
            document.getElementById('maxE').innerText = isSA ? 100 : 50;
        } else {
            // Main academic subjects
            intRow.style.display = 'table-row';
            document.getElementById('maxI').innerText = isSA ? 20 : 15;
            document.getElementById('maxE').innerText = isSA ? 80 : 35;
        }
        
        document.getElementById('maxT').innerText = isSA ? 100 : 50;
        calculate();
    }

    function calculate() {
        const intM = parseFloat(document.getElementById('intM').value) || 0;
        const extM = parseFloat(document.getElementById('extM').value) || 0;
        const total = intM + extM;
        const max = parseFloat(document.getElementById('maxT').innerText);
        
        document.getElementById('totM').innerText = total;
        
        const per = (total / max) * 100;
        let grade = "F";
        if (per >= 90) grade = "A1";
        else if (per >= 80) grade = "A2";
        else if (per >= 70) grade = "B1";
        else if (per >= 60) grade = "B2";
        else if (per >= 50) grade = "C1";
        else if (per >= 40) grade = "C2";
        else grade = "Needs Imp.";
        
        document.getElementById('gradeRes').innerText = grade;
    }

    async function fetchStudent() {
        const adm = document.getElementById('mAdmNo').value;
        if(!adm) return;
        const doc = await db.collection("admissions").doc(adm).get();
        if(doc.exists) {
            document.getElementById('mStuName').value = doc.data().studentName;
        } else {
            alert("Student ID not found!");
            document.getElementById('mStuName').value = "";
        }
    }

    async function saveToFirebase() {
    const adm = document.getElementById('mAdmNo').value;
    const sub = document.getElementById('subject').value;
    const exam = document.getElementById('examType').value;
    
    if(!adm || !document.getElementById('mStuName').value) {
        alert("Please enter a valid Admission Number first!");
        return;
    }

    // Define the unique Document ID (e.g., 23456_FA1_Telugu)
    const docID = `${adm}_${exam}_${sub}`;

    try {
        // STEP 1: Check if this record already exists
        const docRef = db.collection("marks").doc(docID);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
            // Ask the teacher for permission to overwrite
            const confirmOverwrite = confirm(`Marks for ${sub} (${exam}) already exist. Do you want to update/overwrite them?`);
            if (!confirmOverwrite) {
                return; // Stop if they click 'Cancel'
            }
        }

        // STEP 2: Prepare and save the data
        const data = {
            subject: sub,
            examType: exam,
            internal: document.getElementById('intM').value,
            external: document.getElementById('extM').value,
            total: document.getElementById('totM').innerText,
            grade: document.getElementById('gradeRes').innerText,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await docRef.set(data);
        alert(`Success: ${exam} marks for ${sub} saved!`);
        
    } catch (e) { 
        alert("Error saving: " + e.message); 
    }
}

    
    // Run update scale on load to set initial values
    window.onload = updateScale;
</script>
</body>
</html>
