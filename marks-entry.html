<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA | Teacher Marks Entry</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary-color: #1a237e; --secondary-color: #c62828; --success-color: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        
        .nav-menu { background: var(--primary-color); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }

        .card { background: white; max-width: 700px; margin: 20px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header Style with Logo */
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .logo-img { width: 90px; margin-bottom: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 14px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; font-size: 12px; color: #555; }
        
        .total-row { background: #f9f9f9; font-weight: bold; }
        .grade-display { font-size: 28px; font-weight: 800; color: var(--secondary-color); margin-top: 10px; }
        
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }
        .btn-save:hover { background: #0d144d; }
    </style>
</head>
<body>

<div class="nav-menu">
    <a href="admissions.html">+ Admission</a>
    <a href="attendance.html">✓ Attendance</a>
    <a href="marks-entry.html">📝 Marks Entry</a>
    <a href="parent-view.html">👤 Parent Portal</a>
</div>

<div class="card">
    <div class="header">
        <img src="logo.png" alt="VGA Logo" class="logo-img">
        <h2 style="margin:0; color:var(--primary-color);">EXAM MARKS ENTRY</h2>
    </div>
    
    <div class="grid">
        <div>
            <label>Admission No</label>
            <input type="text" id="mAdmNo" placeholder="VGA-2026-0001" onchange="fetchStudent()">
        </div>
        <div>
            <label>Student Name</label>
            <input type="text" id="mStuName" readonly style="background: #f5f5f5;">
        </div>
        
        <div>
            <label>Exam Assessment</label>
            <select id="examType" onchange="updateScale()">
                <option value="FA1">FA 1</option><option value="FA2">FA 2</option>
                <option value="FA3">FA 3</option><option value="FA4">FA 4</option>
                <option value="SA1">SA 1</option><option value="SA2">SA 2</option>
            </select>
        </div>
        
        <div>
            <label>Subject</label>
            <select id="subject" onchange="updateScale()">
                <option>Telugu</option><option>Hindi</option><option>English</option>
                <option>Mathematics</option><option>Science</option><option>Social</option>
                <option value="GK">GK</option><option value="Computer">Computer</option><option value="Drawing">Drawing</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Section</th>
                <th>Marks Obtained</th>
                <th>Max Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr id="internalRow">
                <td><b>Internal</b></td>
                <td><input type="number" id="intM" value="0" oninput="calculate()"></td>
                <td id="maxI">15</td>
            </tr>
            <tr>
                <td><b>External</b></td>
                <td><input type="number" id="extM" value="0" oninput="calculate()"></td>
                <td id="maxE">35</td>
            </tr>
            <tr class="total-row">
                <td>TOTAL</td>
                <td id="totM">0</td>
                <td id="maxT">50</td>
            </tr>
        </tbody>
    </table>

    <div style="text-align:center; margin-top:20px; border: 1px solid #eee; padding: 15px; border-radius: 8px;">
        <label>GRADE</label>
        <div id="gradeRes" class="grade-display">-</div>
    </div>

    <button class="btn-save" onclick="saveToFirebase()">SAVE TO VGA CLOUD</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. FETCH STUDENT (FIXED TO FIND HARRY/NAME KEY)
    async function fetchStudent() {
        const adm = document.getElementById('mAdmNo').value.trim();
        if(!adm) return;
        try {
            const doc = await db.collection("admissions").doc(adm).get();
            if(doc.exists) {
                // Checks 'name' first (Harry), then 'studentName' (Sudeep)
                document.getElementById('mStuName').value = doc.data().name || doc.data().studentName || "No Name Found";
            } else {
                alert("ID Not Found!");
                document.getElementById('mStuName').value = "";
            }
        } catch(e) { console.error(e); }
    }

    // 2. UPDATE SCALE
    function updateScale() {
        const sub = document.getElementById('subject').value;
        const exam = document.getElementById('examType').value;
        const isSA = exam.startsWith("SA");
        const isSpec = ["GK", "Computer", "Drawing"].includes(sub);

        if (isSpec) {
            document.getElementById('internalRow').style.display = 'none';
            document.getElementById('intM').value = 0;
            document.getElementById('maxE').innerText = isSA ? 100 : 50;
        } else {
            document.getElementById('internalRow').style.display = 'table-row';
            document.getElementById('maxI').innerText = isSA ? 20 : 15;
            document.getElementById('maxE').innerText = isSA ? 80 : 35;
        }
        document.getElementById('maxT').innerText = isSA ? 100 : 50;
        calculate();
    }

    // 3. CALCULATE TOTAL & GRADE
    function calculate() {
        const intM = parseFloat(document.getElementById('intM').value) || 0;
        const extM = parseFloat(document.getElementById('extM').value) || 0;
        const total = intM + extM;
        const max = parseFloat(document.getElementById('maxT').innerText);
        document.getElementById('totM').innerText = total;
        
        const per = (total / max) * 100;
        let grade = "F";
        if (per >= 90) grade = "A1";
        else if (per >= 80) grade = "A2";
        else if (per >= 70) grade = "B1";
        else if (per >= 60) grade = "B2";
        else if (per >= 50) grade = "C1";
        else if (per >= 40) grade = "C2";
        else grade = "D";
        
        document.getElementById('gradeRes').innerText = grade;
    }

    // 4. SAVE TO FIREBASE (BLOCKS EXCESS MARKS & DUPLICATES)
    async function saveToFirebase() {
        const adm = document.getElementById('mAdmNo').value.trim();
        const stuName = document.getElementById('mStuName').value;
        const sub = document.getElementById('subject').value;
        const exam = document.getElementById('examType').value;
        
        const intM = parseFloat(document.getElementById('intM').value) || 0;
        const extM = parseFloat(document.getElementById('extM').value) || 0;
        const maxI = parseFloat(document.getElementById('maxI').innerText);
        const maxE = parseFloat(document.getElementById('maxE').innerText);

        if(!adm || !stuName) return alert("⚠️ Fetch student first!");

        // BLOCK EXCESS MARKS
        if (intM > maxI || extM > maxE) {
            alert("⚠️ STOP: Marks entered are higher than the Maximum allowed!");
            return;
        }

        const docID = `${adm}_${exam}`;

        try {
            const docRef = db.collection("marks").doc(docID);
            const docSnap = await docRef.get();
            let subjectsData = docSnap.exists ? (docSnap.data().subjects || {}) : {};

            // BLOCK DUPLICATES / CONFIRM OVERWRITE
            if (subjectsData[sub]) {
                const confirmUpdate = confirm(`⚠️ ${sub} marks already exist for this exam. Update them?`);
                if (!confirmUpdate) return;
            }

            subjectsData[sub] = document.getElementById('totM').innerText;

            await docRef.set({
                studentId: adm,
                studentName: stuName,
                examType: exam,
                subjects: subjectsData,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            alert(`✅ Saved ${sub} marks for ${stuName}`);
        } catch (e) { alert("Cloud Error: " + e.message); }
    }

    // Initialize correctly
    document.addEventListener('DOMContentLoaded', () => {
        updateScale();
    });
</script>
</body>
</html>
