<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Salary Slip</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:500px;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#1a237e;
color:white;
font-weight:bold;
border:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Salary Slip</h2>

<input type="text" id="teacher" placeholder="Teacher Name">

<input type="number" id="salary" placeholder="Salary">

<input type="number" id="workingDays" placeholder="Working Days">

<input type="number" id="presentDays" placeholder="Present Days">

<button onclick="generateSalary()">
Generate Salary
</button>

<div id="result"></div>

</div>

<script>

function generateSalary(){

const salary=
Number(document.getElementById("salary").value);

const working=
Number(document.getElementById("workingDays").value);

const present=
Number(document.getElementById("presentDays").value);

const perDay=salary/working;

const finalSalary=
Math.round(perDay*present);

document.getElementById("result").innerHTML=`

<div style="
margin-top:20px;
padding:20px;
background:#eee;
border-radius:10px;
">

<h3>Salary Slip</h3>

Teacher:
${document.getElementById("teacher").value}
<br><br>

Working Days: ${working}
<br>

Present Days: ${present}
<br>

Final Salary:
₹${finalSalary}

</div>
`;
}

</script>

</body>
</html>
