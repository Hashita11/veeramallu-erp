<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Veeramallu Global Academy</title>
    <style>
        :root { --primary: #2b6cb0; --success: #38a169; --error: #e53e3e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568; font-size: 0.9rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-login { background: var(--primary); width: 100%; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--error); }
        button:disabled { background: #cbd5e0 !important; cursor: not-allowed; }
        #attendanceSection { display: none; }
        .status-box { padding: 15px; border-radius: 8px; margin: 20px 0; font-weight: bold; background: #f8fafc; border: 1px solid #e2e8f0; }
        .teacher-info { margin-bottom: 10px; padding: 15px; background: #ebf4ff; border-radius: 10px; border: 1px solid #bee3f8; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="Academy Logo" class="logo" onerror="this.src='https://via.placeholder.com/120?text=VGA+LOGO'">
    
    <div id="loginSection">
        <h2 style="margin-top:0;">Teacher Login</h2>
        <div class="form-group">
            <label>Select Campus</label>
            <select id="campus">
                <option value="Velpur">Velpur</option>
                <option value="Relangi">Relangi</option>
                <option value="Undrajavaram">Undrajavaram</option>
            </select>
        </div>
        <div class="form-group"><label>Email ID</label><input type="email" id="email" placeholder="email@vga.com"></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
        <p id="loginError" style="color:var(--error); display:none; font-size:0.8rem; margin-top:10px;"></p>
    </div>

    <div id="attendanceSection">
        <div class="teacher-info">
            <h2 id="welcomeMsg" style="margin:0; color: #2b6cb0;">Hello!</h2>
            <p id="teacherEmailDisplay" style="margin:5px 0 0 0; font-size: 0.9rem; color: #4a5568;"></p>
        </div>
        <p id="campusDisplay" style="color: #718096; font-weight: bold; margin-bottom: 5px;"></p>
        <div class="status-box" id="gpsStatus">Checking GPS...</div>
        <div class="btn-container">
            <button id="btnIn" class="btn-in" onclick="markAttendance('IN')" disabled>Check IN</button>
            <button id="btnOut" class="btn-out" onclick="markAttendance('OUT')" disabled>Check OUT</button>
        </div>
        <button onclick="location.reload()" style="background:#718096; width:100%; margin-top:20px; padding: 10px;">Logout</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 1. Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.appspot.com",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};

// 2. Campus GPS Coordinates
const campusCoords = {
    "Velpur": { lat: 16.719772, lng: 81.662377 },
    "Relangi": { lat: 16.7082, lng: 81.7251 },
    "Undrajavaram": { lat: 16.7423, lng: 81.6754 }
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 3. Login Function
function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const campus = document.getElementById('campus').value;

    auth.signInWithEmailAndPassword(email, password).then((userCredential) => {
        const user = userCredential.user;
        sessionStorage.setItem('activeCampus', campus);

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('attendanceSection').style.display = 'block';
        
        const namePart = user.email.split('@')[0].toUpperCase();
        document.getElementById('welcomeMsg').innerText = "Hello, " + namePart;
        document.getElementById('teacherEmailDisplay').innerText = user.email;
        document.getElementById('campusDisplay').innerText = "Campus: " + campus;

        startGPSCheck(campus);
    }).catch(err => {
        document.getElementById('loginError').innerText = "Error: " + err.message;
        document.getElementById('loginError').style.display = 'block';
    });
}

// 4. GPS Geofencing Function
function startGPSCheck(cName) {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, campusCoords[cName].lat, campusCoords[cName].lng);
            const statusBox = document.getElementById('gpsStatus');
            const bIn = document.getElementById('btnIn');
            const bOut = document.getElementById('btnOut');

            if (dist <= 200) {
                statusBox.innerHTML = "<span style='color:green;'>✔ verified: Inside Campus</span>";
                bIn.disabled = false; bOut.disabled = false;
            } else {
                statusBox.innerHTML = `<span style='color:red;'>✖ Outside Campus (${Math.round(dist)}m)</span>`;
                bIn.disabled = true; bOut.disabled = true;
            }
        }, null, { enableHighAccuracy: true });
    }
}

// 5. Distance Logic
function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 6. Attendance Submission (CONNECTED TO ADMIN PORTAL)
function markAttendance(type) {
    const user = auth.currentUser;
    const campus = sessionStorage.getItem('activeCampus');
    const now = new Date();
    
    // Time for Table Display
    const timeDisplay = now.toLocaleString('en-IN', { 
        day: 'numeric', month: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true 
    });

    // Date for Admin Filtering (CRITICAL)
    const dateKey = now.toISOString().split('T')[0];

    db.ref('attendance_logs').push({
        teacher: user.email,
        campus: campus,
        action: type,
        time: timeDisplay,
        date: dateKey, // Matches Admin Dashboard logic
        timestamp: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
        alert(type + " recorded successfully!");
    }).catch(err => {
        alert("Sync Error: " + err.message);
    });
}

</script>
</body>
</html>
