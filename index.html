<style>

:root{
    --primary:#1a237e;
    --success:#28a745;
    --error:#d32f2f;
    --warning:#fbc02d;
    --light:#f0f2f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

.card{

    width:100%;

.logo{

    display:block;
    margin-bottom:15px;
}

h2{
    color:var(--primary);

}

.form-group{

    text-align:left;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    font-size:14px;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

input:focus,select:focus{

    border-color:var(--primary);
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;

button:hover{

}

.btn-login{

}

.btn-in{
    background:var(--success);

}

.btn-out{

.btn-secondary{

    border:2px solid var(--primary);

}

.btn-secondary:hover{

    color:white;
}

button:disabled{

#attendanceSection{

}

.teacher-info{
    background:#e3f2fd;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;

}

.status-box{

    margin-bottom:15px;
    background:#fffde7;
    border:1px solid var(--warning);
    font-weight:bold;
    text-align:center;
}

.btn-row{
    display:flex;
    gap:10px;
}

.darkMode{
    background:#111 !important;
}

.darkMode .card{
    background:#1e1e1e;
    color:white;
}

.darkMode input,
.darkMode select{
    background:#333;
    color:white;
    border:1px solid #555;
}

.darkMode .teacher-info{
    background:#222;
}

.darkMode .btn-secondary{
    background:#222;
    color:white;
    border:1px solid white;

.small{
    font-size:12px;
}

#currentTime{
    margin-top:8px;
    color:#555;
    font-size:13px;

.darkMode #currentTime{

}

.profile-pic{
    width:80px;
    height:80px;
    border-radius:50%;

    border:3px solid var(--primary);

<script>

const firebaseConfig = {

// ================= AUTO LOGIN =================

auth.onAuthStateChanged(user=>{

    if(user){

        document.getElementById("attendanceSection").style.display="block";

// ================= LOGIN =================

function handleLogin(){
function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const campus = document.getElementById('campus').value;
    const errDisplay = document.getElementById('loginError');

    if(!email || !password) {
        errDisplay.innerText = "Please enter credentials";
        errDisplay.style.display = "block";
        return;
    }

    auth.signInWithEmailAndPassword(email, password).then((u) => {
        // --- PASTE THE PHOTO FETCH LOGIC HERE ---
        db.collection("teachers").where("email", "==", email).get().then(snap => {
            if(!snap.empty) {
                const data = snap.docs[0].data();
                if(data.photo) {
                    document.getElementById('profilePic').src = data.photo;
                }
            }
        });
        // ----------------------------------------

        sessionStorage.setItem('activeCampus', campus);
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('attendanceSection').style.display = 'block';
        
        const namePart = u.user.email.split('@')[0].toUpperCase();
        document.getElementById('welcomeMsg').innerText = "Welcome, " + namePart;
        document.getElementById('teacherEmailDisplay').innerText = u.user.email;
        document.getElementById('campusDisplay').innerText = "Campus: " + campus;
        
        startGPSCheck(campus);
    }).catch(err => {
        errDisplay.innerText = "Error: " + err.message;
        errDisplay.style.display = 'block';
    });
}


// ================= REGISTER =================

async function registerTeacher(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    if(!email || !password){
        alert("Enter email & password");
        return;
    }

    try{

        const snap =
        await db.collection("teachers")
        .where("email","==",email)
        .get();

        if(snap.empty){
            alert("Teacher not approved by admin");
            return;
        }

        const userCred =
        await auth.createUserWithEmailAndPassword(
            email,password
        );

        await db.collection("teachers")
        .doc(snap.docs[0].id)
        .update({
            uid:userCred.user.uid
        });

        alert("Account Created Successfully");

    }catch(err){
        alert(err.message);
    }
}
    function autoSelectNearestCampus() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            let nearestCampus = "Relangi"; // Default
            let minDistance = Infinity;

            for (const [name, coords] of Object.entries(campusCoords)) {
                const dist = calculateDistance(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    coords.lat,
                    coords.lng
                );

                if (dist < minDistance) {
                    minDistance = dist;
                    nearestCampus = name;
                }
            }

            // Update the dropdown automatically
            const campusDropdown = document.getElementById('campus');
            campusDropdown.value = nearestCampus;
            
            console.log("Automatically selected nearest campus: " + nearestCampus);
        }, (err) => {
            console.warn("Auto-select failed: GPS denied.");
        });
    }
}

// Call this when the window loads
window.onload = autoSelectNearestCampus;


// ================= GPS =================

function startGPSCheck(selectedCampus) {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            
            // 1. Check distance to the CURRENTLY SELECTED campus
            const target = campusCoords[selectedCampus];
            const dist = calculateDistance(userLat, userLng, target.lat, target.lng);
            
            const statusBox = document.getElementById('gpsStatus');
            const bIn = document.getElementById('btnIn');
            const bOut = document.getElementById('btnOut');

            if (dist <= 50) {
                // Success: Teacher is at the selected campus
                statusBox.innerHTML = `<span style='color:green;'>✔ Verified: Inside ${selectedCampus}</span>`;
                statusBox.style.borderColor = "green";
                bIn.disabled = false;
                bOut.disabled = false;
            } else {
                // 2. Not at selected campus. Let's find if they are at ANY other campus
                let foundCorrectCampus = false;

                for (const [name, coords] of Object.entries(campusCoords)) {
                    const d = calculateDistance(userLat, userLng, coords.lat, coords.lng);
                    
                    if (d <= 50) {
                        // AUTO-CORRECT: They are at a different campus!
                        sessionStorage.setItem('activeCampus', name);
                        document.getElementById('campusDisplay').innerText = "Campus: " + name;
                        
                        // Update status and enable buttons
                        statusBox.innerHTML = `<span style='color:green;'>✔ Auto-Switched to ${name}</span>`;
                        statusBox.style.borderColor = "green";
                        bIn.disabled = false;
                        bOut.disabled = false;
                        
                        foundCorrectCampus = true;
                        break; 
                    }
                }

                // 3. If they aren't at ANY campus, show the error you saw in the screenshot
                if (!foundCorrectCampus) {
                    let closestNow = "";
                    let closestDist = Infinity;
                    
                    for (const [name, coords] of Object.entries(campusCoords)) {
                        const d = calculateDistance(userLat, userLng, coords.lat, coords.lng);
                        if (d < closestDist) { 
                            closestDist = d; 
                            closestNow = name; 
                        }
                    }

                    statusBox.innerHTML = `
                        <span style='color:red;'>✖ Wrong Location</span><br>
                        <small>You selected <b>${selectedCampus}</b> but you are ${Math.round(dist)}m away.<br>
                        Are you actually at <b>${closestNow}</b>?</small>
                    `;
                    statusBox.style.borderColor = "red";
                    bIn.disabled = true;
                    bOut.disabled = true;
                }
            }
        }, null, { enableHighAccuracy: true });
    }
}


// ================= DISTANCE =================

function calculateDistance(lat1,lon1,lat2,lon2){

    const R = 6371e3;

    const dLat =
    (lat2-lat1)*Math.PI/180;

    const dLon =
    (lon2-lon1)*Math.PI/180;

    const a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)*Math.sin(dLon/2);

    return R * 2 *
    Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ================= ATTENDANCE =================

async function markAttendance(type){

    try{

        const teacher =
        auth.currentUser.email;

        const campus =
        sessionStorage.getItem("activeCampus");

        const now = new Date();

        const today =
        now.toLocaleDateString("en-IN");

        const timeStr =
        now.toLocaleTimeString(
            "en-GB",
            {hour12:false}
        );

        const existing =
        await db.collection("attendance")
        .where("teacher","==",teacher)
        .where("type","==",type)
        .where("dateOnly","==",today)
        .get();

        if(!existing.empty){

            alert(type + " already marked");

            return;
        }

        const isLate =
        type==="IN" &&
        timeStr > LATE_THRESHOLD;

        await db.collection("attendance").add({

            teacher:teacher,
            teacherEmail:teacher,
            campus:campus,
            type:type,
            late:isLate,

            time:
            firebase.firestore.Timestamp.fromDate(now),

            dateOnly:today,
            dateISO:now.toISOString(),

            method:"Teacher App"
        });

        alert(
        "Attendance Marked : " +
        type +
        " at " +
        timeStr
        );

    }catch(err){

        alert(err.message);
    }
}
async function uploadPhoto(input) {
    const file = input.files[0];
    if (!file) return;

    // 1. Show a loading state
    const picElement = document.getElementById('profilePic');
    picElement.style.opacity = "0.5";

    // 2. Convert image to a string (Base64)
    const reader = new FileReader();
    reader.onload = async function(e) {
        const base64Image = e.target.result;
        const email = auth.currentUser.email;

        try {
            // 3. Find the teacher document in Firestore
            const snap = await db.collection("teachers").where("email", "==", email).get();
            
            if (!snap.empty) {
                const docId = snap.docs[0].id;
                
                // 4. Save the string to the 'photo' field
                await db.collection("teachers").doc(docId).update({
                    photo: base64Image
                });

                // 5. Update the UI
                picElement.src = base64Image;
                picElement.style.opacity = "1";
                alert("✅ Photo Uploaded Successfully!");
            } else {
                alert("Teacher record not found in database.");
            }
        } catch (err) {
            console.error(err);
            alert("Error saving: " + err.message);
            picElement.style.opacity = "1";
        }
    };
    reader.readAsDataURL(file);
}

// ================= TODAY ATTENDANCE =================

async function viewTodayAttendance(){

    const teacher =
    auth.currentUser.email;

    const today =
    new Date().toLocaleDateString("en-IN");

    const snap =
    await db.collection("attendance")
    .where("teacher","==",teacher)
    .where("dateOnly","==",today)
    .get();

    if(snap.empty){

        alert("No attendance today");

        return;
    }

    let msg = "";

    snap.forEach(doc=>{

        const d = doc.data();

        msg +=
        d.type +
        " - " +
        new Date(
            d.time.seconds * 1000
        ).toLocaleTimeString() +
        "\n";
    });

    alert(msg);
}

    if(document.body.classList.contains("darkMode")){
        localStorage.setItem("darkMode","ON");
    }else{
        localStorage.removeItem("darkMode");
    }
}

    updateClock();
    setInterval(updateClock,1000);
};

window.addEventListener("offline",()=>{

});

async function uploadPhoto(input) {
    const file = input.files[0];
    if (!file) return;

    // Check file size (keep it under 1MB for Firestore)
    if (file.size > 1024 * 1024) {
        alert("Photo is too large! Please choose an image under 1MB.");
        return;
    }

    const reader = new FileReader();
    reader.onload = async function(e) {
        const base64Image = e.target.result;
        const email = auth.currentUser.email;

        try {
            // Find the teacher's document
            const snap = await db.collection("teachers").where("email", "==", email).get();
            
            if (!snap.empty) {
                const docId = snap.docs[0].id;
                
                // Update the photo in Firestore
                await db.collection("teachers").doc(docId).update({
                    photo: base64Image
                });

                // Update the UI immediately
                document.getElementById('profilePic').src = base64Image;
                alert("✅ Profile photo updated!");
            }
        } catch (err) {
            console.error(err);
            alert("Error saving photo: " + err.message);
        }
    };
    reader.readAsDataURL(file);
}

// ================= PHOTO SAVE =================

document.getElementById("teacherPhoto")
.addEventListener("change",function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(){

        localStorage.setItem(
            "teacherPhoto",
            reader.result
        );
    };

    reader.readAsDataURL(file);
});

function generateIDCard(){

    const teacher =
    auth.currentUser.email;

    const photo =
    localStorage.getItem("teacherPhoto") ||
    "https://via.placeholder.com/80";

    const html = `

    <div id="idCard"
    style="
    width:300px;
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    border:3px solid #1a237e;
    ">

    <img src="logo.png" width="70">

    <h2 style="color:#1a237e;">
    VEERAMALLU GLOBAL ACADEMY
    </h2>

    <hr>

    <img src="${photo}"
    style="
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #1a237e;
    ">

    <h3 style="margin-top:10px;">
    ${teacher}
    </h3>

    <p>
    ${sessionStorage.getItem("activeCampus")}
    </p>

    <p style="font-size:12px;">
    Authorized Staff Member
    </p>

    </div>
    `;

    const div =
    document.createElement("div");

    div.innerHTML = html;

    document.body.appendChild(div);

    html2canvas(div).then(canvas=>{

        const link =
        document.createElement("a");

        link.download =
        "Teacher-ID.png";

        link.href =
        canvas.toDataURL();

        link.click();

        div.remove();
    });
}
