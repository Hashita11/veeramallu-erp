<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>School ERP</title>



<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>



<style>

body { font-family: Arial; text-align:center; }

input, select, button { padding:10px; margin:10px; width:250px; }

</style>

</head>



<body>



<h2>Veeramallu Global Academy</h2>



<div id="login">

<input id="email" placeholder="Email"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>



<div id="app" style="display:none;">

<h3>Teacher Panel</h3>



<select id="campus">

<option>Velpur</option>

<option>Relangi</option>

<option>Undrajavaram</option>

</select><br>



<button onclick="checkIn()">Check IN</button>

<button onclick="checkOut()">Check OUT</button>



<p id="msg"></p>

</div>



<script>



// 🔥 PASTE YOUR FIREBASE CONFIG HERE

const firebaseConfig = {};



// init

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



function login(){

firebase.auth().signInWithEmailAndPassword(email.value,password.value)

.then(()=>{

login.style.display="none";

app.style.display="block";

});

}



// 📍 CAMPUS LOCATIONS (UPDATE REAL VALUES)

const campuses = {

Velpur:{lat:16.8,lon:81.6},

Relangi:{lat:16.7,lon:81.7},

Undrajavaram:{lat:16.75,lon:81.68}

};



// 📏 DISTANCE CHECK

function distance(lat1, lon1, lat2, lon2){

let R = 6371;

let dLat = (lat2-lat1)*Math.PI/180;

let dLon = (lon2-lon1)*Math.PI/180;

let a =

Math.sin(dLat/2)*Math.sin(dLat/2)+

Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*

Math.sin(dLon/2)*Math.sin(dLon/2);

let c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c*1000; // meters

}



function getLocation(callback){

navigator.geolocation.getCurrentPosition(pos=>{

callback(pos.coords.latitude,pos.coords.longitude);

});

}



function checkIn(){

getLocation((lat,lon)=>{

let c = campus.value;

let d = distance(lat,lon,campuses[c].lat,campuses[c].lon);



if(d>300){

msg.innerText="❌ Outside Campus";

return;

}



db.collection("attendance").add({

type:"IN",

campus:c,

time:new Date().toString(),

lat,lon

});



msg.innerText="✅ Checked IN";

});

}



function checkOut(){

getLocation((lat,lon)=>{

let c = campus.value;

let d = distance(lat,lon,campuses[c].lat,campuses[c].lon);



if(d>300){

msg.innerText="❌ Outside Campus";

return;

}



db.collection("attendance").add({

type:"OUT",

campus:c,

time:new Date().toString(),

lat,lon

});



msg.innerText="✅ Checked OUT";

});

}



</script>

</body>

</html>
