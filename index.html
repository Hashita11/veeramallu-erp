<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Veeramallu Global Academy</title>
    <style>
        :root { --primary: #1a237e; --success: #28a745; --error: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-width: 100px; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568; font-size: 0.9rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-login { background: var(--primary); width: 100%; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--primary); }
        button:disabled { background: #cbd5e0 !important; cursor: not-allowed; }
        #attendanceSection { display: none; }
        .status-box { padding: 15px; border-radius: 8px; margin: 20px 0; font-weight: bold; background: #fffde7; border: 1px solid #fbc02d; }
        .teacher-info { margin-bottom: 15px; padding: 12px; background: #e3f2fd; border-radius: 10px; border: 1px solid #1a237e; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="Academy Logo" class="logo" onerror="this.src='https://via.placeholder.com/100?text=VGA'">
    
    <div id="loginSection">
        <h2 style="color: #1a237e;">Teacher Login</h2>
        <div class="form-group">
            <label>Select Campus</label>
            <select id="campus">
                <option value="Velpur">Velpur</option>
                <option value="Relangi">Relangi</option>
                <option value="Undrajavaram">Undrajavaram</option>
            </select>
        </div>
        <div class="form-group">
            <label>Email ID</label>
            <input type="email" id="email" placeholder="teacher@vga.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
        <p id="loginError" style="color:var(--error); display:none; font-size:0.8rem; margin-top:10px;"></p>
    </div>
<style>
    .btn-secondary {
        display: block;
        width: 100%;
        background-color: transparent;
        color: var(--primary-color);
        padding: 12px;
        border: 2px solid var(--primary-color);
        border-radius: 8px;
        font-weight: bold;
        text-align: center;
        text-decoration: none;
        margin-top: 15px;
        box-sizing: border-box;
        transition: 0.3s;
    }
    .btn-secondary:hover {
        background-color: var(--primary-color);
        color: white;
    }
</style>

<div style="margin-top: 10px;">
    <a href="admissions.html" class="btn-secondary">
        Go to New Admission Portal
    </a>
</div>

    <div id="attendanceSection">
        <div class="teacher-info">
            <h2 id="welcomeMsg" style="margin:0; color: #1a237e; font-size: 1.2rem;">Hello!</h2>
            <p id="teacherEmailDisplay" style="margin:5px 0 0 0; font-size: 0.85rem; color: #444; font-weight: bold;"></p>
        </div>
        <p id="campusDisplay" style="color: #1a237e; font-weight: bold;"></p>
        <div class="status-box" id="gpsStatus">Checking GPS...</div>
        
        <div class="btn-container">
            <button id="btnIn" class="btn-in" onclick="markAttendance('IN')" disabled>Check IN</button>
            <button id="btnOut" class="btn-out" onclick="markAttendance('OUT')" disabled>Check OUT</button>
        </div>
        <button onclick="location.reload()" style="background:#6c757d; width:100%; margin-top:20px; padding: 10px;">Logout</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// --- CONFIGURATION ---
const LATE_THRESHOLD = "08:30:00"; 
const campusCoords = {
    "Velpur": { lat: 16.719772, lng: 81.662377 },
    "Relangi": { lat: 16.7082, lng: 81.7251 },
    "Undrajavaram": { lat: 16.7423, lng: 81.6754 }
};

const firebaseConfig = {
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE", 
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5",
    storageBucket: "veeramalluerp-6cac5.appspot.com",
    messagingSenderId: "379339569496",
    appId: "1:379339569496:web:5c2becb87e35b7190d6350d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore(); // USES FIRESTORE TO MATCH ADMIN

function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const campus = document.getElementById('campus').value;

    auth.signInWithEmailAndPassword(email, password).then((u) => {
        sessionStorage.setItem('activeCampus', campus);
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('attendanceSection').style.display = 'block';
        
        const namePart = u.user.email.split('@')[0].toUpperCase();
        document.getElementById('welcomeMsg').innerText = "Hello, " + namePart;
        document.getElementById('teacherEmailDisplay').innerText = u.user.email;
        document.getElementById('campusDisplay').innerText = "Campus: " + campus;

        startGPSCheck(campus);
    }).catch(err => {
        document.getElementById('loginError').innerText = err.message;
        document.getElementById('loginError').style.display = 'block';
    });
}

function startGPSCheck(cName) {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, campusCoords[cName].lat, campusCoords[cName].lng);
            const status = document.getElementById('gpsStatus');
            const bIn = document.getElementById('btnIn');
            const bOut = document.getElementById('btnOut');

            if (dist <= 200) { 
                status.innerHTML = "<span style='color:green;'>✔ Verified: Inside Campus</span>";
                bIn.disabled = false; bOut.disabled = false;
            } else {
                status.innerHTML = `<span style='color:red;'>✖ Outside Campus (${Math.round(dist)}m)</span>`;
                bIn.disabled = true; bOut.disabled = true;
            }
        }, null, { enableHighAccuracy: true });
    }
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function markAttendance(type) {
    const campus = sessionStorage.getItem('activeCampus');
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-GB'); // HH:MM:SS
    
    // Check if Teacher is late based on Admin's 08:30:00 rule
    const isLate = (type === 'IN' && timeStr > LATE_THRESHOLD);

    db.collection("attendance").add({
        teacher: auth.currentUser.email,
        campus: campus,
        type: type, // Admin expects 'type' (IN/OUT)
        time: now.toLocaleString('en-IN'), // Admin expects this for parseVgaDate
        autoLate: isLate, // Admin uses this for LATE label
        method: "Mobile-App"
    }).then(() => {
        alert(type + " recorded for Admin Console!");
    }).catch(err => alert("Error: " + err.message));
}
</script>
</body>
</html>
