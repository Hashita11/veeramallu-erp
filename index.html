<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA - Teacher Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-container { background: #ffffff; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .academy-logo { width: 80px; height: auto; margin-bottom: 12px; }
        .academy-name { font-size: 18px; color: #1a237e; margin: 0; font-weight: 800; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-login { background-color: #007bff; }
        .btn-in { background-color: #28a745; }
        .btn-out { background-color: #1a237e; }
        #msg { margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h1 class="academy-name">Veeramallu Global Academy</h1>
        <h2 style="font-size: 16px; color: #666;">Attendance Panel</h2>
    </div>

    <div id="login-div">
        <input id="email" type="email" placeholder="Email Address">
        <input id="password" type="password" placeholder="Password">
        <button class="btn btn-login" onclick="login()">Login to Panel</button>
    </div>

    <div id="app" style="display:none;">
        <select id="campus">
            <option value="Velpur">Velpur Campus</option>
            <option value="Relangi">Relangi Campus</option>
            <option value="Undrajavaram">Undrajavaram Campus</option>
        </select>
        <button class="btn btn-in" onclick="processAttendance('IN')">Check IN</button>
        <button class="btn btn-out" onclick="processAttendance('OUT')">Check OUT</button>
        <p id="msg"></p>
    </div>
</div>

<script>
    // 1. Restored your exact Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFPu2mTmQvPtXZx6h-2Mz4D1piE",
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c28ecb87c35b7190d6350d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Verified Coordinates for your Campuses
    const campuses = {
        "Velpur": { lat: 16.711812, lon: 81.662585 },
        "Relangi": { lat: 16.6920, lon: 81.6450 },
        "Undrajavaram": { lat: 16.7450, lon: 81.6820 }
    };

    // 3. Login Logic
    function login() {
        const userEmail = document.getElementById("email").value.trim();
        const userPass = document.getElementById("password").value;

        firebase.auth().signInWithEmailAndPassword(userEmail, userPass)
        .then(() => {
            document.getElementById("login-div").style.display = "none";
            document.getElementById("app").style.display = "block";
        })
        .catch(err => alert("Login Failed: " + err.message));
    }

    // 4. Single Haversine Formula (Clean version)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // Meters
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // 5. Combined Attendance Logic
    function processAttendance(type) {
        const msg = document.getElementById("msg");
        msg.innerHTML = "⏳ Validating Location...";
        msg.style.color = "black";

        navigator.geolocation.getCurrentPosition((position) => {
            const uLat = position.coords.latitude;
            const uLon = position.coords.longitude;
            const selectedCampus = document.getElementById("campus").value;
            const target = campuses[selectedCampus];

            const dist = calculateDistance(uLat, uLon, target.lat, target.lon);

            // Allow up to 250 meters to account for mobile GPS drift
            if (dist > 250) { 
                msg.innerHTML = "❌ Error: You are " + Math.round(dist) + "m away from " + selectedCampus + " campus.";
                msg.style.color = "red";
                return;
            }

            const now = new Date();
            db.collection("attendance").add({
                teacher: firebase.auth().currentUser.email,
                type: type,
                campus: selectedCampus,
                time: now.toLocaleString('en-IN'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                msg.innerHTML = "✅ Successfully Checked " + type;
                msg.style.color = "green";
            }).catch(err => {
                msg.innerHTML = "❌ Database Error: " + err.message;
            });

        }, (err) => {
            alert("Location access denied. Please enable GPS.");
        }, { enableHighAccuracy: true, maximumAge: 0 });
    }
</script>
</body>
</html>
