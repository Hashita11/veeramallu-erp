<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veeramallu School ERP</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: Arial; text-align:center; background-color: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        input, select, button { padding:12px; margin:10px; width:250px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>

<body>
<div class="container">
    <h2>Veeramallu Global Academy</h2>

    <div id="login-div">
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
    </div>

    <div id="app" style="display:none;">
        <h3>Teacher Panel</h3>
        <select id="campus">
            <option value="Velpur">Velpur</option>
            <option value="Relangi">Relangi</option>
            <option value="Undrajavaram">Undrajavaram</option>
        </select><br>

        <button onclick="checkIn()">Check IN</button>
        <button onclick="checkOut()">Check OUT</button>
        <p id="msg"></p>
    </div>
</div>

<script>
    // 🔥 PASTE YOUR SAVED CONFIG HERE
        const firebaseConfig = {
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtM8n8M9Z6Y-vFv6I4",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5",
    storageBucket: "veeramalluerp-6cac5.appspot.com",
    messagingSenderId: "379339569496",
    appId: "1:379339569496:web:5c2bec87e35b7190d6350d"
  };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login(){
        const userEmail = document.getElementById("email").value;
        const userPass = document.getElementById("password").value;
        
        firebase.auth().signInWithEmailAndPassword(userEmail, userPass)
        .then(()=>{
            document.getElementById("login-div").style.display="none";
            document.getElementById("app").style.display="block";
        })
        .catch(err => alert("Login Failed: " + err.message));
    }

    // 📍 UPDATE THESE TO YOUR ACTUAL CAMPUS COORDINATES
    const campuses = {
        Velpur: {lat: 16.6967, lon: 81.7041},
        Relangi: {lat: 16.7111, lon: 81.7222},
        Undrajavaram: {lat: 16.7455, lon: 81.6788}
    };

    function distance(lat1, lon1, lat2, lon2){
        let R = 6371;
        let dLat = (lat2-lat1)*Math.PI/180;
        let dLon = (lon2-lon1)*Math.PI/180;
        let a = Math.sin(dLat/2)*Math.sin(dLat/2) +
                Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
                Math.sin(dLon/2)*Math.sin(dLon/2);
        let c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        return R*c*1000; 
    }

    function getLocation(callback){
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                callback(pos.coords.latitude, pos.coords.longitude);
            }, err => alert("Please enable GPS/Location"));
        }
    }

    function checkIn(){
        getLocation((lat, lon) => {
            let c = document.getElementById("campus").value;
            let d = distance(lat, lon, campuses[c].lat, campuses[c].lon);
            if(d > 300) { document.getElementById("msg").innerText="❌ Outside Campus"; return; }

            db.collection("attendance").add({
                teacher: firebase.auth().currentUser.email,
                type: "IN",
                campus: c,
                time: new Date().toLocaleString(),
                lat, lon
            }).then(() => document.getElementById("msg").innerText="✅ Checked IN");
        });
    }

    function checkOut(){
        getLocation((lat, lon) => {
            let c = document.getElementById("campus").value;
            let d = distance(lat, lon, campuses[c].lat, campuses[c].lon);
            if(d > 300) { document.getElementById("msg").innerText="❌ Outside Campus"; return; }

            db.collection("attendance").add({
                teacher: firebase.auth().currentUser.email,
                type: "OUT",
                campus: c,
                time: new Date().toLocaleString(),
                lat, lon
            }).then(() => document.getElementById("msg").innerText="✅ Checked OUT");
        });
    }
</script>
</body>
</html>
