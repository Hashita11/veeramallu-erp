<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a237e">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Veeramallu Global Academy ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0d47a1,#1a237e,#311b92);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* Background circles */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

body::before{
    width:300px;
    height:300px;
    top:-100px;
    left:-100px;
}

body::after{
    width:250px;
    height:250px;
    bottom:-80px;
    right:-80px;
}

.container{
    width:95%;
    max-width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    width:110px;
    height:110px;
    object-fit:contain;
    margin-bottom:15px;
    border-radius:50%;
    background:white;
    padding:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    color:white;
    font-size:28px;
    font-weight:700;
    line-height:1.3;
}

.subtitle{
    color:#dfe6ff;
    margin-top:10px;
    font-size:14px;
    line-height:1.6;
}

.buttons{
    margin-top:35px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.btn{
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    color:white;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.btn:hover{
    transform:translateY(-3px) scale(1.02);
}

.teacher{
    background:linear-gradient(45deg,#43a047,#66bb6a);
}

.parent{
    background:linear-gradient(45deg,#fb8c00,#ffb300);
}

.admin{
    background:linear-gradient(45deg,#e53935,#c62828);
}

.footer{
    margin-top:30px;
    color:#dfe6ff;
    font-size:12px;
    line-height:1.5;
}

.version{
    margin-top:8px;
    color:#ffffff;
    font-weight:600;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>VEERAMALLU<br>GLOBAL ACADEMY</h1>

    <div class="subtitle">
        Smart ERP Management System<br>
        Attendance • Academics • Payroll • Communication
    </div>

    <div class="buttons">

        <a href="teacher.html" class="btn teacher">
            👨‍🏫 Teacher Login
        </a>

        <a href="parent-view.html" class="btn parent">
            👨‍👩‍👧 Parent Portal
        </a>

        <a href="admin.html" class="btn admin">
            🔐 Admin Panel
        </a>

    </div>

    <div class="footer">
        Veeramallu Global Academy ERP System
        <div class="version">
            Version 2026
        </div>
    </div>

</div>
    <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
  .then(() => console.log("Service Worker Registered"));
}
</script>
</body>
</html>
