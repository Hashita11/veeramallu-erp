<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Veeramallu Global Academy</title>
    <style>
        :root { --primary: #2b6cb0; --success: #38a169; --error: #e53e3e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-width: 100px; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568; font-size: 0.9rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #cbd5e0; cursor: not-allowed; }
        #attendanceSection { display: none; }
        .status-box { padding: 15px; border-radius: 8px; margin: 20px 0; font-weight: bold; background: #f8fafc; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/100?text=VGA'">
    
    <div id="loginSection">
        <h2>Teacher Login</h2>
        <div class="form-group">
            <label>Select Campus</label>
            <select id="campus">
                <option value="Velpur">Velpur Campus</option>
                <option value="Relangi">Relangi Campus</option>
                <option value="Undrajavaram">Undrajavaram Campus</option>
            </select>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="teacher@veermallu.edu">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()">Sign In</button>
        <p id="loginError" style="color:var(--error); display:none; font-size:0.8rem; margin-top:10px;"></p>
    </div>

    <div id="attendanceSection">
        <h2 id="welcomeMsg">Welcome</h2>
        <p id="campusDisplay" style="color: #718096;"></p>
        
        <div class="status-box" id="gpsStatus">
            Checking GPS Location...
        </div>

        <button id="checkInBtn" onclick="markAttendance()" disabled>Mark Attendance</button>
        <button onclick="location.reload()" style="background:#718096; margin-top:10px;">Logout</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 1. CONFIGURATION
const firebaseConfig = {
  apiKey:"AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",  // PASTE YOUR FULL KEY FROM SCREENSHOT
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.appspot.com",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};

const campusCoords = {
    "Velpur": { lat: 16.7172, lng: 81.6671 },
    "Relangi": { lat: 16.7111, lng: 81.7222 }, 
    "Undrajavaram": { lat: 16.7455, lng: 81.6788 }
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 2. LOGIN LOGIC
function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const campus = document.getElementById('campus').value;

    auth.signInWithEmailAndPassword(email, password)
        .then((user) => {
            sessionStorage.setItem('activeCampus', campus);
            showAttendanceUI(user.user.email, campus);
        })
        .catch(err => {
            document.getElementById('loginError').innerText = err.message;
            document.getElementById('loginError').style.display = 'block';
        });
}

// 3. UI SWITCH & GPS AUTO-START
function showAttendanceUI(email, campus) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('attendanceSection').style.display = 'block';
    document.getElementById('welcomeMsg').innerText = "Hello, Teacher";
    document.getElementById('campusDisplay').innerText = "Assigned to: " + campus;
    
    // Auto-trigger GPS
    startGPSCheck(campus);
}

function startGPSCheck(campusName) {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, campusCoords[campusName].lat, campusCoords[campusName].lng);
            const statusBox = document.getElementById('gpsStatus');
            const btn = document.getElementById('checkInBtn');

            if (dist <= 100) { // 100 meters
                statusBox.innerHTML = "<span style='color:green;'>✔ verified: Inside Campus</span>";
                btn.disabled = false;
            } else {
                statusBox.innerHTML = `<span style='color:red;'>✖ Outside Campus<br>(${Math.round(dist)}m away)</span>`;
                btn.disabled = true;
            }
        }, err => alert("Please enable Location Services"), { enableHighAccuracy: true });
    }
}

// 4. DISTANCE CALCULATION (Haversine)
function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 5. DATA SUBMISSION
function markAttendance() {
    const user = auth.currentUser;
    const campus = sessionStorage.getItem('activeCampus');
    const timestamp = new Date().toLocaleString();

    db.ref('attendance/' + campus + '/' + user.uid).push({
        email: user.email,
        time: timestamp,
        status: "Present"
    }).then(() => alert("Attendance Marked Successfully!"));
}
</script>
</body>
</html>
