<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Veeramallu Global Academy</title>
    <style>
        :root {
            --primary: #1a237e;
            --success: #28a745;
            --error: #d32f2f;
            --warning: #fbc02d;
            --light: #f0f2f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: 0.3s;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 430px;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            text-align: center;
        }
        .logo { width: 90px; margin: 0 auto 15px; display: block; }
        h2 { color: var(--primary); margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; }
        button { width: 100%; padding: 13px; border: none; border-radius: 8px; margin-top: 10px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login { background: var(--primary); color: white; }
        .btn-in { background: var(--success); color: white; flex: 1; }
        .btn-out { background: #e65100; color: white; flex: 1; }
        .btn-secondary { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn-secondary:hover { background: var(--primary); color: white; }
        .btn-purple { background: #6a1b9a; color: white; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        
        #attendanceSection { display: none; }
        .teacher-info { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--primary); }
        .status-box { padding: 14px; border-radius: 8px; margin: 15px 0; background: #fffde7; border: 1px solid var(--warning); font-weight: bold; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        
        /* Dark Mode */
        .darkMode { background: #111 !important; }
        .darkMode .card { background: #1e1e1e; color: white; }
        .darkMode input, .darkMode select { background: #333; color: white; border: 1px solid #555; }
        .darkMode .teacher-info { background: #222; border-color: #444; }
        .darkMode .btn-secondary { background: #222; color: white; border: 1px solid white; }
        .small { font-size: 12px; display: block; margin-top: 5px; }
        #currentTime { margin-top: 8px; color: #555; font-size: 13px; }
        .darkMode #currentTime { color: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" class="logo" onerror="this.src='https://via.placeholder.com/100?text=VGA'">
    
    <button onclick="toggleDarkMode()" style="background:#111; color:white; margin-bottom: 15px;">🌙 Toggle Dark Mode</button>

    <div id="loginSection">
        <h2>Teacher Login</h2>
        <div class="form-group">
            <label>Select Campus</label>
            <select id="campus">
                <option value="Relangi">Relangi</option>
                <option value="Velpur">Velpur</option>
                <option value="Undrajavaram">Undrajavaram</option>
            </select>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="teacher@vga.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
        <button class="btn-secondary" onclick="registerTeacher()">Create Account</button>
        <p id="loginError" style="color:red; margin-top:10px; font-size:13px; display:none;"></p>
    </div>

    <div id="attendanceSection">
        <div class="teacher-info">
            <div style="position: relative; display: inline-block;">
                <img id="profilePic" src="https://via.placeholder.com/100?text=User" class="profile-pic">
                <label for="photoUpload" style="position: absolute; bottom: 5px; right: 5px; background: var(--primary); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; font-size: 14px;">📷</label>
                <input type="file" id="photoUpload" style="display:none;" accept="image/*" onchange="uploadPhoto(this)">
            </div>
            <h2 id="welcomeMsg" style="margin-top:10px; font-size: 1.2rem;">Welcome!</h2>
            <p id="teacherEmailDisplay" class="small"></p>
            <p id="campusDisplay" class="small" style="font-weight:bold; color:var(--primary);"></p>
            <p id="onlineStatus" style="color:green; font-weight:bold; margin-top:5px;">🟢 Online</p>
            <p id="currentTime"></p>
        </div>

        <div class="status-box" id="gpsStatus">Checking GPS...</div>

        <div class="btn-row">
            <button id="btnIn" class="btn-in" disabled onclick="markAttendance('IN')">Check IN</button>
            <button id="btnOut" class="btn-out" disabled onclick="markAttendance('OUT')">Check OUT</button>
        </div>

        <button class="btn-secondary" onclick="window.location.href='admissions.html'">New Admission Portal</button>
        <button class="btn-secondary" onclick="window.location.href='admin.html'">Admin Dashboard</button>
        <button class="btn-secondary" onclick="window.location.href='homework.html'">Homework Upload</button>
        <button class="btn-secondary" onclick="window.location.href='salary-slip.html'">Salary Slip</button>
        <button class="btn-secondary" onclick="generateIDCard()">Generate ID Card</button>
        <button class="btn-secondary" onclick="window.location.href='bus-tracker.html'">Bus Tracking</button>
        <button class="btn-purple" onclick="viewTodayAttendance()">Today's Attendance</button>
        <button onclick="logoutUser()" style="background:#6c757d; color:white;">Logout</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// ================= CONFIG =================
const LATE_THRESHOLD = "08:30:00";
const campusCoords = {
    "Relangi": { lat: 16.702710, lng: 81.644140 },
    "Velpur": { lat: 16.719772, lng: 81.662377 },
    "Undrajavaram": { lat: 16.791772, lng: 81.701022 }
};

const firebaseConfig = {
    apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
    authDomain: "veeramalluerp-6cac5.firebaseapp.com",
    projectId: "veeramalluerp-6cac5",
    storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
    messagingSenderId: "379339569496",
    appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================= AUTO LOGIN & INITIALIZE =================
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("attendanceSection").style.display = "block";
        const campus = sessionStorage.getItem("activeCampus") || "Relangi";
        
        document.getElementById("welcomeMsg").innerText = "Welcome, " + user.email.split("@")[0].toUpperCase();
        document.getElementById("teacherEmailDisplay").innerText = user.email;
        document.getElementById("campusDisplay").innerText = "Campus: " + campus;

        // Fetch Photo from Firestore
        db.collection("teachers").where("email", "==", user.email).get().then(snap => {
            if (!snap.empty && snap.docs[0].data().photo) {
                document.getElementById("profilePic").src = snap.docs[0].data().photo;
            }
        });

        startGPSCheck(campus);
    }
});

// ================= LOGIN & REGISTER =================
function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const campus = document.getElementById('campus').value;
    const errDisplay = document.getElementById('loginError');

    if (!email || !password) {
        errDisplay.innerText = "Please enter credentials";
        errDisplay.style.display = "block";
        return;
    }

    auth.signInWithEmailAndPassword(email, password).then(() => {
        sessionStorage.setItem('activeCampus', campus);
        location.reload(); 
    }).catch(err => {
        errDisplay.innerText = "Error: " + err.message;
        errDisplay.style.display = 'block';
    });
}

async function registerTeacher() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) return alert("Enter email & password");

    try {
        const snap = await db.collection("teachers").where("email", "==", email).get();
        if (snap.empty) return alert("Teacher not pre-approved by admin");

        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection("teachers").doc(snap.docs[0].id).update({ uid: userCred.user.uid });
        alert("Account Created Successfully! Now Login.");
    } catch (err) { alert(err.message); }
}

// ================= GPS LOGIC =================
function startGPSCheck(selectedCampus) {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            const target = campusCoords[selectedCampus];
            const dist = calculateDistance(userLat, userLng, target.lat, target.lng);
            
            const statusBox = document.getElementById('gpsStatus');
            const bIn = document.getElementById('btnIn');
            const bOut = document.getElementById('btnOut');

            if (dist <= 50) {
                statusBox.innerHTML = `<span style='color:green;'>✔ Verified: Inside ${selectedCampus}</span>`;
                bIn.disabled = false; bOut.disabled = false;
            } else {
                let foundOther = false;
                for (const [name, coords] of Object.entries(campusCoords)) {
                    if (calculateDistance(userLat, userLng, coords.lat, coords.lng) <= 50) {
                        sessionStorage.setItem('activeCampus', name);
                        document.getElementById('campusDisplay').innerText = "Campus: " + name;
                        statusBox.innerHTML = `<span style='color:green;'>✔ Auto-Switched to ${name}</span>`;
                        bIn.disabled = false; bOut.disabled = false;
                        foundOther = true; break;
                    }
                }
                if (!foundOther) {
                    statusBox.innerHTML = `<span style='color:red;'>✖ Outside Campus (${Math.round(dist)}m)</span>`;
                    bIn.disabled = true; bOut.disabled = true;
                }
            }
        }, null, { enableHighAccuracy: true });
    }
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ================= ATTENDANCE =================
async function markAttendance(type) {
    try {
        const teacher = auth.currentUser.email;
        const campus = sessionStorage.getItem("activeCampus");
        const now = new Date();
        const today = now.toLocaleDateString("en-IN");
        const timeStr = now.toLocaleTimeString("en-GB", { hour12: false });

        const existing = await db.collection("attendance")
            .where("teacher", "==", teacher).where("type", "==", type).where("dateOnly", "==", today).get();

        if (!existing.empty) return alert(type + " already marked for today");

        await db.collection("attendance").add({
            teacher, teacherEmail: teacher, campus, type,
            late: (type === "IN" && timeStr > LATE_THRESHOLD),
            time: firebase.firestore.Timestamp.fromDate(now),
            dateOnly: today,
            method: "Teacher App"
        });
        alert(`Attendance Marked: ${type} at ${timeStr}`);
    } catch (err) { alert(err.message); }
}

// ================= PHOTO UPLOAD =================
async function uploadPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 1024 * 1024) return alert("Photo too large (Keep under 1MB)");

    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64Image = e.target.result;
        const snap = await db.collection("teachers").where("email", "==", auth.currentUser.email).get();
        if (!snap.empty) {
            await db.collection("teachers").doc(snap.docs[0].id).update({ photo: base64Image });
            document.getElementById('profilePic').src = base64Image;
            alert("✅ Profile photo updated!");
        }
    };
    reader.readAsDataURL(file);
}

// ================= UTILITIES =================
function toggleDarkMode() {
    document.body.classList.toggle("darkMode");
    localStorage.setItem("darkMode", document.body.classList.contains("darkMode") ? "ON" : "OFF");
}

function updateClock() {
    document.getElementById("currentTime").innerText = new Date().toLocaleString();
}

async function viewTodayAttendance() {
    const today = new Date().toLocaleDateString("en-IN");
    const snap = await db.collection("attendance").where("teacher", "==", auth.currentUser.email).where("dateOnly", "==", today).get();
    if (snap.empty) return alert("No records for today");
    let msg = "Today's Attendance:\n";
    snap.forEach(doc => { msg += `${doc.data().type} - ${new Date(doc.data().time.seconds * 1000).toLocaleTimeString()}\n`; });
    alert(msg);
}

// ================= GPS =================
function startGPSCheck(selectedCampus) {

    if (!navigator.geolocation) return;

    navigator.geolocation.watchPosition((pos) => {

        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;

        const target = campusCoords[selectedCampus];

        const dist = calculateDistance(
            userLat,
            userLng,
            target.lat,
            target.lng
        );

        } else {

// ================= DISTANCE =================
function calculateDistance(lat1, lon1, lat2, lon2) {

    const R = 6371e3;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

        });

        alert(`${type} Marked Successfully`);

    } catch (err) {

        alert(err.message);
    }
}

        return alert("Keep image under 1MB");

    const reader = new FileReader();

    reader.onload = async function(e) {

        try {

            const base64Image = e.target.result;

            const snap = await db.collection("teachers")

                .get();

            if (!snap.empty) {

                document.getElementById("profilePic").src =

                alert("✅ Photo Updated");

        } catch (err) {

    reader.readAsDataURL(file);
}

    const today =
        new Date().toLocaleDateString("en-IN");

    const snap = await db.collection("attendance")
        .where("teacher", "==", auth.currentUser.email)
        .where("dateOnly", "==", today)
        .get();

    if (snap.empty)
        return alert("No records");

    let msg = "Today's Attendance\n\n";

    snap.forEach(doc => {

        msg +=
            `${doc.data().type} - ${
                new Date(
                    doc.data().time.seconds * 1000
                ).toLocaleTimeString()
            }\n`;
    });

    alert(msg);
}

// ================= ID CARD =================
function generateIDCard() {

    const pic =
        document.getElementById("profilePic").src;

    const name =
        auth.currentUser.email
        .split('@')[0]
        .toUpperCase();

    const campus =
        sessionStorage.getItem("activeCampus");

    const idHtml = `
    <div id="tempID"
    style="
    width:300px;
    padding:20px;
    text-align:center;
    background:white;
    border:5px solid #1a237e;
    border-radius:15px;
    font-family:sans-serif;
    ">

    <h2 style="color:#1a237e;">
    VEERAMALLU GLOBAL ACADEMY
    </h2>

    <img src="${pic}"
    style="
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid #1a237e;
    object-fit:cover;
    ">

    <h3>${name}</h3>

    <p>${campus}</p>

    </div>
    `;

    const container =
        document.createElement("div");

    container.style.position = "absolute";
    container.style.left = "-9999px";

    container.innerHTML = idHtml;

    document.body.appendChild(container);

    html2canvas(
        document.getElementById("tempID")
    ).then(canvas => {

        const link =
            document.createElement("a");

        link.download = "VGA-ID.png";

        link.href = canvas.toDataURL();

        link.click();

        document.body.removeChild(container);
    });
}

// ================= LOGOUT =================
function logoutUser() {

    auth.signOut().then(() => {

        sessionStorage.clear();

        location.reload();
    });
}

// ================= START =================
window.onload = () => {

    if (localStorage.getItem("darkMode") === "ON") {

        document.body.classList.add("darkMode");
    }

    updateClock();

    setInterval(updateClock, 1000);

    // AUTO CAMPUS
    if (navigator.geolocation && !auth.currentUser) {

        navigator.geolocation.getCurrentPosition(pos => {

            let near = "Relangi";
            let min = Infinity;

            for (const [name, coords]
                of Object.entries(campusCoords)) {

                const d = calculateDistance(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    coords.lat,
                    coords.lng
                );

                if (d < min) {

                    min = d;
                    near = name;
                }
            }

            document.getElementById("campus").value =
                near;
        });
    }
};
