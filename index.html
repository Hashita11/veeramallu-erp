<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VGA - Teacher Panel</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .main-container { background: #ffffff; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); margin-top: 15px; box-sizing: border-box; text-align: center; }
        
        /* Official VGA Header Section */
        .header-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .academy-logo { width: 100px; height: auto; margin-bottom: 12px; }
        .academy-name { font-size: 20px; color: #1a237e; margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .panel-title { font-size: 16px; color: #d32f2f; margin-top: 5px; font-weight: 600; }

        /* Inputs & Buttons */
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; color: white; }
        .btn-login { background-color: #007bff; }
        .btn-in { background-color: #28a745; } /* Green for IN */
        .btn-out { background-color: #1a237e; } /* Navy for OUT */

        #msg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>

<body>

<div class="main-container">
    <div class="header-section">
        <img src="logo.png" alt="VGA Logo" class="academy-logo">
        <h1 class="academy-name">Veeramallu Global Academy</h1>
        <h2 class="panel-title" id="panel-label">Teacher ERP Login</h2>
    </div>

    <div id="login-div">
        <input id="email" placeholder="Email Address"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button class="btn btn-login" onclick="login()">Login to Panel</button>
    </div>

    <div id="app" style="display:none;">
        <select id="campus">
            <option value="Velpur">Velpur Campus</option>
            <option value="Relangi">Relangi Campus</option>
            <option value="Undrajavaram">Undrajavaram Campus</option>
        </select><br>

        <button class="btn btn-in" onclick="checkIn()">Check IN</button>
        <button class="btn btn-out" onclick="checkOut()">Check OUT</button>
        <p id="msg"></p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE", 
        authDomain: "veeramalluerp-6cac5.firebaseapp.com",
        projectId: "veeramalluerp-6cac5",
        storageBucket: "veeramalluerp-6cac5.appspot.com",
        messagingSenderId: "379339569496",
        appId: "1:379339569496:web:5c2becb87e35b7190d6350d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login(){
        const userEmail = document.getElementById("email").value;
        const userPass = document.getElementById("password").value;
        
        firebase.auth().signInWithEmailAndPassword(userEmail, userPass)
        .then(()=>{
            document.getElementById("login-div").style.display="none";
            document.getElementById("app").style.display="block";
            document.getElementById("panel-label").innerText = "Teacher Attendance Panel";
        })
        .catch(err => alert("Login Failed: " + err.message));
    }
// Configuration: Precise Campus Coordinates
const CAMPUS_LOCATIONS = {
  "Velpur": { lat: 16.7165, lng: 81.6625 },
  "Undrajavaram": { lat: 16.7450, lng: 81.6820 }, // Update as needed
  "Relangi": { lat: 16.6920, lng: 81.6450 }      // Update as needed
};

const ALLOWED_RADIUS_KM = 0.2; // 200 meters buffer for GPS accuracy

function checkLocation() {
  if (!navigator.geolocation) {
    console.log("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition((position) => {
    const userLat = position.coords.latitude;
    const userLng = position.coords.longitude;
    
    // Select the campus you are currently at
    const target = CAMPUS_LOCATIONS["Velpur"];
    const distance = calculateDistance(userLat, userLng, target.lat, target.lng);

    const statusElement = document.getElementById("status"); // Ensure you have this ID in your HTML
    
    if (distance <= ALLOWED_RADIUS_KM) {
      statusElement.innerHTML = "Status: <span style='color:green;'>Inside Campus</span>";
    } else {
      statusElement.innerHTML = `Status: <span style='color:red;'>Outside Campus</span> (${distance.toFixed(2)} km away)`;
    }
  }, (error) => {
    console.error("Error getting location: ", error);
  }, {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 0
  });
}

// Haversine Formula to calculate distance between two points
function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // Earth's radius in km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = 
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}



    function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // metres
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}


    function getLocation(callback){
        document.getElementById("msg").innerText = "⏳ Checking Location...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                callback(pos.coords.latitude, pos.coords.longitude);
            }, err => {
                alert("Please enable GPS/Location");
                document.getElementById("msg").innerText = "❌ GPS Error";
            });
        }
    }

    function checkIn() {
    if (!navigator.geolocation) return alert("Enable GPS");

    navigator.geolocation.getCurrentPosition((position) => {
        const uLat = position.coords.latitude;
        const uLon = position.coords.longitude;
        
        let nearest = "Velpur";
        let minDist = 999999;

        // Auto-detect which VGA campus they are at
        for (let name in campuses) {
            let d = calculateDistance(uLat, uLon, campuses[name].lat, campuses[name].lon);
            if (d < minDist) {
                minDist = d;
                nearest = name;
            }
        }

        // --- GEOFENCING SECURITY (200 Meters) ---
        if (minDist > 200) {
            document.getElementById("msg").innerHTML = `<b style="color:red">❌ Error: You are ${Math.round(minDist)}m away from ${nearest} campus.</b>`;
            return;
        }

        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-GB'); 
        const isLate = (timeStr > "08:30:00"); 

        // Save to Firebase
        db.collection("attendance").add({
            teacher: firebase.auth().currentUser.email,
            type: "IN",
            campus: nearest,
            isLate: isLate,
            time: now.toLocaleString('en-IN'),
            lat: uLat,
            lon: uLon
        }).then(() => {
            document.getElementById("msg").innerHTML = `<b style="color:green">✅ Checked IN at ${nearest} ${isLate ? "(LATE)" : ""}</b>`;
        });
    });
}


    function checkOut() {
        getLocation((lat, lon) => {
            let c = document.getElementById("campus").value;
            let d = distance(lat, lon, campuses[c].lat, campuses[c].lon);
            if (d > 200) { 
                document.getElementById("msg").innerText = "❌ Outside Campus (" + Math.round(d) + "m)"; 
                return; 
            }

            const timeNow = new Date().toLocaleString('en-IN');

            db.collection("attendance").add({
                teacher: firebase.auth().currentUser.email,
                type: "OUT",
                campus: c,
                time: timeNow,
                lat, lon
            }).then(() => {
                document.getElementById("msg").innerHTML = "<span style='color:navy'>✅ Checked OUT Success</span>";
                sendToGoogleSheet("OUT", c, lat, lon);
            });
        });
    }

    function sendToGoogleSheet(type, campus, lat, lon) {
        fetch('https://script.google.com/macros/s/AKfycbymgNCA5beIqL1tQrrOQJCyECQqE8qHtNY3SdMFZiH3SbIODydfJg_ZVcf6mS7n9eEQ/exec',{
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                teacher: firebase.auth().currentUser.email,
                type: type,
                campus: campus,
                lat: lat,
                lon: lon
            })
        });
    }
</script>
</body>
</html>
