<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA Attendance System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #218838; }
        #status { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .outside { color: #721c24; background-color: #f8d7da; }
        .inside { color: #155724; background-color: #d4edda; }
    </style>
</head>
<body>

<div class="container">
    <h2>VGA Staff Attendance</h2>
    
    <div id="login-form">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="attendance-section" style="display:none;">
        <p id="user-display"></p>
        <select id="campus-select">
            <option value="Velpur">Velpur Campus</option>
            <option value="Relangi">Relangi Campus</option>
            <option value="Undrajavaram">Undrajavaram Campus</option>
        </select>
        <button onclick="processAttendance('Check-In')">Check-In</button>
        <button onclick="processAttendance('Check-Out')" style="background-color: #dc3545;">Check-Out</button>
        <div id="status">Ready...</div>
    </div>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY", // Ensure this is your actual key
        authDomain: "hashita11.firebaseapp.com",
        databaseURL: "https://hashita11-default-rtdb.firebaseio.com",
        projectId: "hashita11",
        storageBucket: "hashita11.appspot.com",
        messagingSenderId: "338870347895",
        appId: "1:338870347895:web:86f67198a25f82216be510"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    // 2. Campus Coordinates (Updated for the Gate)
    const campuses = {
        "Velpur": { lat: 16.711812, lon: 81.662585 },
        "Relangi": { lat: 16.6920, lon: 81.6450 },
        "Undrajavaram": { lat: 16.7450, lon: 81.6820 }
    };

    const ALLOWED_RADIUS_METERS = 200; // 200m radius is safe for campus

    // 3. Authentication
    function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                document.getElementById("login-form").style.display = "none";
                document.getElementById("attendance-section").style.display = "block";
                document.getElementById("user-display").innerText = "Welcome: " + email;
            })
            .catch((error) => {
                alert("Login Error: " + error.message);
            });
    }

    // 4. Attendance Logic
    function processAttendance(type) {
        const statusDiv = document.getElementById("status");
        const campusName = document.getElementById("campus-select").value;
        const target = campuses[campusName];

        statusDiv.innerHTML = "Fetching location...";
        statusDiv.className = "";

        if (!navigator.geolocation) {
            statusDiv.innerHTML = "Geolocation not supported";
            return;
        }

        navigator.geolocation.getCurrentPosition((position) => {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;

            const distance = calculateDistance(userLat, userLon, target.lat, target.lon);

            if (distance <= ALLOWED_RADIUS_METERS) {
                statusDiv.innerHTML = `Success: ${type} at ${campusName}`;
                statusDiv.className = "inside";
                saveToDatabase(type, campusName, distance);
            } else {
                statusDiv.innerHTML = `Denied: Outside Campus (${distance.toFixed(0)}m away)`;
                statusDiv.className = "outside";
            }
        }, (error) => {
            alert("Location Error: Please enable High Accuracy GPS.");
        }, { enableHighAccuracy: true, maximumAge: 0 });
    }

    // 5. Distance Formula (Haversine)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // Earth's radius in meters
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // 6. Save Data
    function saveToDatabase(type, campus, dist) {
        const userId = auth.currentUser.uid;
        const timestamp = new Date().toLocaleString();
        db.ref('attendance/' + userId + '/' + Date.now()).set({
            type: type,
            campus: campus,
            distance: dist.toFixed(2) + "m",
            time: timestamp
        });
    }
</script>

</body>
</html>
