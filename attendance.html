<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA | Teacher Attendance Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --primary-color: #1a237e; 
            --secondary-color: #c62828; 
            --success-color: #2e7d32; 
            --bg-light: #f9f9f9;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        
        /* Navigation Menu */
        .nav-menu { background: var(--primary-color); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .nav-menu a:hover { opacity: 0.8; }

        .container { padding: 15px; }

        .attendance-card { 
            background: white; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Header Style matching admission.html */
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .logo-img { width: 100px; height: auto; margin-bottom: 8px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 22px; font-weight: 800; }
        .header p { margin: 2px 0; color: #666; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        /* Controls Area */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; flex: 1; font-size: 14px; min-width: 150px; }
        .load-btn { background: #eee; border: 1px solid #ccc; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .load-btn:hover { background: #ddd; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f0f2f5; padding: 12px; font-size: 11px; text-transform: uppercase; color: #555; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; }

        /* Attendance Toggle Buttons */
        .status-toggle { padding: 10px 18px; border-radius: 25px; border: none; cursor: pointer; font-weight: 800; width: 120px; font-size: 12px; transition: 0.2s; }
        .is-present { background: #e8f5e9; color: var(--success-color); border: 2px solid var(--success-color); }
        .is-absent { background: #ffebee; color: var(--secondary-color); border: 2px solid var(--secondary-color); }
        
        .save-btn { background: var(--primary-color); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: 800; margin-top: 25px; cursor: pointer; }
        .save-btn:hover { background: #0d144d; }

        @media (max-width: 600px) {
            .controls { flex-direction: column; }
            .status-toggle { width: 100%; }
        }
    </style>
</head>
<body>

<div class="nav-menu">
    <a href="admissions.html">+ New Admission</a>
    <a href="attendance.html">✓ Daily Attendance</a>
</div>

<div class="container">
    <div class="attendance-card">
        <div class="header">
            <img src="logo.png" alt="VGA Logo" class="logo-img">
            <h1>VEERAMALLU GLOBAL ACADEMY</h1>
            <p>Teacher's Attendance Portal | 2026-2027</p>
        </div>

        <div class="controls">
            <input type="date" id="attDate">
            
            <select id="campusPicker">
                <option value="">Select Campus</option>
                <option value="Velpur">Velpur Campus</option>
                <option value="Relangi">Relangi Campus</option>
                <option value="Undrajavaram">Undrajavaram Campus</option>
            </select>

            <select id="classPicker">
                <option value="">Select Class</option>
                <option value="PKG">PKG</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
                <option value="1">1st Class</option>
                <option value="2">2nd Class</option>
                <option value="3">3rd Class</option>
                <option value="4">4th Class</option>
                <option value="5">5th Class</option>
                <option value="6">6th Class</option>
                <option value="7">7th Class</option>
                <option value="8">8th Class</option>
                <option value="9">9th Class</option>
                <option value="10">10th Class</option>
            </select>
            
            <button class="load-btn" onclick="loadClassList()">LOAD LIST</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>STUDENT DETAILS</th>
                    <th style="text-align: center;">ATTENDANCE STATUS</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <tr>
                    <td colspan="2" style="text-align: center; color: #999;">Select Campus/Class and click "Load List"</td>
                </tr>
            </tbody>
        </table>

        <button class="save-btn" onclick="submitAttendance()">SYNC ATTENDANCE TO CLOUD</button>
    </div>
</div>

<script>
    let studentsArray = [];
    // Firebase Configuration
    const firebaseConfig = {
  apiKey: "AIzaSyCn7jBoFFpu2HTmQvPtXZx6h-2MzAD1piE",
  authDomain: "veeramalluerp-6cac5.firebaseapp.com",
  projectId: "veeramalluerp-6cac5",
  storageBucket: "veeramalluerp-6cac5.firebasestorage.app",
  messagingSenderId: "379339569496",
  appId: "1:379339569496:web:5c2becb98190b4e43a8d2d"
};
    firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
async function loadClassList() {
        const campus = document.getElementById('campusPicker').value;
        const className = document.getElementById('classPicker').value;
        const tbody = document.getElementById('studentTableBody');
        
        if(!campus || !className) return alert("Select Campus and Class.");
        
        tbody.innerHTML = "<tr><td colspan='2' style='text-align: center;'>Fetching students...</td></tr>";

        try {
            // NOTE: Field names 'campus' and 'joinClass' must match your Save() function in admissions.html
            const snapshot = await db.collection("attendance")
                .where("campus", "==", campus)
                .where("className", "==", className)
                .get();
            
            tbody.innerHTML = "";
            studentsArray = [];

            if (snapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='2' style='text-align: center; color: red;'>No students found.</td></tr>";
                return;
            }

            snapshot.forEach(doc => {
                const student = doc.data();
                // FIX: Matching your database keys: 'name' and 'id'
                studentsArray.push({ 
                    id: doc.id, 
                    name: student.name, 
                    status: "Present" 
                });
                
                const row = `
                    <tr>
                        <td>
                            <div style="font-weight: 800; color: #333;">${student.name}</div>
                            <div style="font-size: 11px; color: #777;">ID: ${doc.id} | ${campus}</div>
                        </td>
                        <td style="text-align: center;">
                            <button id="btn-${doc.id}" class="status-toggle is-present" onclick="toggle('${doc.id}')">
                                ✓ PRESENT
                            </button>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        } catch (error) {
            alert("Error loading list: " + error.message);
        }
    }

    function toggle(id) {
        const student = studentsArray.find(s => s.id === id);
        const btn = document.getElementById(`btn-${id}`);
        
        if(student.status === "Present") {
            student.status = "Absent";
            btn.innerText = "X ABSENT";
            btn.className = "status-toggle is-absent";
        } else {
            student.status = "Present";
            btn.innerText = "✓ PRESENT";
            btn.className = "status-toggle is-present";
        }
    }

    async function submitAttendance() {
        const date = document.getElementById('attDate').value;
        const campusName = document.getElementById('campusPicker').value;
        const className = document.getElementById('classPicker').value;
        
        if(!date || !className || !campusName) return alert("Select Date, Campus, and Class.");
        if(studentsArray.length === 0) return alert("Load list first.");

        const recordID = `${campusName}_${className}_${date}`;

        try {
            await db.collection("daily_attendance").doc(recordID).set({
                campus: campusName,
                className: className,
                date: date,
                records: studentsArray,
                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("✅ Attendance Synced to Cloud!");
        } catch (e) {
            alert("Sync Error: " + e.message);
        }
    }
    
    document.getElementById('attDate').valueAsDate = new Date();
</script>

</body>
</html>
